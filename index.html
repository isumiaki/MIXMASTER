、入るレンジもトリプルドローより締める。スムースなパット7・8や、`2-3-4-7` のように7・スムース8へ確実に届く強い1枚引きが主力。2枚以上引く手は、vsランダムの数字が高く出ても、まともな相手の1枚引きに沈む過大評価ゾーンだ。\n\n## 深掘り：サイズはチェンジ枚数の組合せで決める\n\nNLのこのゲームは「何枚替えたか（自分×相手）」がサイズ設計の主軸になる。**パットを表明した側は大きく**（ときにポットの数倍まで）、1枚×1枚の攻防は**ハンド強度で段階的に**——激強（8ロー以上）は大きく、9ローは中、Tローは小さく、ショーダウン価値の薄い手は大きなブラフに回す、という骨格だ。自分のパット表明では、同じサイズをバリューとスノーで共有して読ませない。\n\n## 深掘り：ノーリミットのサイジングとスノー\n\nこのゲームはノーリミット。**ドロー後のベットサイズとオールインの圧力**が主戦場になる。パットを装ってポットを大きく張れば、相手の弱い1枚引きや弱い完成手を降ろせる。ここで効くのがブロッカー——相手が引きたい低札を自分が握っているほど、スノー（ブラフのパット）が通りやすい。トリプルドローより1回の判断の比重が大きいぶん、サイズで押す技術が直接利益になる。\n\nスノーはこのゲームの核心の一つ。最初からパットするより、**1枚引いてからパット**するほうが強い手を表現できる（最初からのパットは、相手にレイズで試されたとき弱い完成手を割らされる）。ポジションがあれば相手の引き枚数を見てから動けるので、スノーもバリューも精度が上がる。\n\n## 深掘り：割る判断とドロー宣言の情報戦\n\n最大の情報は「引くか・パットか」の宣言だ。相手がパットを宣言すれば強い完成手、引けば未完成——その一手で相手のレンジが大きく動く。だから自分の宣言からは読まれないよう、強い手とスノーで同じライン・同じサイズを使ってバランスを取る。\n\nメイド手でも「割る」判断はある。ラフな完成手やスムースな9は、相手が引いていてこちらに良い下ドローがあれば、割って7・スムース8を狙うほうが得な局面がある。ヘッズアップではラフな8でもパットして押し切れることが多く、多人数では一段タイトに——人数で完成手の必要強度が変わる。\n---\n\n数値はオリジナルのモンテカルロ（相手ランダム想定／最善手へ正直に引く近似）。絶対値は高めに出るので、順位とパット/引きの閾値を目安に。\n", "badugi": "# BADUGI 完全ガイド\n\n### バドゥーギ（4枚ローボール・トリプルドロー）\n\nバドゥーギの肝は、ランクとスートを両方ばらけさせること。理想は異なる4ランク・異なる4スートの4枚で、これを「バドゥーギが完成している」と言う。一番低い完成形がA-2-3-4だ。負ける人の共通点は、弱い完成手（JバドゥーギやKバドゥーギ）を後生大事に握り、逆に強い3枚ドローを安く見て早々に降りること。引き枚数の勝負だから、ポジションとスノー（ブラフのスタンドパット）を使えるかどうかでも差がつく。\n\n---\n\n## スターティング早見（覚え方）\n\n**覚え方**：**異なる3色で全部8以下、うち2枚は5以下**（4色そろえば4枚バドゥーギ）\n\n- ◎ **プレミアム**：4枚バドゥーギ（A-2-3-4〜6ハイ）／強いパット・バドゥーギ\n- ○ **プレイアブル**：3枚バドゥーギ（異スート3枚・全部8以下、うち2枚は5以下）\n- △ **スチール/限定**：弱い3枚バドゥーギ・ラフな7/8 ドロー → ボタン/CO\n\n**ポジション目安**：1枚引き勝負＝**ポジション超重要**。アーリーは強い3枚、ボタンは緩めてOK。\n\n---\n\n## ルール\n\n4枚を使ったローボール。同じランクや同じスートが重なると、その重複ぶんは数えられない。たとえば「8♠ 6♠ 4♥ 2♦」はスペードが2枚あるので3枚（8を1枚捨てて6-4-2の3カード）扱い。完成した4枚バドゥーギは、必ず未完成の3枚に勝つ。4枚同士なら、一番高い札が低いほうが強い（トップダウン）。ドローは3回。\n\n## 強さの感覚\n\n完成形の質を体で覚えるのが先決。A-2-3-4が頂点で、6ハイ・7ハイあたりまでが堂々と戦える完成バドゥーギ。8ハイは相手数次第、9以上の完成手はむしろ割って引き直したいことが多い。「完成しているから強い」ではなく「低いから強い」だ。\n\nドロー側の評価では、強い3枚ドローを過小評価しないこと。下の表のとおり、良い1枚引きはパット8に迫る価値がある。ここでスートのライブ枚数を見る癖をつける——自分が必要な色が何枚死んでいるかで、完成率がはっきり変わる。\n\nスノーも武器になる。後ろの席で相手が複数枚引いているなら、こちらは弱い手でもパットを装って押し込める。ポジションが効くのは、相手が何枚引いたかを見てから自分の引き枚数を決められるからだ。\n\n---\n\n## スターティング（相手ランダム／HUと3人卓）\n\n| ハンド | eq(HU)% | eq(3way)% | 評価 |\n|---|---|---|---|\n| パット A234（ナッツ） | 100 | 99.9 | 別格 |\n| パット 6バドゥーギ（6432） | 98.9 | 97.9 | ◎ |\n| パット 8バドゥーギ（8532） | 94.8 | 89.5 | ◎ |\n| 1枚ドロー中（853、draw1） | 59.9 | 42.8 | △ |\n| 2枚ドロー（A2、draw2） | 52.1 | 35.6 | △ |\n| 3枚ドロー（A残し、draw3） | 46.3 | 29.8 | ✕ 弱い |\n\nパットの強バドゥーギはほぼ無敵。一方、引き枚数が増えるほど価値は急落する。3枚引きはこの数字でも過大評価で、実戦の多人数ではさらに沈む。\n\n## ドローの進め方\n\n序盤は強い3枚ドロー＋良い引きを優先し、弱い完成手にしがみつかない。中盤、相手が複数引いてこちらが1枚引きなら主導権はこちら。終盤は、弱い完成手を「割って強くしにいく」判断が分かれ目になる。9バドゥーギで止まるくらいなら、もう一度引いて6・7を狙うほうが正解なことが多い。\n\n\n## 1ハンドの流れ（例）\n\n`A♠2♥3♦ 8♠`（A-2-3の3枚バドゥーギ＋8♠はスペード被りで無効）。\n- **1st draw前**：あなたレイズ、コール。**8♠を捨てて1枚引き**（distinctな4枚目を狙う）。\n- **draw1**：`6♣` を引く → **A-2-3-6 の6バドゥーギ完成**（ランクもスートも全部バラ）。相手はまだ1枚引き。ベット、コール。\n- **2nd・3rd draw**：あなた**パット**（6バドゥーギは十分強い）。相手は引き続けてブリック。\n- **ショーダウン**：A-2-3-6 が相手の3枚（バドゥーギ未完成）に勝ち。\n\n**ねらい**：強い3枚から1枚で好バドゥーギを完成。完成したら割らず、パットで攻め切る。\n\n## 深掘り：なぜ2-7TDより一段タイトなのか\n\nBadugiは2-7トリプルドローと打ち方が似ているが、**より少ない%でしか入らない**のが正解。理由は、Badugiでは**最良のドロー手＝最良のメイド手**であり、残り1ドローの時点で最良手のエクイティ差が非常に大きいから。2-7はターンのエクイティが接近するぶん広く開けられるが、Badugiでは噛み合わない手の伸びしろが乏しい。3回引いてバドゥーギが完成する確率は約51%——「完成しにくい」ことがゲーム全体の設計を決めている。\n\n## 深掘り：完成率の実数と A-2 の再評価\n\n- プリドローでバドゥーギ完成は**約6.3%**（平均はQ-7クラス）。1枚引き1回の完成は**約20.4%**（完成の平均は8.5）、2枚引きからは**約10%**。\n- だから **A-2 / A-3 の2枚引きを過小評価しない**。A-2はバドゥーギ化こそ約10%だが、**5-2-A以内の強いtriまで約31%、7-2-A以内なら約44%**——2ndドローでOOP1枚引き/IP2枚引きの状況でも、簡単に捨てる手ではない。\n- ショーダウン価値が無いと見るやブラフしてくる相手には、弱いtriのキャッチを控えて**強いtriでキャッチ**し、7tri・8triからの**リブラフ**を武器にする。\n\n## 深掘り：tri（3枚バドゥーギ）が主役\n\n強いパットは稀で、**利益の大半は強い3枚（tri）から生まれる**。`A-2-3・A-3-4・2-3-4・A-2-5` が中核。3枚は約57%の頻度で配られる主力で、7-tri 以上はどの席でも基本プレイ可。弱めの `2-3-8` でもスムース8をすぐ作れ、相手がパットしていたら勝っていることが多くバリューになる。\n\n「インコンプリートを縮める」発想も重要。`A-2-6` は、バドゥーギの10アウツに加えて 3・4・5 を引けば**より強い3枚に化ける**——完成しなくても手が強くなる引き直しがある。\n\n逆に**弱いバドゥーギは多人数で money-loser**。K・10ハイの完成手はリバースインプライドの塊で、2人が3枚から3回引けば約75%でどちらかがバドゥーギを作る。`A2xx` のような強い3枚が `T84x` のような高い完成手に先んじる、というのがこのゲームの逆説だ。\n\n## 深掘り：ポジションとベットの注意\n\n1枚引き勝負なので**ポジションは決定的**。後ろにいれば相手の引き枚数を見てから自分の引き/スノーを決められる。アーリーは強い3枚、ボタンは大きく広げる（`6-8-9` のような際どい手は、利益の大半がスチール成功ぶん）。\n\n2枚引きでのプリドロー・リレイズは避ける——引き枚数で手の情報を渡す損が、フォールドエクイティを上回る。プレミアムなパットと強い1枚引きは、コールではなくリレイズに回す。そして**2ndドロー後のビッグベットストリートでフリーカードを与えない**——残り1ドローで最良手は大きな favorite なので、ベットの価値が高い。\n\n## 深掘り：スノーの体系（どのドロー系より重要）\n\nバドゥーギは完成しにくいぶん、**スノーの価値がどの draw game よりも高い**。ただし鉄則は二つ。**(1) 最悪のドローだけをスノーに回す**（捨てるエクイティが小さいから）。良い3枚は絶対にスノーにせず、バリューで打ち続ける。**(2) 「1枚引いてからパット」**は、最初からパットより強いバドゥーギを表現できる。最初からパットだと、相手にレイズで試されたとき弱い手を割らされて損をする。\n\nタイミングは**レイト・イン、相手が複数枚引いたのを見た後**。相手がずっとパット/1枚引きなら強いのでスノーしない。相手が2枚引きなら成功率が上がるので基準を少し下げてよい。低スーテッドの `A-x`（伸びても勝てない）なら、最初から or「faux draw one（引くふり）」からのスノーが定番。\n\n防御も対称的に。スノーを拾うために**3枚の5やそれ以下でコールする**ことも、文脈次第では**A-2-3を降りる**ことも正解になる。手の絶対値ではなく「どう打たれてきたか」で決める。EPの3ベットでパットしてくる相手は、まず本物。\n---\n\n数値はオリジナルのモンテカルロ（相手ランダム想定）。ドロー系は「正直に最善手へ引く」近似なので、絶対値より順位と閾値を見てほしい。\n", "nlhe": "# NLHE 完全ガイド\n\n### ノーリミット・テキサスホールデム\n\nミックスの中で唯一、1ベットでスタック全部を賭けられるのがノーリミットだ。手の評価はリミットホールデムとまったく同じ（同じ2枚＋共有5枚のハイハンド）だが、ベット額が青天井になった瞬間に、ゲームの重心は「どの手で入るか」から「いくら賭け、いつ全部を賭けるか」へ移る。プリフロップのレンジより、ポストフロップのサイジングとスタック運用で勝負がつく種目だ。\n\n---\n\n## スターティング早見（覚え方）\n\n**覚え方**：**大ペア・AK中心に、ポジションが後ろなほど広く**（小ペア・スーテッドは「安く見て大きく取る」インプライド勝負）\n\n- ◎ **プレミアム**：AA-QQ、AK\n- ○ **プレイアブル**：JJ-99、AQ・AJs・KQs／中スーテッドコネクター（後ろ）\n- △ **スチール/限定**：小ペア・スーテッドギャッパー・Axs → ボタン/CO中心\n\n**ポジション目安**：アーリーは絞り、ボタン/COで大きく広げる。3ベット/4ベットのレンジ設計も席で変える。\n\n---\n\n## ルールと前提\n\n手の強さはリミットホールデムと同一。違いはベット構造だけだ。だからプリフロップのエクイティ表（下）はFLHと同じになる——意味があるのは、その数字をどう「サイズ」と「スタックの深さ」に翻訳するか。NLでは1ハンドで全スタックが動くので、エクイティが少し上でも、相手のレンジに対して不利なボードで大金を賭ければ大損する。逆に、エクイティが拮抗していてもポジションとサイジングで降ろせれば勝てる。\n\n## スターティング（相手ランダム／HUと4人卓）\n\n| ハンド | HU% | 4-way% | 判定 |\n|---|---|---|---|\n| AA | 85.0 | 63.8 | ◎ |\n| KK | 82.3 | 58.0 | ◎ |\n| QQ | 79.9 | 53.3 | ◎ |\n| JJ | 77.3 | 49.2 | ○ |\n| AKs | 67.1 | 41.4 | ◎ |\n| AKo | 65.4 | 38.5 | ○（スートで約-2%） |\n| AQs | 66.3 | 40.2 | ○ |\n| KQs | 63.4 | 38.5 | ○ |\n| 76s | 45.4 | 25.2 | △（後ろ・深いスタックで） |\n| 22 | 50.1 | 22.0 | △（セット狙い） |\n| 72o | 34.9 | 14.3 | ✕ |\n\n数字はFLHと同じだが、読み方が違う。NLでは「HUで強い手」より「相手のスタックを大きく取れる手」に価値がある。小ペアや中スーテッドコネクターは、HU勝率は地味でも、セットやストレートを完成させたときに相手の全スタックを奪える（インプライドオッズ）から、深いスタックとポジションがあれば価値が跳ねる。\n\n## サイジングとSPR\n\nポストフロップの起点はSPR（スタック対ポット比）。フロップ時点でポットに対してスタックが浅ければ（SPRが低い）、トップペアでもコミットしていい。深ければ（SPRが高い）、トップペア1枚で全スタックを賭けるのは危険で、ナッツ級やナッツドローでないと積み切れない。プリフロップのレイズ/3ベットサイズが、このSPRを自分で設計している——ここがリミットには無いNL特有の操作だ。\n\nベットサイズは手札ではなく「状況」で決める。同じトップペアでも、相手のレンジに自分が有利なボード（ドライなAハイなど）では小さく薄く、相手が伸びやすいウェットなボードでは大きく守りながら、と変える。サイズで手の強さがバレないよう、強い手と弱い手（ブラフ）を同じサイズに混ぜてレンジで考えるのが、上のプレイヤーの基本姿勢だ。\n\n---\n\n\n## 1ハンドの流れ（例）\n\n6人NL、あなたはボタンに `A♠K♠`。\n- **プリフロップ**：UTGがオープン、あなた3ベット、コール。\n- **フロップ** `K♦7♥2♣`（ドライ）：相手チェック、あなたは**小さめのCベット**（このボードはレンジ優位が大きい）、コール。\n- **ターン** `4♠`：チェック、ハーフポットでベット、コール。\n- **リバー** `9♦`：相手チェック、あなたバリューベット、コール。\n- **ショーダウン**：トップペアが QQ に勝ち。\n\n**ねらい**：Kハイのドライ面は3ベッターのレンジ優位が大きい。サイズを選んで薄く価値を取る。NLは「いくら賭けるか」が主戦場。\n\n## 深掘り：無差別化の2:1とスチールの算術\n\n- リバーの（ポットサイズ）オールインでは、**バリュー：ブラフ＝2:1**が基準。相手のブラフキャッチの勝率をちょうど1/3にすると、コールもフォールドも同じ期待値＝相手が最も苦しくなる。\n- プリフロップ参加の目的は、まず**ブラインド＋アンティの奪取**。アンティ込みで+2.5bbあるなら、2.5bbオープンは**2回に1回通るだけで任意の2枚が正当化**される——スチールと、それを簡単に許さないディフェンスは対の技術だ。\n- Push or Fold の実戦則：相手のコールレンジは理論より固いことが多く、**プッシュの利益の大半はフォールドエクイティ**。相手が少し降りやすいだけで、プッシュの下限は表より大きく広がる。\n\n## 深掘り：レンジ優位とナッツ優位\n\nNLHEの上達は「自分のこの手」から「このラインを取るときの自分のレンジ全体」への視点移動で起きる。Cベットを打つべきかは、**レンジ優位**（そのボードで自分のレンジが相手より強い割合が高いか）と**ナッツ優位**（最上位の手を自分のレンジが多く持つか）で決まる。Aハイのドライなボードはプリフロップレイザーのレンジ優位が大きく、小さく高頻度で打てる。相手が伸びやすいウェットな中札ボードはレンジ優位が薄く、サイズと頻度を絞る。\n\n## 深掘り：ベットサイズの階層とポラライズ\n\nサイズは手札ではなく**狙い**で決める。薄いバリュー＋プロテクションは小さく高頻度、ナッツ級＋ブラフは大きく低頻度（ポラライズ）。大きく打つほどそのレンジは二極化していなければ搾取される。バリューとブラフを同じサイズに混ぜ、相手にどちらか分からなくさせるのが核心。リバーの大型オールインは「ナッツ級か、ブロッカーを持つブラフか」に寄せる。\n\n## 深掘り：ブロッカーと3ベット/4ベット動態\n\nブロッカー（相手の強い手を減らす札）は、とくに大きなブラフの妥当性を決める。Aを持てば相手のAA・AKが減る——4ベットブラフやリバーのオールインは、ブロッカーの有無で成立可否が変わる。3ベットは**バリューとブロッカーブラフ**（Axsなど、相手のAA/AKを減らしつつ played well な手）を混ぜて構成し、サイズで高SPR/低SPRを設計する。\n\n## 深掘り：実現エクイティとリバースインプライド\n\nプリフロップ勝率は出発点にすぎず、**どれだけ実現できるか**が損益を決める。OOPやドミネートされた手（弱いトップペア、支配されたAx）は、当たっても大金を失う側（リバースインプライド）に回りやすく、実現値が下がる。逆にセットや強いスーテッドコネクターは、完成時に相手の全スタックを取れる（インプライド）ぶん、弱いオッズでも価値が跳ねる。スタックの深さで戦略は一変する——浅ければプリフロップのレンジ勝負、深ければポジションとポストフロップの技術勝負。\n\n> トーナメントでは、これにICM（賞金分配の数理）の考慮が加わる。\n---\n\n数値はオリジナルのモンテカルロ（相手ランダム想定）で、手の評価はリミットホールデムと共通。プリフロップ勝率は出発点にすぎず、NLの損益はサイジングとスタック運用で決まると考えてほしい。\n", "intro_a": "# 初めての MIX GAME\n\n### NLホールデムから始める人のための、ミックスゲーム入門\n\nいつもNLホールデムを打っているあなたへ。ミックスゲームは「知らないゲームばかりで難しそう」に見えますが、実は一定の法則でできています。その法則さえ掴めば、数十種類のルールが一気に読めるようになります。しかもここで身につくナッツやエクイティの感覚は、そのままNLHを強くしてくれます。これを機にミックスを覚えて、ついでにホールデムも一段上に行きましょう。\n\n---\n\n## ミックスゲームとは\n\nミックスゲームとは、**複数のポーカー種目を一定間隔で切り替えながら回す**遊び方のことです。一周ごと、あるいはディーラーボタンが一周するごとに「次は2-7トリプルドロー」「次はラズ」というふうにゲームが変わっていきます。代表的なセットに **H.O.R.S.E.（5種）**、**8-Game**、**10-Game** などがあり、WSOPで世界一を決める $50,000 Players Championship も8〜9種のミックスです。「一つの種目だけ強い人」ではなく「全部そこそこ強い人」を決める——それがミックスの世界です。\n\nなぜNLHプレイヤーがミックスに手を出す価値があるのか。理由は三つあります。\n\n- **競争が緩い**：多くの人はホールデムしか練習しません。ミックスは習熟者が少なく、基礎を押さえるだけで優位に立てます。\n- **エッジが大きい**：苦手な種目を平気で打つ相手が多く、正しく打つだけで差がつきます。\n- **NLHにも効く**：ローやスプリットで鍛える「ナッツの読み」「半分を取る/総取りを狙う」発想は、ホールデムの判断力を確実に底上げします。\n\nそして何より、あなたはゼロからの出発ではありません。**ベット・ポジション・エクイティ・レンジ**といったホールデムの土台はそのまま使えます。新しく覚えるのは「役の数え方」と「ゲームの進み方」だけです。\n\n---\n\n## たくさんあるゲームの覚え方\n\nJOPTなどの大会で、こんな表記を見たことはないでしょうか。\n\n> **FL 2-7 Triple Draw**\n\n呪文のようですが、ポーカーの種目名は（ミックスに限らず）必ず**3つの部品の組み合わせ**でできています。\n\n- **ベットの方法**（いくら賭けられるか）\n- **役の強さのルール**（どんな手が強いか）\n- **ゲームのルール**（カードの配られ方・進み方）\n\nさきほどの `FL 2-7 Triple Draw` を分解するとこうなります。\n\n| 部品 | この種目では | 意味 |\n|---|---|---|\n| ベットの方法 | **FL** | フィックスドリミット（固定額ベット） |\n| 役の強さ | **2-7** | 2-3-4-5-7 が最強。ポーカー的に「弱い手」が勝つ |\n| ゲームのルール | **Triple Draw** | ドローポーカー。手札を3回まで交換できる |\n\n実は、あなたが毎日打っている**ノーリミットホールデム**も同じ構造です。\n\n| 部品 | この種目では | 意味 |\n|---|---|---|\n| ベットの方法 | **NL** | ノーリミット（上限なし） |\n| 役の強さ | **Hi**（省略） | 普通のポーカー。強い手が勝つ |\n| ゲームのルール | **Hold'em** | 2枚を保持して共有5枚で戦うフロップゲーム |\n\nつまり「No-Limit Texas Hold'em」は、本当は **NL ＋ Hi ＋ Hold'em** の組み合わせ名だったのです。Hi は当たり前すぎて省略されているだけ。では、この3つの部品にはどんな種類があるのか、一つずつ見ていきましょう。\n\n---\n\n## ① ベットの方法 — NL / PL / FL\n\n「1回にいくらまで賭けられるか」のルールです。ここが変わると、同じ手でも戦い方がまるで変わります。\n\n| 略号 | 名前 | 1回のベット上限 | 主な使われ方 |\n|---|---|---|---|\n| **NL** | ノーリミット | 自分のスタック全部までOK | ホールデム |\n| **PL** | ポットリミット | その時点のポットサイズまで | オマハ（PLO・Big-O） |\n| **FL** | フィックスドリミット | **金額が固定**（自分で選べない） | ミックスの大多数 |\n\n**NL（ノーリミット）** は慣れ親しんだ世界。一撃でオールインでき、ブラフもサイズで押せます。変動が大きく、1ハンドで決着がつくことも。\n\n**PL（ポットリミット）** は「ポットの大きさまでしか賭けられない」方式。序盤は上限が小さく、ポットが膨らむほど賭けられる額も雪だるま式に増えます。オマハで使われ、**サイズの設計**（フロップで小さく張ってターンで大きく、など）が肝になります。\n\n**FL（フィックスドリミット）** がミックスの主役です。ベット額は**あらかじめ決まっていて選べません**。ふつう序盤のストリートは「スモールベット」、後半のストリートは「ビッグベット（2倍）」。1ラウンドの上げ合いも上限（4〜5ベットでキャップ。大会により異なります）があります。\n\n> **FLで気をつけること**：大きく賭けて降ろす・守るができません。だから勝負は「**小さなエッジの積み重ね**」。1ベット分を正しく取り切り、勝てない所では1ベットも払わない規律がそのまま勝敗になります。オールインが無いぶん、派手さより**手の質とポジション**がものを言います。\n\n> なお、ミックスの多くは**ブラインドではなくアンティ（＋スタッドはブリングイン）**で始まります。専門用語（ブリングイン・ドアカード・コンプリート・パット・スノー等）は、別ページ「**用語集・ルール基礎**」にまとめてあるので、読みながら引いてください。\n\n---\n\n## ② 役の強さのルール — Hi / Low / 2-7 / Badugi\n\n「どんな手が強いか」のルールです。ここがミックスで一番つまずく所——でも表で並べれば怖くありません。\n\n**Hi（ハイ）** は普通のポーカー。役が強い人が勝ちます。名前では省略されがちで、「Hold'em」「Omaha」と書いてあれば暗黙でHiです。\n\n**Low（A-5ロー／ローボール）** は**逆に一番弱い手が勝つ**ルール。ポイントは二つ、**エースは一番低い（強い）**、そして**ストレートやフラッシュは無視**（できても弱くならない）。だから最強は **A-2-3-4-5（ホイール）**。スプリットでは「8以下でないとロー不成立」という資格（eight or better）が付きます。\n\n**2-7（ディース・トゥ・セブン）** も一番弱い手が勝ちますが、A-5と**ちょうど逆**の二点があります。**エースは一番高い（弱い）**、そして**ストレートとフラッシュは“役”として成立してしまい不利**。だから最強は **2-3-4-5-7**（つながっていないので、ぎりぎりストレートを避けた最低の5枚）。\n\nここが初心者最大の混乱ポイントなので、表で並べます。\n\n| | **A-5 ロー** | **2-7 ロー** |\n|---|---|---|\n| エース | 低い＝**強い** | 高い＝**弱い** |\n| ストレート・フラッシュ | **無視**（影響なし） | **不利**（役になり弱くなる） |\n| 最強の手（ナッツ） | **A-2-3-4-5** | **2-3-4-5-7** |\n| `A-2-3-4-5` の評価 | ナッツ（ホイール） | **ただのストレート＝最悪級** |\n\n同じ `A-2-3-4-5` が、A-5では最強・2-7では最悪。**「ローと言われたらまずA-5か2-7かを確認する」**——これだけ覚えておけば、半分は勝ったようなものです。\n\n**Badugi（バドゥーギ）** は少し毛色が違うランク。**4枚すべてのランクが異なり、かつスートも異なる**手（＝バドゥーギ）を作り、低いほど強い。ペアや同じスートが重なると、その札は数えられません。最強は **A-2-3-4（全部バラ色）**。バドゥーギ本体や、Badacey などのスプリットで登場します。\n\n---\n\n## ③ ゲームのルール — 配られ方と進み方\n\nカードの配られ方・交換・共有の仕方です。ベッティングラウンド（賭けの機会）の回数もここで決まります。\n\n| ゲーム | 手札 | 共有/交換 | 賭けの回数 | ひとことで |\n|---|---|---|---|---|\n| **Hold'em** | 2枚保持 | 共有5枚（F/T/R） | 4回 | あなたのホーム |\n| **Omaha** | 4枚保持 | 共有5枚 | 4回 | Hold'emの親戚。ただし**必ず2枚＋盤3枚** |\n| **Triple Draw** | 5枚 | **3回交換** | 4回 | 引いて作るドロー |\n| **Single Draw** | 5枚 | **1回交換** | 2回 | 1回きりの勝負 |\n| **STUD（7枚スタッド）** | 各自バラ配り | 共有なし | 5回 | 見せ札を読むゲーム |\n| **Drawmaha** | 5枚 | 盤＋**1回交換** | 4回 | ドロー×オマハの合体 |\n\n**Hold'em**：2枚を持ち、共有5枚（フロップ3・ターン1・リバー1）。賭けは4回。説明不要ですね。\n\n**Omaha**：ホールが**4枚**になり、役を作るときは**必ずちょうど2枚＋盤の3枚**を使います（4枚全部や1枚だけは不可）。ここがホールデムと最大の違いで、初心者が一番間違えるところ。ベットはPLが定番。5枚配る **Big-O** もこの仲間です。\n\n**Triple Draw**：共有カードは無く、自分の5枚を **最大3回交換**して作ります。各ドローの前と最後の後に賭けるので**4回**。2-7・A-5・バドゥーギで使われます。「何枚替えたか」が相手の手を読む手がかりになります。\n\n**Single Draw**：交換は**1回だけ**。賭けは引く前と後の**2回**。化けるチャンスが少ないぶん、完成手（パット）の価値が重く、NL 2-7 で打たれます。\n\n**STUD（セブンカードスタッド）**：共有カードが無く、各自に少しずつカードが配られます。3rdで伏せ2枚＋表1枚、4th〜6thで表が1枚ずつ、7th（リバー）で伏せが1枚増えて**計7枚**になり、最良の5枚で勝負。賭けは3rd〜7thの**5回**です。\n\nホールデムと違い、ブラインドではなく**アンティ（全員が払う場代）＋ブリングイン（3rdで一番条件の悪い表札の人が払う強制ベット）**で始まります。ブリングインを正規額まで上げることを**コンプリート**と呼びます。各自の表向きの最初の1枚を**ドアカード**と言い、相手のドアは常に見えています。だから**相手の見せ札を読む**のが核心。ラズ・スタッドハイロー・スタッドハイがこの仲間です。\n\n**Drawmaha（ドラマハ）**：5枚を持ち、**オマハの盤**と**1回のドロー**の両方がある合体ゲーム。ドロー側の役とオマハ・ハイの役を別々に作り、スプリットで分け合います。最初は変則に見えますが、上の部品の足し算と分かれば読めます。\n\n---\n\n## ④ スプリットゲームについて\n\nミックスには、**ポットを「ハイの勝者」と「ローの勝者」で半分ずつ分ける**種目が多くあります。これがスプリット（ハイロー）です。\n\n- **資格（8 or better）**：多くのスプリットでは「8以下のローが無ければロー不成立」。誰もローを作れなければ、**ハイが総取り**します。\n- **スクープ**：ハイとローの**両方**を一人で取ること。スプリットの本当の狙いは「半分」ではなく、この**総取り**です。\n- **クォーター（要注意）**：ローが相手と同点だと、取り分が**1/4**になります。「勝ったのに赤字」という現象が起き得るので、**裸の2番手ロー**で押し合いに付き合うのは禁物。\n\n代表例は **Stud8・Omaha8・Big-O・Archie** など。さらに、ドロー系では **Badacey（バドゥーギ＋A-5）** のように「2つの役で分け合う」二者スプリットもあります。\n\n> スプリットのコツは一言、**「半分で満足せず、総取りを設計する」**。低く入ってハイの芽も残す——この発想がそのまま勝率になります。\n\n---\n\n## これであなたはもう読める\n\nここまでの部品を覚えただけで、初見の種目名も分解して読めるようになっています。試してみましょう。\n\n| 種目名 | ベット | 役 | ゲーム | つまり…… |\n|---|---|---|---|---|\n| **FL Razz** | FL | A-5ロー（スタッド形） | STUD | 固定額・一番低い手・7枚スタッド |\n| **PL Omaha 8** | PL | ハイ＋A-5ローのスプリット | Omaha | ポット制・ハイロー・4枚オマハ |\n| **FL 2-7 Triple Draw** | FL | 2-7ロー | Triple Draw | 固定額・2-7・3回交換 |\n| **NL 2-7 Single Draw** | NL | 2-7ロー | Single Draw | 上限なし・2-7・1回交換 |\n| **FL Badugi** | FL | バドゥーギ | Triple Draw | 固定額・4枚バラ・3回交換 |\n\nどうでしょう。もう「呪文」ではなく、意味のある言葉に見えてきたはずです。\n\nあとは各ゲームのガイドで、スターティングハンドの目安・エクイティ・戦略を一つずつ確かめていくだけ。ミックスで鍛える**ナッツの読み**と**エクイティの感覚**は、NLHにも必ず効いてきます。さあ、ここからミックスの旅を始めましょう。\n\n---\n\n*このページは入門用の概説です。各種目の詳しい戦略は、左の一覧から個別ガイドへ。*\n", "glossary_a": "# 用語集・ルールの基礎\n\n### 読みながら引く、ミックスの共通語\n\n各ガイトに出てくる用語・記法・進行ルールをここにまとめました。知らない言葉が出たらここへ戻ってください。NLホールデムしか知らなくても、ここを押さえれば全ゲームのガイドが読めます。\n\n---\n\n## ベットと進行の基礎\n\nミックスでは、ホールデムに無い**強制ベット**と**固定額ベット**が出てきます。まずここから。\n\n**アンティ（ante）**：全員が毎ハンド最初に支払う少額の場代。ブラインドの代わり（または併用）で、ポットに種銭を作ります。スタッド系・ドロー系で標準。\n\n**ブリングイン（bring-in）**：スタッドで、3rdストリートに**最も条件の悪い表札の人が支払う強制ベット**（少額）。ハイのスタッドなら一番低い表札、ロー（ラズ）なら一番高い表札の人。ホールデムのSBのような「最初に動く義務」と思えばOK。\n\n**コンプリート（complete）**：ブリングインを、正規のスモールベット額まで上げること。「ブリングインにコンプリートする」＝最初の本格的なレイズ。\n\n**スモールベット／ビッグベット**：フィックスドリミット（FL）では1回のベット額が固定。**序盤のストリートはスモール、後半のストリートはビッグ（2倍）**。例：$10/$20なら3rd・4thは$10、5th以降は$20。\n\n**キャップ**：1ラウンドで上げられる回数の上限（多くは4〜5ベット。ルールや大会により異なり、日本のトーナメントでは5ベットキャップ＝ベット＋4レイズも一般的）。上限に達したら、以降はコールのみ。\n\n**スチール**：弱い手でも、後ろの席で相手が降りそうな状況を突いて、ブラインド／ブリングイン／アンティを奪いにいくこと。\n\n---\n\n## ポジション（席順）\n\n**ポジション**：自分が「先に動くか・後に動くか」。後（イン・ポジション）が有利なのはホールデムと同じ。ただしゲームで決まり方が違います。\n\n- **フロップ系（Hold'em・Omaha）**：ボタンが一番後で有利。席は固定。\n- **ドロー系（Triple/Single Draw）**：ボタン基準で固定。**相手が何枚引いたかを見てから動ける後の席が強い**。\n- **スタッド系**：席が固定ではなく、**毎ストリート「表札の状況」で動く順番が変わる**。3rdはブリングイン（最悪の表札）から、4th以降は「一番強そうな表ボードの人」から動きます。\n\n---\n\n## スタッドの進め方（3rd〜7thストリート）\n\n7枚スタッドは、共有カードが無く、各自に少しずつ配られていきます。NLH出身者が一番とまどう所なので、順番に。\n\n| ストリート | 配られ方 | ベット |\n|---|---|---|\n| **3rd** | 伏せ2枚＋表1枚（計3枚） | ブリングイン→コンプリート（スモール） |\n| **4th** | 表1枚追加（計4枚） | スモール |\n| **5th** | 表1枚追加（計5枚） | **ビッグ** |\n| **6th** | 表1枚追加（計6枚） | ビッグ |\n| **7th（リバー）** | **伏せ1枚**追加（計7枚） | ビッグ |\n\nつまり最終的に**伏せ3枚＋表4枚＝7枚**を持ち、そこから最良の5枚で勝負します。賭けの機会は3rd〜7thの**5回**。\n\n**ドアカード（door card）**：3rdで最初に見える**表向きの1枚**。相手のドアは常に見えているので、これを読むのがスタッドの核心です。\n\n**死札（デッドカード）／ライブカード**：自分が欲しい札が、相手の表札や降りた手に**もう見えてしまっている**＝死札。生きている（まだ場に残っている）ほど自分の手は伸びます。スタッドは公開情報が多く、**死札を数える人が勝ちます**。\n\n> **本ガイド共通の表記**：`(下札 下札)表札` で3rdの3枚を表します。例 `(A2)3` ＝ 伏せがA・2、表が3。`(44)5` ＝ 伏せが4のペア＋表5。スート付きは `(7♥5♥)3♥` のように書きます。\n\n満席（8人）で全員が7枚まで残ると山札が足りなくなり、最後は1枚を全員共有のコミュニティカードにします（稀）。\n\n---\n\n## ドローの進め方\n\n**ドロー（draw）**：手札の一部を捨てて引き直すこと。\n\n- **トリプルドロー**：交換は**最大3回**。各ドローの前と最後の後に賭けるので、賭けは**4回**。\n- **シングルドロー**：交換は**1回**。賭けは引く前と後の**2回**。\n\n**パット（pat / stand pat）**：交換せず、今の5枚で勝負を宣言すること。「完成している（と見せる）」合図。\n\n**ブレイク（break／割る）**：完成手をあえて崩し、より良い手に引き直すこと。例：弱いパット9を1枚捨てて7を狙う。\n\n**スノー（snow）**：本当は未完成なのに**パットを装って相手を降ろすブラフ**。相手が複数枚引いている時に効きます。\n\nスタッドと同じく、ドローでも**相手が何枚替えたか**が最大の手がかりです。\n\n---\n\n## 役の強さ（おさらい）\n\n**Hi（ハイ）**：普通のポーカー。強い役が勝つ。\n\n**A-5 ロー**：一番弱い手が勝つ。**A は最低（強い）**、ストレート・フラッシュは**無視**。最強は A-2-3-4-5（ホイール）。\n\n**2-7 ロー**：一番弱い手が勝つ。ただし **A は最高（弱い）**、ストレート・フラッシュは**不利**。最強は 2-3-4-5-7。\n\n**バドゥーギ**：ランクもスートも全部バラバラの4枚を作り、低いほど強い。最強は A-2-3-4。\n\n**distinct（ディスティンクト）**：「重複しない」という意味。Badugi/ロー系で「distinct な4枚」＝ランクの被らない4枚。\n\n**ロールドアップ**：スタッドで最初の3枚がスリーカード。最強級の隠れた手。\n\n**スプリットペア**：スタッドで、表札と伏せ札に分かれたペア（例：表5＋伏せ5）。片方が見えているので相手に読まれやすい。\n\n---\n\n## スプリット（ハイロー）の用語\n\n**スプリット**：ポットを「ベストハイ」と「ベストロー」で半分ずつ分ける方式。\n\n**資格（8 or better）**：多くのスプリットで「8以下のローが無ければロー不成立」。誰もローを作れなければ**ハイが総取り**。\n\n**スクープ**：ハイとローの**両方**を一人で取ること。スプリットの本当の狙い。\n\n**クォーター**：ローが相手と同点だと取り分が**1/4**に。「勝ったのに赤字」になり得るので、裸の2番手ローで押し合いに付き合うのは禁物。\n\n**two-way（両取り型）**：ハイにもローにも届く手。スプリットで最も価値が高い。\n\n**フリーロール**：片方（例：ナッツロー）を確保した上で、ノーリスクでもう片方も狙える状態。\n\n---\n\n## オマハ・ハイ系の用語\n\n**ナッツ**：その場面で作れる**最強の手**。オマハはナッツが日常的に存在するので、2番手で大金を入れないのが鉄則。\n\n**ランダウン（rundown）**：連続した4〜5枚（例：9-8-7-6）。ストレートを多面的に狙える手。\n\n**ラップ（wrap）**：オマハ特有の巨大なストレートドロー。ホールデムの最大8アウツに対し、**13〜最大20アウツ**になることも。\n\n**ダングラー（dangler）**：4〜5枚のうち、他の札と噛み合わない**浮いた1枚**。実質的に手を1枚少なくする。\n\n**リドロー**：メイド後にさらに上を狙えるドロー（例：ストレート＋フラッシュドロー）。\n\n**SPR（Stack-to-Pot Ratio）**：フロップ時点の「スタック ÷ ポット」。低いほど早くコミットしてよく、高いほどナッツ性が要る。ベットサイズの設計指標。\n\n**RNIO（リバース・ナッツ・インプライド・オッズ）**：強いが2番手の手が、本物のナッツに大金を払って沈むコスト。下/中ストレートなどで起きやすい。\n\n**ブロッカー**：自分が持つことで、相手の特定の強い手の組合せを減らす札。ブラフの成立可否に効く。\n\n---\n\n## その他よく出る言葉\n\n**marginal（マージナル）**：可もなく不可もない、際どい手。\n\n**favorite（フェイバリット）**：勝っている側・有利な側。\n\n**ブリック／ペイント**：ブリック＝（ロー系で）役に立たない高い札。ペイント＝絵札（J・Q・K）。\n\n**ギャップ・コンセプト**：レイズに対してコールするには、自分からレイズするより一段強い手が要る、という原則。\n\n**実現エクイティ**：理論上の勝率を、実際にどれだけ取り切れるか。ポジションやドミネートで上下する。\n\n---\n\n*分からない言葉が残っていたら、それは説明不足です。各ガイドと併せて、この用語集を手元に置いて読み進めてください。*\n", "overview_a": "# MIX POKER MASTER ANOTHER\n\n### 10-Game に含まれない“もう一歩外側”の種目を、同じ精度で\n\nこのページは「**MIX POKER 10Game MASTER**」の姉妹編です。ミックスの王道10種目には入らないものの、ホームゲームやハイステークスのミックスで実際に回っている**エキゾチック種目**を、同じ作法（**日本語ガイド＋モンテカルロのエクイティ計算機＋VS HAND**）でまとめています。\n\n> 王道で土台を作ったら、ここからは“裏メニュー”。スプリットの考え方が深くなり、スクープ設計の比重がさらに増します。\n\n---\n\n## 収録ゲーム\n\n**vol.1 — エキゾチック5種**\n\n| 種目 | 一言で | 性格 |\n|---|---|---|\n| **[PL Big-O](#plbigo)** | 5枚オマハ・ハイロー(8) のポットリミット | ナッツ偏重・分散大 |\n| **[FL Big-O](#flbigo)** | 同上のフィックスドリミット版 | 技術寄り・betのみ違う |\n| **[Super Stud Hi-Lo](#sstud8)** | 5枚配り→2枚捨ての Stud8 | 選別で全員が強い |\n| **[Badacey](#badacey)** | バドゥーギ ＋ A-5ロー の二者スプリット | ドロー2枚で組む |\n| **[Baduecey](#baduecey)** | バドゥーギ(エース高) ＋ 2-7ロー | フリーロール合戦 |\n\n**vol.2 — さらに外側の4種**\n\n| 種目 | 一言で | 性格 |\n|---|---|---|\n| **[Archie](#archie)** | 5枚TD ハイロー、両サイドに資格 | ハイが取りやすい |\n| **[Ari](#ari)** | Archie＋共有カード1枚（ハイ専用） | 共有でハイがインフレ |\n| **[Super Stud Hi-Lo (NQ)](#sstud8nq)** | ローに資格なし＝最低が常に取る | ハイ一本が弱い |\n| **[Drawmaha Hi](#dramahaHi)** | 5枚ドロー × オマハ・ハイ | ドロー手が主役 |\n| **[Drawmaha 2-7](#dramaha27)** | 2-7ドロー × オマハ・ハイ | 低×高でねじれる |\n| **[Drawmaha Badugi](#dramahaBadugi)** | バドゥーギ × オマハ・ハイ（Dramadugi） | 低バドゥーギが主役 |\n\n**vol.3 — 定番クラシック＆スタッド分割の4種**\n\n| 種目 | 一言で | 性格 |\n|---|---|---|\n| **[A-5 トリプルドロー](#a5td)** | 2-7と並ぶロー一枚看板（A低・スト/フラ無視） | 一人勝ち・ホイール狙い |\n| **[Razz-deucey](#razzdeucey)** | Baduecey をスタッド形式で（badugi+2-7） | A高・見せ札読み |\n| **[Razz-dacey](#razzdacey)** | Badacey をスタッド形式で（badugi+A-5） | A低・A良い札 |\n| **[ダブルボード5card オマハ ハイロー](#dboard8)** | 2盤からベストハイ＋ベストローを選び2分割 | 両面ナッツ志向 |\n| **[ダブルボード5枚オマハ（ハイ×ハイ）](#dboardBigO)** | 盤が2つ、どちらもハイのみ | 高さ＝ナッツ志向 |\n| **[Super Action Razz](#actionrazz)** | ペイント(J/Q/K)で資格＝低さに優先 | 資格ゲー・参加増 |\n| **[ドラマハ ピッケム](#pickem)** | UTGが5枚を見て7変種から選択 | 土俵選び・ドロー重視 |\n\n各ゲームのページには **GUIDE / EQUITY / VS HAND** の3タブがあります。EQUITYは「相手ランダム」での取り分、VS HANDは相手の手札・ボード・ドロー回数を指定しての検証です。\n\n---\n\n## このセットの読み方\n\n- **スプリットは「半分×2」**。片取り（クォーター）を避け、**スクープ**を設計するのが全種目共通の核です。\n- Big-O は **2枚＋ボード3枚**ちょうど。Badacey/Baduecey は **5枚から2つの手**を同時に作ります。\n- 数値は全て**オリジナルのモンテカルロ**。相手ランダム想定なので絶対値は高めに出ます。読むべきは**順位と閾値**。\n- これらは**未解決ゲーム**（ソルバー解は存在しない）。本ガイドはエクイティに基づく実戦ヒューリスティクスです。\n\n*※ 学習目的の概算ツールです。金銭を賭けるプレイは各自の責任で。*\n\n---\n\nDESIGN & BUILD — **ISUMI**\n", "plbigo": "# PL Big-O 完全ガイド\n\n### 5枚オマハ・ハイロー(8)、ポットリミット\n\nビッグO（5枚オマハ・ハイロー8）のポットリミット版。4枚PLOにホールが1枚増え、ハイ・ローとも必ず2枚＋ボード3枚を使う。札が1枚増えるぶんナッツの組合せが増え、エクイティはさらに接近する。狙いは総取り（スクープ）で、ナッツローとナッツハイを同時に狙える二刀流が主役だ。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**A-2-3（第3低札でカウンターフィット保護）＋スーテッドのA**（裸A-2は半罠）\n\n- ◎ **プレミアム**：A-2-3＋高サポート ダブルスート（A-2-3-K-K 等）\n- ○ **プレイアブル**：A-2-x-x＋スーテッドA／3低札＋高ペア\n- △ **スチール/限定**：A-2裸・ハイonly → 降り気味\n\n**ポジション目安**：PLはポジション重要、FLはタイトに。**多人数前提でナッツ志向**。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| ホールカード | **5枚**（全て自分だけ） |\n| 使用 | ハイ・ローとも**ちょうど2枚＋ボード3枚** |\n| ボード | フロップ3・ターン1・リバー1（計5枚・共有） |\n| ロー条件 | 8以下5枚・ペア不可（Aは低）／ストレート・フラッシュは無視 |\n| ナッツロー | A-2-3-4-5（ホイール） |\n| ベット | **ポットリミット**（最大＝ポットサイズ） |\n\nローが不成立なら**ハイが総取り**。ハイとローは別々に2枚を選んでよい（同じ2枚でなくて良い）。\n\n## 基本と狙い\n\nA-2絡みでナッツローを確保しつつ、高ペアやスーテッドでハイにも刺さる形が理想。札が多いぶん「2番手のロー/フラッシュ」はより罠になり、bareな2番手でポットサイズのベットに付き合うとクォーターでスタックが溶ける。低い・中位のランダウンは支配されやすく、浮いた札（ダングラー）は実質4枚オマハへの格下げと考える。ポジションを使い、少なくとも片方向はナッツに寄せて入りたい。\n\n## スターティング\n\n| ハンド | eq% | スクープ% | 評価 |\n|---|---|---|---|\n| A2345 ダブルスート | 55 | 41 | ロー＋ホイール＋フラッシュの王 |\n| A23＋A K スーテッド | 60 | 41 | ナッツロー＋ナッツフラの二刀流 |\n| KKQJT ハイonly | 45 | 30 | ロー0%。多人数だと事故る |\n\n（ヘッズアップ相当・各2,200試行。絶対値は高めに出るので**順位**で読む）\n\n## 1ハンドの流れ（例）\n\n- **手札**：`A♠2♠3♥K♦Q♦`（A-2-3＋高札）。PL。\n- **フロップ** `3♦4♥5♣`：A-2 で **A-2-3-4-5 のホイール＝ナッツロー＋ストレート（ハイも最強級）**。ポットベット、コール。\n- **ターン** `K♠`：Kペアでハイの厚みも増す。ポットベット、コール。\n- **ショーダウン**：ナッツロー＋ストレートで**スクープ**。\n\n**ねらい**：5枚ぶん2枚組が多く、A-2-3は「ナッツロー・ホイール・ストレート」を一手で狙える。少なくとも片方向はナッツに寄せて入る。\n\n## 深掘り：5枚オマハ（Big-O）の力学\n\nホールが5枚になると、ナッツロー・ナッツハイの**2枚組がさらに増え、エクイティが一段圧縮**する。だから「生の強さ」より**ナッツ性**が4枚PLO以上に効く。良い手の条件は「強い2枚組をいくつ作れるか」——`A-2-3＋高スーテッド` は、ナッツロー・ホイール・ナッツフラッシュ・セットを同時に狙える最上位だ。\n\n5枚あるぶん**カウンターフィット保護は取りやすい**が、**クォーターの危険も増す**（多人数でナッツローが複数並びやすい）。だから「セカンドナッツロー」はより罠。低い/中位のランダウンは支配されやすく、`A-K-Q-J-2` の2のようなダングラー（浮き札）は実質4枚オマハに格下げと考える。\n\nブラフはモンスタードロー（12アウツ以上）とナッツブロッカーに寄せる。オールフラッシュ/ペア面では、そのスートのAやセットを持つときのブロッカーブラフが効く。ベットサイズは強弱で変えず一定に。深いスタックでは投機的な高ランダウン＋Aスーテッドを、浅いスタックでは高札・Aスーテッドの即効性を優先する。\n\nポットリミットの Big-O では、**クォーターがスタックを溶かす**。bare nut low draw でポットサイズのベットをコールし続けるのは、小さく取り返すために大きく払う典型リーク。多人数では少なくとも片方向はナッツ級にドローし、ローならカウンターフィット保護を必須に。SPRをプリフロップのサイズで設計し、低SPRでは commit できる手（トップ側ラップ・ナッツドロー・AA系＋バックアップ）を選ぶ。\n\n---\n\n## 計算の前提\n\n- 数値はオリジナルのモンテカルロ（各2,200試行）。相手ランダム想定で、絶対値は実戦より高め。読むべきは順位と閾値。\n- ローは8-or-better、ちょうど2枚＋ボード3枚。ナッツロー＝A2345。\n- 厳密なナッシュ解は本領域では未解決。本記事は均衡解ではなく実戦的ヒューリスティクスです。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "flbigo": "# FL Big-O 完全ガイド\n\n### 5枚オマハ・ハイロー(8)、フィックスドリミット\n\nビッグO（5枚オマハ・ハイロー8）のフィックスドリミット版。ルールはPL Big-Oと同じで、ハイ・ローとも2枚＋ボード3枚を使う。違いはベットが固定でポットに対して小さいことで、これが手の取捨を変える。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**A-2-3（第3低札でカウンターフィット保護）＋スーテッドのA**（裸A-2は半罠）\n\n- ◎ **プレミアム**：A-2-3＋高サポート ダブルスート（A-2-3-K-K 等）\n- ○ **プレイアブル**：A-2-x-x＋スーテッドA／3低札＋高ペア\n- △ **スチール/限定**：A-2裸・ハイonly → 降り気味\n\n**ポジション目安**：PLはポジション重要、FLはタイトに。**多人数前提でナッツ志向**。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| ホールカード | 5枚（全て自分だけ） |\n| 使用 | ハイ・ローとも**ちょうど2枚＋ボード3枚** |\n| ボード | フロップ3・ターン1・リバー1（計5枚・共有） |\n| ロー条件 | 8以下5枚・ペア不可（Aは低）／ストレート・フラッシュは無視 |\n| ナッツロー | A-2-3-4-5（ホイール） |\n| ベット | **フィックスドリミット**（固定額） |\n\n配り・使用・ショーダウンは PL Big-O と同一で、手のエクイティも共通。違うのはベット構造だけ。ローが不成立ならハイが総取り。\n\n## 基本と狙い\n\nベットが安いぶん、バックアップ付きの弱いローやbareなナッツロードローでも安く見にいける（ポット版では厳禁の動きだ）。逆にハイ専用（AAKK系）は、場に低札が3種揃わずローが流れる高ボードで総取りできるぶん価値が上がる。ボードの「8以下の異なる札」を数え、3種以上ならロー確定・0〜1種ならハイ勝負、と即座に切り替えるのが基本。A-2＋高サポートの二刀流を軸にする。\n\n## スターティング\n\n| ハンド | eq% | スクープ% | 評価 |\n|---|---|---|---|\n| A2345 ダブルスート | 55 | 41 | 2-wayの王 |\n| A23＋A K スーテッド | 60 | 41 | ナッツロー＋ナッツフラ |\n| KKQJT ハイonly | 45 | 30 | ロー0%・多人数で事故 |\n\n## 1ハンドの流れ（例）\n\n- **手札**：`A♠A♥K♦K♥Q♣`（ハイ寄り）。FL。\n- **フロップ** `K♠9♥7♦`：**KKK のトップセット**。場の低札は7のみ。ベット、コール。\n- **ターン** `Q♦`／**リバー** `9♣`：盤の8以下は7の1種だけで**ローは不成立**。しかも盤の9がペアになった。\n- **ショーダウン**：KK＋盤の K-9-9 で **K のフルハウス**。ローが無いので**総取り**。\n\n**ねらい**：場に8以下が3種そろわなければハイの総取り。ハイ専用手はこの「ロー流れ」で価値が出る。リミットゆえ安く見られるのも利点。\n\n## 深掘り：5枚オマハ（Big-O）の力学\n\nホールが5枚になると、ナッツロー・ナッツハイの**2枚組がさらに増え、エクイティが一段圧縮**する。だから「生の強さ」より**ナッツ性**が4枚PLO以上に効く。良い手の条件は「強い2枚組をいくつ作れるか」——`A-2-3＋高スーテッド` は、ナッツロー・ホイール・ナッツフラッシュ・セットを同時に狙える最上位だ。\n\n5枚あるぶん**カウンターフィット保護は取りやすい**が、**クォーターの危険も増す**（多人数でナッツローが複数並びやすい）。だから「セカンドナッツロー」はより罠。低い/中位のランダウンは支配されやすく、`A-K-Q-J-2` の2のようなダングラー（浮き札）は実質4枚オマハに格下げと考える。\n\nブラフはモンスタードロー（12アウツ以上）とナッツブロッカーに寄せる。オールフラッシュ/ペア面では、そのスートのAやセットを持つときのブロッカーブラフが効く。ベットサイズは強弱で変えず一定に。深いスタックでは投機的な高ランダウン＋Aスーテッドを、浅いスタックでは高札・Aスーテッドの即効性を優先する。\n\nフィックスドリミットの Big-O は、ベットがポットに対して小さいぶん**バックアップ付きの弱いローや bare nut low draw でも安く peel できる**（PL Big-Oでは厳禁）。逆にハイ専用（AAKK系）は、場に3種の低札が揃わずローが不成立になる回（高ボード）に総取りできるので価値が上がる。ボードの「8以下の異なる札」を数え、3種以上＝ロー確定・2種＝可能・0〜1種＝ハイ勝負、と即時に切り替える。\n\n---\n\n## 計算の前提\n\n- EQUITY/VS HAND の数値は PL Big-O と共通（オリジナルのモンテカルロ・各2,200試行）。\n- 違いはベット構造のみ。エクイティ自体は betting に依存しません。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "sstud8": "# Super Stud Hi-Lo 完全ガイド\n\n### 5枚配り→2枚捨て、選別される Stud8\n\n5枚配って2枚捨て、そこから通常のStud8に合流する変種。最終7枚でハイ・ロー（8以下）を作る split-pot は普通のStud8と同じだが、最初に5枚から3枚を選ぶ一手が独自の技術になる。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**5枚から3枚レインボー低札（A絡み8以下）を残す＝両取り**（ハイは大ペア/トリップス）\n\n- ◎ **プレミアム**：3低札（A-2-x）／ロールド・大ペア（高一本）\n- ○ **プレイアブル**：8以下の散った3枚／3枚スーテッド\n- △ **スチール/限定**：中位ハイ → 死札次第\n\n**ポジション目安**：スタッド＝見せ札・死札重視。低いボードで主導権。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| 3rd street | ダウン4枚＋アップ1枚＝**5枚**を配る |\n| 捨て | 3rdのベット後、**2枚を捨てて3枚に**（怠ると手がファウル） |\n| 4th〜7th | 以降は**通常の Stud8**（最終7枚で best5 ハイ／best5 ロー(8)） |\n| ロー条件 | 8以下5枚・ペア不可（Aは低）。ナッツロー A2345 |\n| ベット | フィックスドリミット（3rd・4thスモール、5th以降ビッグ） |\n\nロー不成立ならハイが総取り。**捨てた2枚は死札**（誰も使えない）。\n\n## 基本と狙い\n\n捨てた2枚は全員にとって死札になり、自分の必要札を場から消したり相手の伸びを止めたりできる。残す3枚はスクープ性を最大化する組合せ——A絡みの低札・3枚スーテッド・連結低札を優先する。全員が5枚から選別するぶんボードが速く・強く育つので、一段タイトに、最初から両取りを設計して入る。ローが枯れる高ボードでは、大ペアやロールドの総取りも狙える。\n\n## スターティング\n\n| 5枚ディール | 取り分eq% | ハイ% | ロー% | 評価 |\n|---|---|---|---|---|\n| (AAA) ロールアップ | 77 | 91 | 4 | 巨大ハイ・ほぼスクープ |\n| A2345 → A23選択 | 51 | 45 | 41 | 王道の2-way |\n| KKQJ9 → KK選択 | 51 | 67 | 0 | ハイonly・多人数で割れる |\n\n（ヘッズアップ相当・各3,500試行）\n\n## 1ハンドの流れ（例）\n\nスーパースタッド（5枚→2枚捨て）。\n- **3rd**：5枚から `(A♠2♥)3♠` を残す（理想の3低札、2枚は死札に）。コンプリート、2人コール。\n- **4th〜5th**：4♣・5♥ で **A-2-3-4-5 のホイール（ナッツロー＋ストレートのハイ）**。ベット（5thはビッグ）、コール。\n- **7th／ショーダウン**：両取りで**スクープ**。\n\n**ねらい**：5枚から「両取りに効く3枚」を選ぶ捨て札が勝負どころ。残りは全員の死札になる。\n\n## 深掘り：「捨て札」というスーパースタッド独自の技術\n\nSuper系は3rdで**5枚配られ、2枚を捨てて3枚にする**。これが通常スタッドに無い意思決定だ。捨てた2枚は**全員にとって死札**になり、自分の必要札を意図的に場から消したり、相手の伸びを止めたりできる。残す3枚は「スクープ性（両取り）」を最大化する組合せ——A絡みの低札・3枚スーテッド・連結低札を優先する。\n\n5枚から選別するぶん**全員のレンジ・ボードが通常スタッドより強く・速く育つ**。だから一段タイトに、かつ最初から両取りを設計して入る。通常Stud8の深掘り（スクープアドバンテージ＞ホット/コールド、トリップ5のブロッカー価値、ライブカード、クォーター回避、ハイは最良で入る）はすべてそのまま効く。\n\nクォリファイアあり（8以下でないとローは不成立）なので、ローが枯れる高ボードでは**ハイ専用（大ペア・ロールド）が総取り**を狙える。捨て札で自分のロー札が死んでいるか、相手のドアがロー方向かを読み、二刀流に寄せて入る。\n\n---\n\n## 計算の前提\n\n- モデル：各プレイヤーに5枚配り→**ヒューリスティックに最良3枚を保持**→7枚に完成→Stud8で判定。捨て2枚は死札として山から除外。\n- 「最良3枚」は自動選択（ロールアップ＞三低札＞大ペア＞最低札）。実戦の捨て判断とは細部で異なる**近似**です。\n- 数値はオリジナルのモンテカルロ（各3,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 厳密なナッシュ解は未解決。本記事は実戦的ヒューリスティクスです。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "badacey": "# Badacey 完全ガイド\n\n### バドゥーギ ＋ A-5ロー の二者スプリット（5枚トリプルドロー）\n\nバドゥーギとA-5ローを同時に争う、5枚トリプルドローのスプリット。両側ともエースが低く、ストレートも気にしない。だから A-2-3-4-5 は A-5のホイール（ナッツロー）と A-2-3-4 のナッツバドゥーギを兼ね、ほぼスクープの最強形になる。両側のベクトルが揃いやすいのがこのゲームの性格だ。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**A入りの散った低3枚（A-2-3 型）。Aは良い札**（バドゥーギ先→A-5フリーロール、狙い7-7）\n\n- ◎ **プレミアム**：パット強バドゥーギ＋低A-5（(2-4-6-7)5 型）／配られたバドゥーギ\n- ○ **プレイアブル**：A入りの散った低3枚（A-2-3・A-2-5）\n- △ **スチール/限定**：4枚ローのブロッカー → ボタン\n\n**ポジション目安**：ドロー＝レイトで緩める。引き枚数を読む。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | 5枚・**トリプルドロー**（ドロー3回・ベット4回） |\n| バドゥーギ側 | 5枚中**最大4枚**で異ランク・異スート。**エースは低**。ナッツ A234 |\n| A-5ロー側 | **5枚**で判定。straight/flush無視・**Aは低**。ナッツ A2345（ホイール） |\n| 分配 | バドゥーギ半分＋A-5ロー半分。**両者とも常に成立**（クオリファイア無し） |\n| ペア | A-5側では**ペアは全ての無ペアに負ける**（最弱はA-Aが最良ペア） |\n\n## 基本と狙い\n\n低くて色・ランクのばらけた札を集めれば、自然と二刀流になる。主役は強い3枚バドゥーギ＋良いA-5ロードローで、A-2-3系が中核だ。弱いバドゥーギで止まるより、3ドローあるなら割って下を狙うほうが得な局面が多い——A-5側も同時に良くなることが多いからだ。スプリットなのでスノーで降ろせる幅は狭く、クォーターを避けるためどちらか一方でもナッツに寄せたい。\n\n## スターティング\n\n| ハンド | eq% | スクープ% | バドゥーギ% | A-5ロー% |\n|---|---|---|---|---|\n| パット A2345 レインボー | 100 | 100 | 100 | 100 |\n| A235＋引き | 86 | 74 | 77 | 96 |\n| 8寄りバドゥーギ | 低 | 低 | — | 頭打ち |\n\n（各3,500試行・自動ドローの近似モデル）\n\n## 1ハンドの流れ（例）\n\n`A♠2♥3♦4♣5♦`。\n- これは **A-5のホイール（ナッツロー）＋ A♠2♥3♦4♣ のナッツバドゥーギ**＝両側ナッツの最高形。\n- **全ドロー パット**。相手は引き続ける。ベット／レイズで攻める。\n- **ショーダウン**：ロー・バドゥーギ両取りで**スクープ**。\n\n**ねらい**：両側のベクトルが揃う理想形。低くdistinctな札はそのまま二刀流になる。\n\n## 深掘り：A-5 とバドゥーギを同時に最適化する\n\nBadacey はロー側がA-5（エース低・ストレート不利でない）、バドゥーギ側もエース低。だから **`A-2-3-4-5` は A-5のホイール（ナッツロー）＋ A-2-3-4 のナッツバドゥーギ**で、ほぼスクープの最強形になる。両側のベクトルが揃いやすいのが Badacey の特徴で、低くて distinct な札を集めれば自然と二刀流になる。\n\n主役は**強い3枚バドゥーギ＋良いA-5ロードロー**。`A-2-3` 系は、バドゥーギを縮めながらA-5側もナッツに向かう。8バドゥーギのジレンマ（弱いバドゥーギで止まるか割るか）は、3ドローあるなら**割って下を狙う**ほうが得な局面が多い——A-5側のローも同時に良くなることが多いからだ。\n\nスノーはバドゥーギ側で機能するが、**スプリットゲームではブラフで降ろせる範囲が狭い**（相手はロー側だけでも拾える）。最悪の手をたまに混ぜる程度に。クォーター回避のため、どちらか一方でもナッツに寄せ、bare な2番手で多人数のビッグベットに付き合わない。\n\n---\n\n## 計算の前提\n\n- バドゥーギ＝5枚中最良4枚（エース低）、A-5ロー＝5枚（straight/flush無視・エース低）。両者とも常に成立。\n- ドローは「低い異ランク5枚に向けて正直に引く」**近似**モデル（2回目以降は自動）。とくにマルチドローは概算です。\n- 数値はオリジナルのモンテカルロ（各3,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "baduecey": "# Baduecey 完全ガイド\n\n### バドゥーギ（エース高）＋ 2-7ロー の二者スプリット（5枚トリプルドロー）\n\nバドゥーギ（エース高）と2-7ローを争う5枚トリプルドローのスプリット。難しさは、バドゥーギの最強 2345 と2-7の最強 75432 が一致しないこと。2-3-4-5 は美しいバドゥーギだが、2-7ではストレートで最悪級——二つのナッツが引っ張り合う。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**2か3入りの散った低3枚（2-3-5 型）。Aは高で不利**（狙い8ロー＋7バドゥーギ）\n\n- ◎ **プレミアム**：パット強バドゥーギ＋低2-7（(2-4-6-7)5 型）／配られたバドゥーギ\n- ○ **プレイアブル**：2/3入りの散った低3枚（2-3-5・2-3-7）\n- △ **スチール/限定**：4枚ローのブロッカー → ボタン\n\n**ポジション目安**：ドロー、レイトで緩める。**9バドゥーギは捨てる**。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | 5枚・**トリプルドロー**（ドロー3回・ベット4回） |\n| バドゥーギ側 | 5枚中**最大4枚**で異ランク・異スート。**エースは高**。ナッツ **2345** |\n| 2-7ロー側 | **5枚**で判定。**Aは高**・**straight/flushは不利**。ナッツ **75432** |\n| 分配 | バドゥーギ半分＋2-7ロー半分。**両者とも常に成立** |\n| ペア | 2-7では**ペアは無ペアに負け、straight/flushも役として不利** |\n\n## 基本と狙い\n\nだから狙いは「両側でそこそこ＋片側でナッツ」になる distinct な低札。異スートの 2-4-5-7 系なら、2-7で good low に届きつつ4枚バドゥーギの目も残る。完全に 2345 を作りにいくと2-7を捨てることになるので、どちらを主・どちらを従にするかを引きながら決める。2-7側はディースが鍵でストレート目を避け、バドゥーギ側はエース高なのでA絡みはやや不利になる。\n\n## スターティング\n\n| ハンド | eq% | スクープ% | バドゥーギ% | 2-7ロー% |\n|---|---|---|---|---|\n| パット 23457 レインボー | 100 | 100 | 100 | 100 |\n| 234＋引き | 高 | — | — | — |\n| 75432（バドゥーギは2枚のみ） | 片取り | 低 | 弱 | 強 |\n\n（各3,500試行・自動ドローの近似モデル）\n\n## 1ハンドの流れ（例）\n\n`2♠3♥5♦7♣ J♠`（バドゥーギ側は 2-3-5-7 の4色、2-7側はJだけ替えたい）。\n- **draw1**：Jを捨てて1枚引き。ここで「4」は要注意——どのスートの4でも手持ちのどれかと被ってバドゥーギは伸びず、しかも **2-3-4-5-7＝2-7側がストレート化**。つまり4は両側にとって毒札だ。\n- 引けたのが `8♦` なら：5♦と被るのでバドゥーギは 2-3-5-7 のまま、**2-7側は 8-7-5-3-2 の好ロー**に育つ。従（バドゥーギ）を保ちつつ主（2-7）が伸びる理想形。\n- **ショーダウン**：2-7側の8ローで主導し、バドゥーギ側も 2-3-5-7 で戦える。クォーターを避けつつ半取り〜スクープ。\n\n**ねらい**：バドゥーギの 2345 と2-7の 75432 は両立しない。どちらを主にするかを引きながら決める。\n\n## 深掘り：二つのナッツが「引っ張り合う」ゲーム\n\nBaduecey の難しさは、バドゥーギ側（エース**高**・ナッツ `2345`）と 2-7ロー側（エース高・ストレート不利・ナッツ `75432`）で**最良形が一致しない**こと。`2-3-4-5` は素晴らしいバドゥーギだが、2-7では**ストレート**で最悪級。逆に `7-5-4-3-2` は2-7のナッツだが、スートが被ればバドゥーギは3枚止まり。この**両側の引っ張り合い**をどう捌くかが核心だ。\n\nだから狙うのは「両側でそこそこ＋片側でナッツ」になる distinct な低札。たとえば異スートの `2-4-5-7` 系は、2-7で good low に届きつつ4枚バドゥーギの目も残る。完全に `2345` を作りにいくと2-7側を捨てることになるので、**どちらを主・どちらを従にするか**を引きながら決める。\n\n2-7側はディースが鍵（7ローはディース無しに作れない、ストレート目を避ける）。バドゥーギ側はエース高なので、A絡みはバドゥーギ的にやや不利。スノー（バドゥーギ側）と「割る」判断、クォーター回避は Badacey と同じだが、**ベクトルが割れる分だけ慎重に**。\n\n---\n\n## 計算の前提\n\n- バドゥーギ＝5枚中最良4枚（**エース高**：ナッツ2345）、2-7ロー＝5枚（A高・straight/flush不利：ナッツ75432）。両者とも常に成立。\n- ドローは「低い異ランク5枚に向けて正直に引く」**近似**モデル（2回目以降は自動）。マルチドローは概算です。\n- 数値はオリジナルのモンテカルロ（各3,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "archie": "# Archie 完全ガイド\n\n### 5枚トリプルドロー、ハイ・ローに“両方クオリファイア”\n\n5枚トリプルドローの hi-lo だが、ハイ（9のペア以上）とロー（8以下）の両方に資格があるのが特徴。片方しか成立しなければ、そちら側が総取りする。A-2-3-4-5 のホイールはストレート＝ハイ資格を満たし、同時にナッツローでもある二重資格のモンスターだ。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**ハイ寄りゲー。2ペア+/QQ+/フラッシュドロー、または強い3枚ホイール**（中途半端な低は降り）\n\n- ◎ **プレミアム**：2ペア以上・QQ+／全フラッシュドロー／3枚ホイール（両面）\n- ○ **プレイアブル**：4枚ホイール・75以下のメイドロー\n- △ **スチール/限定**：2-3-6級の3枚ロー → スチール/リンプのみ\n\n**ポジション目安**：ハイで行くなら**人数を絞る**（ローに安く引かせない）。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | 5枚・**トリプルドロー**（ドロー3回・ベット4回） |\n| ハイ資格 | **9のペア以上**（一部ルームは6のペア以上） |\n| ロー資格 | **8-or-better**（A-5ランク・ストレート/フラッシュ無視・Aは低） |\n| ロー不成立 | ハイが総取り／ハイ不成立 | ローが総取り |\n| 両者不成立 | 残った全員でチョップ（ルームにより最善ハイへ） |\n\nA2345（ホイール）は**ストレート（ハイ資格）＋ナッツロー**の両取り＝最強級です。\n\n## 基本と狙い\n\n狙うべきは両側に届きうる手。ホイール／低札で固めつつペアアップで9以上のペアにもなれる形や、ローを作りながらストレートでハイ資格を取る形が強い。純粋な良いロー（無ペアの8）はハイ資格が無く、相手のハイが成立すれば半分しか取れない。二刀流に寄せるほど、片側不成立なら総取りというスクープの機会が増える。\n\n## スターティング\n\n| ハンド | eq% | スクープ% | ハイ% | ロー% |\n|---|---|---|---|---|\n| A2345 ホイール | 97 | 95 | 95 | 100 |\n| AA＋高札（ハイのみ） | 67 | 51 | 81 | 0 |\n| 2346＋ブリック（4ロー） | 60 | 43 | 18 | 69 |\n\n（各3,000試行。VS HANDでは「2346を1枚引き vs パット99」が**約47%**＝公開値とほぼ一致）\n\n## 1ハンドの流れ（例）\n\n`A♠2♥3♦4♣5♠`＝ホイール。\n- **ストレート（A-2-3-4-5）がハイ資格（9ペア以上）を満たし、同時にナッツロー（8以下）**＝二重資格のモンスター。\n- 全ドロー**パット**。相手は両資格の片方を作りに引く。\n- **ショーダウン**：ハイ・ロー両資格を満たし**スクープ**。\n\n**ねらい**：ホイールは両資格を一手で満たす理想形。ロー専用/ハイ専用の手は片側を相手に渡してしまう。\n\n## 深掘り：二重資格が生む「両取り」の力学\n\nArchie は**ハイ（9のペア以上）とロー（8以下）の両方に資格**があり、片方しか成立しなければそちら側が総取りする。ここが普通の hi-lo と決定的に違う。`A-2-3-4-5`（ホイール）は**ストレート＝ハイ資格を満たし、同時にナッツロー**——二重資格を一手で満たすモンスターだ。\n\n狙うべきは「両側に届きうる」手。具体的には、**ホイール/低札で固めつつ、ペアアップで9以上のペア（ハイ資格）にもなれる**形や、ローを作りながらストレート/フラッシュでハイ資格を取る形。純粋な良いロー（無ペアの8）はハイ資格が無く、相手のハイが成立すれば半分しか取れない。逆に大ペアだけだとロー資格が無い。**二刀流に寄せるほどスクープ（＝片側不成立なら総取り）の機会が増える**。\n\nトリプルドローなので、引き枚数の情報戦・スノー（ただしスプリット＋二重資格で降ろせる幅は限定的）・「割る」判断も効く。相手が低く引いているならハイ資格を、高く構えているならロー資格を、と空いた側を取りにいく。\n\n---\n\n## 計算の前提\n\n- ハイ＝5枚の標準ポーカー手（9ペア以上で資格）、ロー＝A-5の8-or-better。両者不成立は残り全員でチョップとしてモデル化。\n- ドローは「ハイ寄り/ロー寄りを選び正直に引く」**近似**（2回目以降は自動）。実戦の繊細な引き判断とは細部で異なります。\n- 数値はオリジナルのモンテカルロ（各3,000試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "sstud8nq": "# Super Stud Hi-Lo (No-Qualifier) 完全ガイド\n\n### 5枚配り→2枚捨て、ローに資格が無い Stud\n\nスーパースタッド（5枚→2枚捨て→7枚）の、ローに資格が無い版。8以下でなくてもローは成立し、10ローや小ペアでも最低なら半分を取る——つまりローは常に誰かが持っていく。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**資格が無い＝三低札（両取り）の価値↑。ハイ一本（大ペア）は締める**\n\n- ◎ **プレミアム**：3低札（A-2-x、両取り）\n- ○ **プレイアブル**：8以下の散った3枚\n- △ **スチール/限定**：ハイ一本 → NQでは控えめに\n\n**ポジション目安**：スタッド。ハイ偏重のレンジをさらに締める。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| 3rd street | ダウン4枚＋アップ1枚＝**5枚** |\n| 捨て | ベット後、**2枚捨てて3枚に** |\n| 4th〜7th | 通常スタッドと同じ（最終7枚） |\n| ハイ | 標準ポーカー（best5） |\n| ロー | **A-5の最も低い5枚／資格なし**。10ロー・小ペアでも最低なら取る |\n| 分配 | ハイ半分＋ロー半分。**ローは常に誰かが取る** |\n\nA-5では**無ペアが全てのペアに勝ち**、A2345が最良。\n\n## 基本と狙い\n\nローが必ず分配されるぶん、クォーターの危険が一段増す。bareで2番手のローを抱えると、ビッグベットのストリートでクォーター地獄に落ちやすい。だからローでも「単独で勝てる強さ」かハイの裏付けを重視する。捨て札の技術はStud8と同じで、残す3枚は両取りに寄せる。ハイ側は、ローが必ず出るぶん最良のハイで入る規律がより効く。\n\n## スターティング\n\n| 5枚ディール | 取り分eq% | ハイ% | ロー% | スクープ% |\n|---|---|---|---|---|\n| (AAA) ロールアップ | 56 | 91 | 22 | 18 |\n| A2345 → 3ベビー | 54 | 46 | 63 | 23 |\n| KKQJ9 大ペア | 38 | 68 | 9 | 1 |\n\n（各3,500試行）。8-or-better版の AAA が約77%だったのに対し、**NQでは約56%**——ローが常に出る分ハイ一本が弱くなる、という差がはっきり表れます。\n\n## 1ハンドの流れ（例）\n\nノークォリファイア（ローに資格なし）。\n- あなたは終盤に `8-6-5-3-2` のロー。相手も `8-6-5-3-A` のロー。\n- ローは必ず誰かが取るので、**両者のローが近いとクォーター（取り分1/4）**になりやすい。\n- ハイを別の1人が持てば、あなたは「8ローを分けて1/4」という薄い取り分に。\n\n**ねらい**：ローは必ず分配される。bareな2番手ローは避け、単独で勝てるローかハイの裏付けを持って入る。\n\n## 深掘り：「捨て札」というスーパースタッド独自の技術\n\nSuper系は3rdで**5枚配られ、2枚を捨てて3枚にする**。これが通常スタッドに無い意思決定だ。捨てた2枚は**全員にとって死札**になり、自分の必要札を意図的に場から消したり、相手の伸びを止めたりできる。残す3枚は「スクープ性（両取り）」を最大化する組合せ——A絡みの低札・3枚スーテッド・連結低札を優先する。\n\n5枚から選別するぶん**全員のレンジ・ボードが通常スタッドより強く・速く育つ**。だから一段タイトに、かつ最初から両取りを設計して入る。通常Stud8の深掘り（スクープアドバンテージ＞ホット/コールド、トリップ5のブロッカー価値、ライブカード、クォーター回避、ハイは最良で入る）はすべてそのまま効く。\n\n**ノークォリファイア**なので、ローは常に誰かが取る（10ローや小ペアでも最低なら成立）。これは「ローが必ず分配される」ぶん**クォーターの危険が一段増す**ことを意味する——bare で2番手のローを持つと、ビッグベットのストリートでクォーター地獄に落ちやすい。だからローでも「単独で勝てる強さ」か、ハイの裏付けを重視。ハイ側は、ローが必ず出るぶん**最良のハイで入る規律**がより重要になる。\n\n---\n\n## 計算の前提\n\n- モデル：各プレイヤー5枚→**ヒューリスティックに最良3枚を保持**→7枚に完成→ハイ（best5）とロー（A-5最低・資格なし）で**常に**二分割。捨て2枚は死札。\n- 「最良3枚」は自動選択（実戦の捨て判断とは細部で異なる近似）。NQ向けの厳密な最適選別ではありません。\n- 数値はオリジナルのモンテカルロ（各3,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決領域。本記事は実戦的ヒューリスティクスです。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "ari": "# Ari 完全ガイド\n\n### Archie ＋ 共有カード1枚（ハイ役のみ）\n\nArchie に、ハイ役だけに使える共有カード1枚を足した変種。ハイは自分の5枚＋共有1枚から最良5枚、ローは自分の5枚だけで作る。共有カードがハイ側の成立を助けるので、Archie よりハイ資格が出やすい。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**Archieと同じ＋共有札がハイを底上げ→質の高い単独ローの価値↑**\n\n- ◎ **プレミアム**：Archie準拠（2ペア+/フラドロー）／共有でハイに化ける形\n- ○ **プレイアブル**：3枚ホイール（共有でストレート目→スクープ筋）\n- △ **スチール/限定**：弱い片面手 → 降り\n\n**ポジション目安**：**共有がどちらに噛むか**を読む。重心はややロー寄り。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| ベース | Archie（5枚トリプルドロー・高低スプリット） |\n| ハイ資格 | **9のペア以上**（一部6ペア以上） |\n| ロー資格 | **8-or-better**（A-5・ストレート/フラッシュ無視・Aは低） |\n| 共有カード | **1枚オープン。ハイ役にのみ使用可**（ロー不可） |\n| ハイの作り方 | 自分の5枚＋共有1枚＝6枚から最良5 |\n| ローの作り方 | 自分の5枚のみ（共有は使えない） |\n| 両者不成立 | 残り全員でチョップ |\n\n## 基本と狙い\n\n戦略は「共有カードでハイを補い、自分の5枚はロー＋ハイ資格の素を持つ」方向。共有が高い札・自分の手と連結する札なら、9以上のペアやストレートが一気に近づく。ローは自分の5枚だけなので自力で確保しつつ、ハイは共有を当て込んで二刀流を組む。共有が見えているぶん、相手のハイ資格の有無も読みやすい。\n\n## スターティング\n\n| ハンド | eq% | スクープ% | ハイ% | ロー% |\n|---|---|---|---|---|\n| A2345 ホイール | 94 | 87 | 88 | 100 |\n| AA＋高札（ハイ寄り） | 62 | 47 | 76 | 0 |\n| 2346＋ブリック（4ロー） | 60 | 43 | 26 | 68 |\n\n（各3,000試行。Archie比でホイール97→94%、AA67→62%——**共有札が相手のハイも底上げ**するため、メイドハイの優位が少し下がるのが特徴）\n\n## 1ハンドの流れ（例）\n\nArchie＋ハイ専用の共有カード1枚。\n- あなたの5枚が低札中心でも、**共有が K で自分にも K があれば、ハイ資格（Kのペア＝9以上）が成立**。\n- ロー（8以下）は自分の5枚だけで作り、ハイは共有を借りて両取りを狙う。\n- **ショーダウン**：ローは自力、ハイは共有込みで両資格→スクープ。\n\n**ねらい**：共有カードでハイを補い、自分の札はローと資格の素に使う。Archieよりハイが出やすい。\n\n## 深掘り：共有1枚がハイ資格を後押しする\n\nAri は Archie に**ハイ専用の共有カード1枚**を足した形。ハイは「自分の5枚＋共有1枚＝6枚から最良5」、ローは「自分の5枚のみ」。共有カードが**ハイ側の成立を助ける**ため、Archie よりハイ資格が出やすくなり、ロー単独で総取りする機会は減る。\n\n戦略は「共有カードでハイを補い、自分の5枚はロー＋ハイ資格の素を持つ」方向。共有が高い札・自分の手とペア/連結する札なら、ハイ資格（9以上のペアやストレート）が一気に近づく。ローは自分の5枚だけなので、**ロー側の自力**は Archie 同様に確保しつつ、ハイは共有を当て込んで二刀流を組む。共有が見えているぶん、相手のハイ資格の有無も読みやすい。\n\n---\n\n## 計算の前提\n\n- ハイ＝自分5枚＋共有1枚の6枚から最良5枚（9ペア+で資格）、ロー＝自分5枚のみの8-or-better。両者不成立は残り全員でチョップ。\n- 共有カードはEQUITYでは毎回ランダム、VS HANDでは指定可（空＝ランダム）。\n- ドローは「ハイ寄り/ロー寄りを選び正直に引く」**近似**（2回目以降は自動・Archieと共通方策）。共有札を見た繊細な引き調整までは模擬していません。\n- 数値はオリジナルのモンテカルロ（各3,000試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 新興・未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "dramahaHi": "# Dramaha Hi 完全ガイド\n\n### 5枚ドロー × オマハ・ハイの二刀流スプリット\n\n5枚ドロー（ハイ）とオマハ・ハイを同時に争う二刀流スプリット。手札5枚でドロー側の役を作りつつ、そのうち2枚＋ボード3枚でオマハ・ハイも作る。ドローはフロップ後の1回だけだ。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**ドロー（5枚ハイ役）が主役。大ペア（KK+）で隔離、AAは即3ベット**（Omahaはおまけ）\n\n- ◎ **プレミアム**：AA（即3ベット）／KK・QQ（1人に隔離）\n- ○ **プレイアブル**：強いドロー手＋Omahaの裏付け\n- △ **スチール/限定**：小〜中ペア・中途半端な両面手 → 損\n\n**ポジション目安**：フロップ後1ドロー＝**1人に隔離**して4ストリート価値。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| 配り | 5枚（伏せ） |\n| ボード | フロップ3・ターン1・リバー1（共有） |\n| ドロー | **1回のみ**（フロップ後／0〜5枚交換。6-7人なら3枚まで） |\n| ドロー側 | **5枚すべて**を標準ポーカー手として判定（A2345はストレート） |\n| オマハ側 | ちょうど**ホール2枚＋ボード3枚**のハイ |\n| 分配 | ドロー半分＋オマハ半分。同一人物の**スクープ**可 |\n\n## 基本と狙い\n\n難しさは、オマハで使いたい2枚とドロー側で完成させたい5枚が食い違うこと。ただしドローがフロップ後なのでボードを見てから引ける——オマハ側が強ければパットして守り、ドロー側が伸びるなら枚数を選ぶ。dramahaHi はドロー側が標準ポーカーなので、高い連結・フラッシュ・フルハウスがオマハ側のハイと両立しやすく、Dramaha系の中では最もスクープを設計しやすい。\n\n## スターティング\n\n| ハンド | eq% | ドロー側% | オマハ側% | スクープ% |\n|---|---|---|---|---|\n| A2345 ストレート | 73 | 99 | 47 | 45 |\n| KKQJT | 73 | 88 | 59 | 51 |\n| AAKK5（素2ペア） | 高 | — | — | — |\n\n（各2,500試行・**ドロー前/パット相当**で評価。下記「計算の前提」参照）\n\n## 1ハンドの流れ（例）\n\n手札5枚 `A♠K♠Q♥J♦T♦`。\n- **ドロー側**は手札だけで作る（**ボードは使えない**）——この5枚はすでに **A-K-Q-J-T のストレート＝パット**。\n- **フロップ** `Q♠J♠4♦`：オマハ側（2枚＋盤3枚）は A♠K♠ の**ナッツフラッシュドロー**＋ K-T の**オープンエンド**。\n- **ドロー**：もちろん**パット**（ストレートを崩さない）。相手は2枚引き。\n- **ターン** `9♥`：K-T ＋盤の Q-J-9 で**オマハ側もストレート完成**。\n- **ショーダウン**：ドロー側・オマハ側の両ストレートで**スクープ**。\n\n**ねらい**：最大の注意点は「**ドロー側はボードを使えない**」こと。同じ高札が両側に効く手（ブロードウェイ連結）は Dramaha Hi の理想形。\n\n## 深掘り：ドロー側とオマハ側の「2枚の取り合い」\n\nDramaha 系は、**自分の5枚でドロー側の役を作りつつ、そのうち2枚＋ボード3枚でオマハ・ハイも作る**ハイブリッド。難しさは、オマハで使いたい2枚と、ドロー側で完成させたい5枚が**しばしば食い違う**こと。しかもドロー（フロップ後の1回）で5枚を替えると、オマハ側の2枚も変わる。\n\nドローがフロップ後＝**ボードを見てから引ける**のが普通の draw game と違う最大の利点。オマハ側が既に強い（セット等）なら**パットして守る**、ドロー側が伸びるなら枚数を選んで引く、と盤面情報で判断できる。狙いは**スクープ**——両側に同時に効く手（同じ札がボードを叩きつつドロー側の役も伸ばす形）を高く評価する。ポジション、引き枚数の情報、ブロッカー（自分の5枚がボードのペアを潰す）も効く。\n\ndramahaHi はドロー側が**標準5枚ポーカー**（`A2345` はストレート）。だから「ドロー側のストレート/フラッシュ/フルハウス」と「オマハ側のハイ」が**同じ高い連結札で両立しやすい**——Dramaha 系の中では最もスクープを設計しやすい。高い連結・スーテッドを軸に、両側のハイを同時に狙う。\n\n---\n\n## 計算の前提\n\n- **PATモデル**：本ツールは「配られた5枚（ドロー前／パット相当）＋ボード」でスプリットを計算します。黄金律により**入場時のドロー手の強さがほぼ持続**するため、パット相当は良い近似ですが、**1回ドローによる改善は明示的には模擬していません**（ドローの巧拙こそ実戦のスキル層）。\n- ドロー側＝5枚の標準ポーカー手、オマハ側＝ホール2＋ボード3のハイ。両者とも常に成立。\n- 数値はオリジナルのモンテカルロ（各2,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "dramaha27": "# Dramaha 2-7 完全ガイド\n\n### 2-7ドロー × オマハ・ハイ（低×高の二刀流）\n\n2-7ロー（ドロー側）とオマハ・ハイを争う、低×高の二刀流スプリット。5枚でドロー側の2-7ローを作りつつ、2枚＋ボード3枚でオマハ・ハイも狙う。ドローはフロップ後の1回。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**2-7ドローが主役。10/Jロー＋高札のコンボ（J6432 型）**（プレミアムOmahaは無価値）\n\n- ◎ **プレミアム**：強い2-7ドロー／J6432 型コンボ（柔軟）\n- ○ **プレイアブル**：10/Jロー＋高札／良い1枚引き\n- △ **スチール/限定**：弱いOmaha偏重 → 壊してロー\n\n**ポジション目安**：エクイティ拮抗。ロックアウト時はフリーロール。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| 配り | 5枚（伏せ） |\n| ボード | フロップ3・ターン1・リバー1 |\n| ドロー | **1回のみ**（フロップ後・0〜5枚） |\n| 2-7側 | **5枚すべて**で判定。Aは高（悪い）・straight/flush不利。ナッツ **75432** |\n| オマハ側 | ホール**2枚＋ボード3枚**のハイ |\n| 分配 | 2-7半分＋オマハ半分。資格なし（両者常に成立） |\n\n## 基本と狙い\n\nDramaha系で最も割れるのがこれだ。2-7に欲しい低札と、オマハ・ハイに欲しい高い連結・フラッシュが真っ向から引っ張り合う。75432 はドロー側のナッツだがオマハではほぼ無力、逆もまた同じ。だから多くの局面は片側に寄せ、フロップ後のドローで「オマハが強ければパットして2-7を諦める」判断も出てくる。低札を引きつつボードが低く絡む薄い窓だけが、両取りのチャンスになる。\n\n## スターティング\n\n| ハンド | eq% | 2-7側% | オマハ側% | スクープ% |\n|---|---|---|---|---|\n| 75432 ナッツ2-7 | 69 | 100 | 39 | 37 |\n| AAKQJ（オマハ寄り） | 36 | 8 | 65 | 6 |\n| 234＋高2（2-7引き） | — | — | — | — |\n\n（各2,500試行・**ドロー前/パット相当**）\n\n## 1ハンドの流れ（例）\n\n手札5枚 `2♠3♥4♦7♣9♠`、フロップ後に1回ドロー＋オマハ盤。\n- ドロー側は **2-7ロー**（低い5枚）を狙うが、それはオマハ・ハイにはほぼ無力——**真っ向から引っ張り合う**。\n- **判断**： 。`AAKK` 系はバドゥーギが弱くオマハ頼み。\n\n## 1ハンドの流れ（例）\n\n手札5枚、フロップ後に1回ドロー＋オマハ盤。\n- バドゥーギに欲しい「色・ランクのばらけた低札」と、オマハ・ハイに欲しい「連結・スーテッドの高札」は**方向が逆**。\n- **判断**：バドゥーギ側のナッツを狙いつつ、オマハのメイドが強ければパットしてそちらを取る。\n- **ショーダウン**：両立しにくいので、拾えた側を確実に取る。\n\n**ねらい**：A-2-3-4のバドゥーギはオマハで無力。引っ張り合いを見極め、片側を取り切る。\n\n## 深掘り：ドロー側とオマハ側の「2枚の取り合い」\n\nDramaha 系は、**自分の5枚でドロー側の役を作りつつ、そのうち2枚＋ボード3枚でオマハ・ハイも作る**ハイブリッド。難しさは、オマハで使いたい2枚と、ドロー側で完成させたい5枚が**しばしば食い違う**こと。しかもドロー（フロップ後の1回）で5枚を替えると、オマハ側の2枚も変わる。\n\nドローがフロップ後＝**ボードを見てから引ける**のが普通の draw game と違う最大の利点。オマハ側が既に強い（セット等）なら**パットして守る**、ドロー側が伸びるなら枚数を選んで引く、と盤面情報で判断できる。狙いは**スクープ**——両側に同時に効く手（同じ札がボードを叩きつつドロー側の役も伸ばす形）を高く評価する。ポジション、引き枚数の情報、ブロッカー（自分の5枚がボードのペアを潰す）も効く。\n\ndramahaBadugi はドロー側が**バドゥーギ**（distinct な低4枚）。バドゥーギに欲しい「色・ランクのばらけた低札」と、オマハ・ハイに欲しい「連結・スーテッドの高札」は**方向が逆**なので、ここでも引っ張り合いが起きる。`A-2-3-4`（ナッツバドゥーギ）はオマハではほぼ無力。\n\n現実的には、バドゥーギ側のナッツを狙いつつオマハは拾えたら、という運びが多い。フロップ後のドローで、オマハ側のメイドが強ければパットしてバドゥーギを諦める判断も。バドゥーギ側ではスノーが効くが、スプリットゆえ控えめに。\n\n---\n\n## 計算の前提\n\n- **PATモデル**：「配られた5枚（ドロー前／パット相当）＋ボード」でスプリットを計算。**1回ドローの改善は明示的には模擬していません**（ドローの巧拙が実戦のスキル層）。\n- バドゥーギ側＝5枚から最良4枚バドゥーギ（A低・無ければ3枚 tri）、オマハ側＝ホール2＋ボード3のハイ。両者とも常に成立。\n- 数値はオリジナルのモンテカルロ（各2,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "a5td": "# A-5 トリプルドロー 完全ガイド\n\n### エース・トゥ・ファイブ（カリフォルニア・ローボール）\n\nA-5 トリプルドローは、2-7と並ぶミックスの定番ローボール。5枚を3回引いて一番低いA-5ローを作る一人勝ちゲームだ。2-7と決定的に違うのは、ストレートもフラッシュもローに響かないこと。エースは最弱の1として扱い、ナッツは A-2-3-4-5 のホイールになる。配り・ベット・ドローの構造は2-7と同じだが、この「数え方の違い」が戦略を大きく変える。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**A絡みの連結低4枚（A-2-3-4 型）。ストレート・フラッシュは無視**（狙い7〜ホイール）\n\n- ◎ **プレミアム**：4枚ホイール・4枚6（強ロードロー）／パットの7以下\n- ○ **プレイアブル**：A入りの低3枚＋引き\n- △ **スチール/限定**：弱い1枚引き → ボタン\n\n**ポジション目安**：トリプルドロー＝レイトで緩める。**ラフ8は割って引く**。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | 5枚・**トリプルドロー**（ドロー3回・ベット4回） |\n| 役 | **A-5ロー**。Aは低、**ストレート/フラッシュは無視** |\n| ナッツ | **A-2-3-4-5（ホイール）**、次いで 6-4-3-2-A… |\n| 勝者 | 最も低い5枚（一人勝ち・スプリットなし） |\n\nA-5では**無ペアが全てのペアに勝つ**。`6-5-4-3-2`（スムーズ6）＞`6-6-…`。\n\n## 基本と狙い\n\n狙いは7ロー〜ホイール。8ローは「メイドだが重い」手で、9以上のパットは多人数ではまず勝てない。同じ8でもスムース（2番目に低い札が低い）かラフかで価値が大きく変わり、8-4-3-2-A は 8-7-6-5-4 に楽勝する。エースは2-7のディースほど特別ではなく、ストレートを恐れる必要もないので、A-2-3-4 のように連結した低札を素直に引いていい。ペアは——どれだけ低くても——無ペアに全敗するので、低札のペアや高札から先に捨てる。\n\n## スターティング\n\n| ハンド | eq%（HU） |\n|---|---|\n| A-2-3-4-5 パット・ホイール | ~100 |\n| A-2-3-4 ＋ ブリック（1枚引き） | 82 |\n| 8-7-6-5-4 ラフ8（パット） | 71 |\n\n## 1ハンドの流れ（例）\n\nボタンに `A♦2♠3♥6♣ K♠`（A-2-3-6＝強い1枚引き）。\n- **1st draw前**：レイズ、コール。Kを捨て1枚引き。\n- **draw1**：`5♣` を引く → **6-5-3-2-A の6ロー**。相手も1枚引き。ベット、コール。\n- **2nd・3rd draw**：あなた**パット**（6ローは十分強く、ストレートも怖くない）。相手は引いてブリック。\n- **ショーダウン**：6-5-3-2-A が勝ち。\n\n**ねらい**：A-5はストレートを恐れず、A絡みの低い連結を素直に引いてnuttedな6へ。2-7ほどスノーに頼らない。\n\n## 深掘り：2-7 との決定的な違い\n\nA-5は2-7と同じトリプルドローでも、戦略の重心がずれる。**エースは最良札だが、2-7のディースほど決定的ではない**——ストレートが役にならない（不利でない）ので、`3-4-5-7` のような手は素直に引いて勝ちにいける。だから**エース無しの3ホイールカードでもアーリーからプレイ可**なことが多い。\n\nスノーが少ないのも大きな違い。straightが手を壊さないぶん、2-7のように「ストレート目の1枚引きをブラフに転じる」動機が薄く、多くのプレイヤーは単純に引いてショーダウンを目指す。**セミブラフ的なターンレイズも2-7より減る**。\n\nその代わりA-5では**レイズが respect されやすい**（良い7をバリューレイズで切ってくる相手が少ない）。これを逆用し、弱いと読めた相手を狙える。例：ボタンで `A-2-5` を開け、SBが1枚引き——3ベットしてこなかったので、おそらく7止まりのラフな1枚引き。受け身な引き枚数が手を教えてくれる。\n\nホイールを割る判断は慎重に。`7-5-4-3-2` をメイド6以上のレンジにレイズされても、`A-2-3-4` へ割るのは多くの場合無意味（最弱の6=`6-5-4-3-2` では勝てず、エース1枚しか救ってくれない）。割るのは `A-2-3-4`/`A-2-3-5` へのプレミアムドローがあるときだけ。**nutted な手を作れること**がA-5の生命線だ。\n\n---\n\n## 計算の前提\n\n- モデル：3回のドローを「低い distinct 札を残し、7以下メイドでパット、9+は割って引く」**近似**で自動進行し、A-5キー（無ペア優先・A低）で一人勝ちを判定。\n- 数値はオリジナルのモンテカルロ（各4,200試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "razzdeucey": "# Razz-deucey 完全ガイド\n\n### バドゥーギ × 2-7ロー を“スタッド形式”で（Super Razz-dugi 2-7）\n\nスーパースタッド形式（5枚配り→2枚捨て→最終7枚）で、バドゥーギ（エース高）と2-7ローを争うスプリット。ドローではなくスタッドでバドゥーギを作る珍しい形で、両側とも常に成立するため狙いはスクープになる。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**散った低3枚（2-3-4 型）。Aは高で不利**（バドゥーギ先→2-7フリーロール）\n\n- ◎ **プレミアム**：3枚レインボー低札（2-3-4・2-3-5）\n- ○ **プレイアブル**：2/3入りの3枚（バドゥーギ寄り）\n- △ **スチール/限定**：A高絡み → 評価を下げる\n\n**ポジション目安**：スタッド＝見せ札・死札。**3枚レインボー**で入る。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | **Super Stud**（5枚→2枚捨て→3枚→7枚） |\n| バドゥーギ側 | 7枚から最良の4枚バド **ハイ/ローで2分割**（盤ごとではない） |\n| ロー不成立 | どちらの盤でも8ローが無ければ、ハイが総取り |\n\nハイとローは**別々の盤を使ってよい**（ハイは盤A、ローは盤B など）。\n\n## 基本と狙い\n\nローは特に強力で、片方の盤でナッツローを作れば半分は確保しやすい。A-2絡みを持てばロー側はかなり堅く、問題はハイ——2盤のどちらかでナッツハイを取りにいく。スクープには「ローを両盤でカバーしつつ片盤のハイをナッツで取る」二刀流が要る。多人数でローが収束しやすいぶんクォーターの危険は健在で、bareな2番手で2盤ぶんのビッグベットに付き合わない。\n\n## スターティング\n\n| ハンド | eq% | ハイ獲得% | ロー獲得% |\n|---|---|---|---|\n| A-A-2-3-K ダブルスート | 70 | 61 | 71 |\n| A-2-3-4-5 ダブルスート | 65 | 48 | 80 |\n| K-K-Q-Q-J（ハイonly） | 39 | 65 | 0 |\n\n## 1ハンドの流れ（例）\n\nダブルボード（5枚オマハ・ハイロー）。\n- 手札 `A♠2♠3♥K♦Q♦`。**盤1**でA-2絡みの**ナッツロー成立**→ロー半分を確保。\n- **盤2**でKQやフラッシュがハイに刺されば、ハイも取れて**スクープ**。\n- ハイ／ローはそれぞれ「2盤の良い方」で決まる（盤ごとではない）。\n\n**ねらい**：2盤あるぶんナッツのヒット率が上がる。ローを堅く確保し、ハイをどちらかの盤で取りにいく。\n\n## 深掘り：2盤がナッツ確率を倍にする\n\nダブルボードでは、ハイは「2盤のうち良い方」、ローも「2盤のうち良い方」で、ポットを**ハイ/ローに2分割**（盤ごとではない）。これは**ナッツ性の価値を増幅**する——どちらかの盤で当たればよいので、ナッツへ向かう手のヒット率が実質上がる。\n\nローは特に強力。**片方の盤でナッツローを作れば半分は確保**しやすく、5枚オマハ（Big-O型）でA-2絡みを持てばロー側はかなり堅い。問題はハイで、2盤のどちらかでナッツハイを取りにいく。スクープには「ローを両盤でカバーしつつ、片盤のハイをナッツで取る」二刀流が要る。\n\nクォーターの危険は健在（多人数でローが収束しやすい）。bare な2番手で2盤ぶんのビッグベットに付き合わない。`A-2-3＋高スーテッド` のような**両方向ナッツ性のある5枚**が、ダブルボードで最も効率よくスクープに向かう。\n\n---\n\n## 計算の前提\n\n- モデル：各プレイヤーの**ハイ＝2盤のうち良い方**（omahaHigh5）、**ロー＝2盤のうち良い方の8資格ロー**（omahaLow8_5）を採用し、**ポットをハイ/ローで1回だけ分割**（splitShare/resolveSplit）。盤ごとの分割ではありません。\n- ハイとローは別々の盤を使用可。ロー不成立（両盤とも8ロー無し）ならハイが総取り。\n- EQUITYは両盤ランダム、VS HANDは各盤を 0・3・4・5枚で指定可（空＝ランダム）。\n- 数値はオリジナルのモンテカルロ（各3,000試行）。相手ランダム想定で絶対値は高め。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "dboardBigO": "# ダブルボード5枚オマハ（ハイ×ハイ）完全ガイド\n\n### 盤が2つ、どちらも“ハイのみ”を競う\n\n5枚オマハ（ビッグO型）を、ボード2つで「ハイのみ」競うダブルボード。各盤のベストハイがそれぞれ半分を取る。片盤を取りもう片盤を落とせば取り分は減るので、狙いは両盤スクープだ。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**AAKK級の大ダブルペア／ブロードウェイ／DSランダウン＝高さ重視**（ロー志向は弱い）\n\n- ◎ **プレミアム**：AAKK級ダブルペア／DSブロードウェイ・ランダウン\n- ○ **プレイアブル**：高い連結DS（KQJT9）\n- △ **スチール/限定**：ロー志向（A2345） → ハイのみでは平凡\n\n**ポジション目安**：高さ＝ナッツ志向。2番手は両盤で削られる。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| ホール | **5枚**（ビッグO型・ちょうど2枚使用） |\n| ボード | **2つ**（各フロップ3・ターン1・リバー1） |\n| 役 | 各盤で**ホール2＋盤3のハイのみ**（ローなし） |\n| 分配 | **盤ごとに半分**→各盤のベストハイが取る（最大2分割） |\n| スクープ | 両盤のハイを取る |\n\n## 基本と狙い\n\nそのためには多くのボードテクスチャに当たる手——高ランダウン・大ペア（セット）・ナッツフラッシュ性——を、2盤の別々の面に合わせて当てにいく。札が5枚あるぶん、片盤でナッツフラッシュ・もう片盤でストレートやセット、という分業ができる手が理想。中位・支配される手は2盤あるぶんどちらかで上を引かれやすいので、ナッツ性をさらに重視する。\n\n## スターティング\n\n| ハンド | eq% | 盤1勝率 | 盤2勝率 |\n|---|---|---|---|\n| AAKK＋札（大ダブルペア） | 64 | 64 | 64 |\n| KQJT9 ダブルスート | 57 | 58 | 59 |\n| A2345（ロー志向） | 45 | 46 | 46 |\n\n## 1ハンドの流れ（例）\n\nダブルボード（5枚オマハ・ハイ×ハイ）。\n- 各盤のベストハイがそれぞれ半分。手札 `A♠K♠Q♦J♦9♥`。\n- **盤1**でナッツフラッシュ、**盤2**でストレート——別々の面に当てて**両盤スクープ**を狙う。\n- 片盤しか勝てなければ半分、チョップなら4分の1。\n\n**ねらい**：多くの面に当たる手（ナッツフラッシュ性・高ランダウン）で両盤を狙う。中位手は2盤あるぶんどこかで上を引かれる。\n\n## 深掘り：両盤ハイ×ハイ、スクープ設計\n\ndboardBigO は2盤とも**ハイのみ**を争い、各盤が半分。片盤を取りもう片盤を落とせば（またはチョップ）取り分は減るので、狙いは**両盤スクープ**。そのためには「多くのボードテクスチャに当たる」手——**高ランダウン・大ペア（セット）・ナッツフラッシュ性**を、2盤の別々の面に合わせて当てにいく。\n\n5枚オマハ（Big-O型）なので2枚組の数が多く、片盤でナッツフラッシュ、もう片盤でストレート/セット、という分業ができる手が理想。`A` 絡みのナッツフラッシュ性は、どちらの盤でも効く保険になる。中位・支配される手は2盤あるぶん**どちらかで上を引かれやすい**ので、ナッツ性をさらに重視する。変動は大きく、誰かが片盤でナッツを持ちやすい前提で、bare な2番手のオールインを避ける。\n\n---\n\n## 計算の前提\n\n- モデル：2つのボードを独立に評価し、**各盤を resolveHigh（ハイのみ）で分配→2盤を平均**（各盤が半分）。ローは一切使用しません。EQUITYは両盤ランダム、VS HANDは各盤を 0・3・4・5枚で指定可（空＝ランダム）。\n- 数値はオリジナルのモンテカルロ（各3,000試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "actionrazz": "# Super Action Razz 完全ガイド\n\n### ペイント（J/Q/K）を持てば勝てる、ひっくり返るラズ\n\nA-5ローのスーパースタッドだが、J・Q・K のいずれかを持つと「Face」となり、Face は無条件で「Butt」（絵札無し）に勝つ。通常ラズではゴミの絵札が、ここでは資格そのものになる、ひっくり返ったラズだ。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**まず資格（J/Q/K）の当て。プレミアム低（A-2-3）はペイントを引きにいく**（4-6-7の凡庸低は降り）\n\n- ◎ **プレミアム**：A-2-3級の強ロー（約70%でペイント成立）／資格済み＋そこそこ低\n- ○ **プレイアブル**：A-2-4 等の低3枚（ペイント狙い）\n- △ **スチール/限定**：高札アップでも資格済みなら戦える\n\n**ポジション目安**：スタッド＝資格状況＋見せ札。HUで資格済み＆相手ペイント無し→コール。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | **Super Stud**（5枚→2枚捨て→7枚）／A-5ロー |\n| 資格 | **7枚中に J/Q/K が1枚以上**で「Face」。無ければ「Butt」 |\n| 強さ | **Face は無条件で Butt に勝つ**。同グループ内は A-5ローで比較 |\n| ペイント | **最終5枚に含めなくてよい**（持っているだけで資格） |\n| 全員Butt | 通常ラズ（最も低い手）が勝つ |\n\n例：`A♥2♥3♠4♣5♦6♠7♣`（通常ラズのナッツ）は **Butt**。`K♥K♦K♠K♣Q♦Q♠Q♣` は **Face**。後者（フェイスのフルハウス！）が勝ちます。\n\n## 基本と狙い\n\n戦略は二択に分かれる。全員Buttのときに勝てる強いA-5ローを持つか、Faceになり Face同士の比較（A-5ロー）でも勝てる「ローの良いFace」を持つか。最悪なのは絵札も無くローも中途半端な手だ。7枚配られれば誰かが絵札を持つ確率は高いので、純ロー戦略はリスキー——自分の絵札を保険として残す価値が大きい。捨て札では絵札を確保しつつローを最良化する。\n\n## スターティング\n\n| ハンド | eq%（HU） |\n|---|---|\n| A-2-3（プレミアム低） | 56 |\n| 4-6-7（凡庸＝罠） | 53 |\n| 8-9-T（高すぎ） | 42 |\n\n## 1ハンドの流れ（例）\n\n- あなたは `(A♠2♥)5♦`＝絶好のA-5ロー。だが相手の表に **K♠（＝Face）**。\n- **Faceは無条件でButt（絵札なし）に勝つ**ので、良いローでも相手がFaceならこのままでは負け。\n- あなたも J を引けば Face入り。**Face同士はA-5ローで比較**→あなたのローが勝つ。\n\n**ねらい**：絵札（ペイント）が資格そのもの。強いローを持つか、ローの良いFaceを狙う。絵札ゼロの中途半端が一番弱い。\n\n## 深掘り：ペイントが価値を反転させる\n\nAction Razz の核心は「**J/Q/K を1枚でも持てば Face、Face は無条件で Butt に勝つ**」というルール。通常ラズでゴミの絵札が、ここでは資格そのものになる。だから戦略は二択に分かれる——**(1) 全員 Butt のときに勝てる強いA-5ロー**を持つか、**(2) Face になり、しかも Face 同士の比較（A-5ロー）で勝てる「ローの良い Face」**を持つか。最悪なのは絵札も無く・ローも中途半端な手だ。\n\n確率的に、7枚配られれば**誰かが絵札を持つ可能性は高い**（J/Q/K＝12枚）。つまり「全員 Butt」を当て込む純ロー戦略はリスキーで、**自分の絵札を保険として残す**価値が大きい。スーパースタッドの捨て札では、絵札を確保しつつ A-5ローを最良化する3枚を残すのが基本。相手の見せ札に絵札があれば Face 濃厚＝こちらが Butt なら勝てない、と読む。アグレッションでは「Face を持っている」表現が効く。\n\n---\n\n## 計算の前提\n\n- モデル：5枚→**3枚の低札を保持**（ペイントは基本捨て）→7枚へ完成→**Face（J/Q/K保有）優先＋A-5ロー**で一人勝ちを判定。「3枚保持→4枚引きでペイント狙い（約70%）」という標準ラインを近似しています（資格を固定するために敢えてペイントを残す上級ラインまでは模擬していません）。このため、プレミアム低同士のエクイティはペイント変動でやや圧縮されます。\n- 数値はオリジナルのモンテカルロ（各4,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 新興・未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "pickem": "# ドラマハ ピッケム（Dramaha Pick'em）完全ガイド\n\n### UTGが5枚を見て、7変種から「自分に最も得な勝負」を選ぶ\n\nUTG が強制レイズインで、7つのドロー側変種から1つを選んで全員がプレイする変則ゲーム。鍵は、配られた5枚がどの変種で最も高いエクイティを持つかを見抜くことだ。\n\n## スターティング早見（覚え方）\n\n**覚え方**：**配られた5枚が\"どの変種で一番強いか\"を見て選ぶ**。土俵を選べる＝常に何かしらで戦える。\n\n- ◎ **プレミアム**：1つの変種で頭ひとつ抜ける手（AAAA→Hi/Hi-dugi、ホイール→Badugi/Low、TTTT9→49、5フェイス→0）\n- ○ **プレイアブル**：中札主体（7〜T）は **49** で強い／散った低札は **Badugi・Low・2-7**\n- △ **避けたい**：どの変種でも中途半端な「ちぐはぐ5枚」（例：高低バラバラでペアもスートも噛まない）\n\n**ポジション目安**：UTGはプリフロップに変種を指名（＝主導権だが強制参加）。後続は「選ばれた変種＋オマハ」で勝負。**ドロー側がオマハ側より重要**。Zero(0)が最も action があり playable とされる。\n\n## ルール\n\n| 項目 | 内容 |\n|---|---|\n| 構造 | Drawmaha（5枚・フロップ・1ドロー・ターン・リバー）／ポットは **ドロー側½＋オマハ・ハイ½** |\n| 選択 | **UTGが強制レイズイン**。5枚を見て7変種から1つ指名、その Drawmaha を全員でプレイ |\n| Hi | 5枚ハイ役（ファイブカードドロー）。ナッツ=ロイヤル |\n| Low | A-5ロー（資格無し）。ナッツ=ホイール A-2-3-4-5 |\n| 2-7 | 2-7ロー。ナッツ=2-3-4-5-7（フラッシュ以外） |\n| Badugi | 低バドゥーギ。ナッツ=A-2-3-4（異4色） |\n| Hi-dugi | **高バドゥーギ**：異4色だが**ペア/トリップス/クアッズが良い**。ナッツ=**A-A-A-A** |\n| 49 | 点数最大（J/Q/K=0・A=1・他=数値、**T=10**）。ナッツ=TTTT9=49点 |\n| 0 | 点数最小（同上）。ナッツ=5枚フェイス=0点。**T=10なので注意** |\n\n## 基本と狙い\n\n本ツールのPICK'EM判定は、各変種のドロー側エクイティを相手人数ぶん込みで計算してランキングする。実戦の指針はシンプルで、相手が多いほど「すでに強い／完成した変種」を選ぶ——引きに頼る変種は人数が増えるほど沈む。極端な手は専用変種が刺さり、全札が高ければ49、全部フェイス系なら0、ホイール系なら Low/Badugi、低く distinct なら Badugi/Hi-dugi が候補。「この5枚が一番ナッツに近い土俵」を選ぶのが本質だ。\n\n## 1ハンドの流れ（例）\n\n- UTGで強制レイズイン。配られた5枚 `A♠2♥3♦4♣6♠`（低くdistinct）。\n- この手は **A-5ロー でも Badugi でも強い**。PICK'EM判定で上位に出る変種（Low / Badugi）を選択。\n- 全員がその変種をプレイし、あなたが最もナッツに近い土俵で戦える。\n\n**ねらい**：5枚が一番ナッツに近い土俵を選ぶ。相手が多いほど、引きに頼らない完成寄りの変種を。\n\n## 深掘り：5枚を「どの変種に当てるか」のメタゲーム\n\nDramaha Pick'em は、UTG が強制レイズインで**7つのドロー側変種から1つを選ぶ**。鍵は、配られた5枚が**どの変種で最も高いエクイティを持つか**を見抜くこと。本ツールの PICK'EM 判定は、各変種のドロー側エクイティを相手人数ぶん込みで計算し、ランキングする。\n\n実戦の指針：**相手が多いほど、すでに完成/強い変種**を選ぶ（引きに頼る変種は人数が増えるほど沈む）。極端な手は専用変種が刺さる——全札が高ければ「49（点数最大）」、全部フェイス系なら「0（点数最小）」、ホイール系なら Low/Badugi、低く distinct なら Badugi/Hi-dugi。ブロッカー（自分が相手の必要札を持つ）も、競合変種での優劣に効く。**「この5枚が一番ナッツに近い土俵」を選ぶ**のが、Pick'em の本質だ。\n\n---\n\n## 計算の前提\n\n- モデル：入力した5枚を**パット（引き直さない）**として、7変種それぞれで相手ランダム5枚×人数とドロー側を比較し勝率を算出（各変種2,500試行）。**オマハ・ハイ半分は判定に含めません**（ピックを左右するのはドロー側のため）。\n- 評価器：Hi=5枚ハイ役 / Low=A-5 / 2-7=2-7ロー / Badugi=低バドゥーギ / Hi-dugi=高バドゥーギ（AAAA頂点）/ 49=点数最大 / 0=点数最小（face=0・A=1・T=10）。\n- 相手ランダム想定のため絶対値は高め。読むべきは**順位**。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n"};

/* ===== minimal markdown renderer (self-contained) ===== */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inline(s){
  s=esc(s);
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\[([^\]]+)\]\(#([A-Za-z0-9_]+)\)/g,'<a href="#" class="golink" data-go="$2">$1</a>');
  s=s.replace(/\[([^\]]+)\]\(((?:https?:[^)]+)|[^):\s]+\.html)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/◎/g,'<span class="rk rk-best">◎</span>').replace(/○/g,'<span class="rk rk-ok">○</span>').replace(/△/g,'<span class="rk rk-mid">△</span>').replace(/✕/g,'<span class="rk rk-no">✕</span>');
  return s;
}
function renderMD(src){
  const lines=src.replace(/\r/g,'').split('\n');
  let html='', i=0;
  function flushList(){}
  while(i<lines.length){
    let ln=lines[i];
    // table
    if(/^\s*\|/.test(ln) && i+1<lines.length && /^\s*\|?[\s:|-]+\|/.test(lines[i+1]) && lines[i+1].includes('-')){
      const header=ln.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      i+=2; const rows=[];
      while(i<lines.length && /^\s*\|/.test(lines[i])){
        rows.push(lines[i].trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim())); i++;
      }
      let t='<div class="tablewrap"><table><thead><tr>';
      const isNumCol=[]; for(let kk=0;kk<header.length;kk++){ let nn=0,tt=0; rows.forEach(r=>{ const c=(r[kk]||'').trim(); if(c){tt++; if(/^[\d.\s/+\-―—%]+$/.test(c)) nn++;} }); isNumCol[kk]= kk>0 && tt>0 && nn/tt>=0.6; } header.forEach((h,k)=>t+='<th'+(isNumCol[k]?' class="num"':'')+'>'+inline(h)+'</th>'); t+='</tr></thead><tbody>';
      rows.forEach(r=>{ t+='<tr>'; for(let k=0;k<header.length;k++) t+='<td'+(isNumCol[k]?' class="num"':'')+'>'+inline(r[k]||'')+'</td>'; t+='</tr>'; });
      t+='</tbody></table></div>'; html+=t; continue;
    }
    // headings
    let m;
    if(m=ln.match(/^(#{1,4})\s+(.*)$/)){ const lv=m[1].length; const tx=m[2]; let hc=''; if(lv===2){ if(/早見/.test(tx)) hc=' class="h2-cheat"'; else if(/^深掘り/.test(tx)) hc=' class="h2-deep"'; else if(/ハンドの流れ/.test(tx)) hc=' class="h2-ex"'; } html+='<h'+lv+hc+'>'+inline(tx)+'</h'+lv+'>'; i++; continue; }
    // hr
    if(/^\s*---+\s*$/.test(ln)){ html+='<hr>'; i++; continue; }
    // blockquote (consecutive >)
    if(/^\s*>/.test(ln)){
      let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      html+='<blockquote>'+buf.map(b=> b.trim()? '<p>'+inline(b)+'</p>':'').join('')+'</blockquote>'; continue;
    }
    // unordered list
    if(/^\s*[-*・]\s+/.test(ln)){
      let buf=[];
      while(i<lines.length && /^\s*[-*・]\s+/.test(lines[i])){ buf.push(lines[i].replace(/^\s*[-*・]\s+/,'')); i++; }
      html+='<ul>'+buf.map(b=>'<li>'+inline(b)+'</li>').join('')+'</ul>'; continue;
    }
    // ordered list
    if(/^\s*\d+\.\s+/.test(ln)){
      let buf=[];
      while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ buf.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; }
      html+='<ol>'+buf.map(b=>'<li>'+inline(b)+'</li>').join('')+'</ol>'; continue;
    }
    // blank
    if(/^\s*$/.test(ln)){ i++; continue; }
    // paragraph (gather until blank / block)
    let buf=[ln]; i++;
    while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^\s*[#>|]/.test(lines[i]) && !/^\s*---+\s*$/.test(lines[i])
          && !/^\s*[-*・]\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i])){ buf.push(lines[i]); i++; }
    html+='<p>'+buf.map(inline).join('<br>')+'</p>';
  }
  return html;
}

function switchGroup(grp){
  if(grp===curGroup) return;
  curGroup=grp;
  document.querySelectorAll('.grpbtn').forEach(x=>x.classList.toggle('on', x.dataset.grp===grp));
  document.getElementById('brandsub').textContent = grp==='core' ? '王道 10ゲーム' : 'エキゾチック ANOTHER';
  const first = GAMES.find(g=>g.grp===grp);  // overview of that collection
  selectGame(first.id);
}
document.querySelectorAll('.grpbtn').forEach(btn=>{ btn.onclick=()=>switchGroup(btn.dataset.grp); });

function selectGame(id){
  curGame=id; curTab='guide';
  const g=GAMES.find(x=>x.id===id);
  if(g.grp && g.grp!==curGroup){ curGroup=g.grp; document.querySelectorAll('.grpbtn').forEach(x=>x.classList.toggle('on', x.dataset.grp===g.grp)); document.getElementById('brandsub').textContent = g.grp==='core' ? '王道 10ゲーム' : 'エキゾチック ANOTHER'; }

function wireCalc(g){
  selected=[];
  // selected row
  renderSel(g);
  // presets
  const pres=PRESETS[g.id]||[];
  const pe=document.getElementById('presets');
  pe.innerHTML=pres.map((p,k)=>'<button class="preset" data-k="'+k+'"><span class="pc">'+
    p.c.map(cardChip).join(' ')+'</span>'+p.n+'</button>').join('');
  pe.querySelectorAll('.preset').forEach(btn=>{
    btn.onclick=()=>{ const p=pres[btn.dataset.k]; selected=p.c.map(parseCard); renderSel(g); renderDeck(g); clearResult(); };
  });
  // deck
  renderDeck(g);
  // segments
  const seg=document.getElementById('seg');
  seg.innerHTML=g.opps.map(o=>'<button data-o="'+o+'"'+(curOpps[g.id]===o?' class="on"':'')+'>'+o+'</button>').join('');
  seg.querySelectorAll('button').forEach(b=>{ b.onclick=()=>{ curOpps[g.id]=+b.dataset.o;
    seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b)); clearResult(); }; });
  // run
  document.getElementById('runbtn').onclick=()=>runCalc(g);
}
function cardChip(str){ const r=str[0], s=str[1]; const cls=(SUITIDX[s]===1||SUITIDX[s]===2)?'color:var(--red)':'color:#e9e7e1';
  return '<span style="'+cls+'">'+r+SUITSYM[s]+'</span>'; }

function renderSel(g){
  const row=document.getElementById('selrow'); if(!row) return;
  let h='';
  for(let k=0;k<g.hole;k++){
    if(selected[k]){ const cc=selected[k]; const cls=suitClass(cc.s)==='red'?'r-red':'r-lt';
      h+='<div class="sel-card '+cls+'" data-k="'+k+'">'+RLABEL[cc.r]+'<span class="s">'+SUITSYM[SUITNAME[cc.s]]+'</span><span class="x">×</span></div>';
    } else { h+='<div class="sel-slot">'+(k+1)+'</div>'; }
  }
  h+='<button class="sel-clear" id="selclear">すべてクリア</button>';
  row.innerHTML=h;
  row.querySelectorAll('.sel-card').forEach(el=>{ el.onclick=()=>{ selected.splice(+el.dataset.k,1); renderSel(g); renderDeck(g); clearResult(); }; });
  const sc=document.getElementById('selclear'); if(sc) sc.onclick=()=>{ selected=[]; renderSel(g); renderDeck(g); clearResult(); };
}

function renderDeck(g){
  const deck=document.getElementById('deck'); if(!deck) return;
  const usedIds=new Set(selected.map(c=>c.id));
  const full = (selected.length>=g.hole);
  const order=['s','h','d','c'];
  let h='';
  for(const su of order){
    h+='<div class="deck-row">';
    for(const rl of ['A','K','Q','J','T','9','8','7','6','5','4','3','2']){
      const r=RVAL[rl], s=SUITIDX[su], id=mkid(r,s);
      const on=usedIds.has(id);
      const dim=(!on && full)?' dim':'';
      const rc=(s===1||s===2)?'red':'lt';
      h+='<div class="pcard '+rc+(on?' on':'')+dim+'" data-r="'+r+'" data-s="'+s+'" data-id="'+id+'">'+
         rl+'<span class="s">'+SUITSYM[su]+'</span></div>';
    }
    h+='</div>';
  }
  deck.innerHTML=h;
  deck.querySelectorAll('.pcard').forEach(el=>{
    el.onclick=()=>{
      const id=+el.dataset.id;
      const ix=selected.findIndex(c=>c.id===id);
      if(ix>=0){ selected.splice(ix,1); }
      else { if(selected.length>=g.hole) return; selected.push({r:+el.dataset.r,s:+el.dataset.s,id:id}); }
      renderSel(g); renderDeck(g); clearResult();
    };
  });
}

function clearResult(){ const r=document.getElementById('result'); if(r){ r.classList.remove('show'); r.innerHTML=''; }
  const w=document.getElementById('warn'); if(w) w.textContent=''; }

function runCalc(g){
  if(running) return;
  const warn=document.getElementById('warn');
  if(selected.length!==g.hole){ warn.textContent='⚠ '+g.hole+'枚すべて選んでください（現在 '+selected.length+'枚）。'; return; }
  warn.textContent='';
  running=true;
  const gid=g.id;
  const hero=selected.map(c=>({r:c.r,s:c.s,id:c.id}));
  const kind=g.kind, draws=g.draws||0, nopp=curOpps[g.id];
  if(kind==='pickem'){ running=false; return runPickem(g, hero, nopp); }
  const total=TRIALS[kind];
  let done=0, sumShare=0, scoop=0, hi=0, lo=0;
  const runbtn=document.getElementById('runbtn'); runbtn.disabled=true; runbtn.textContent='計算中…';
  const pw=document.getElementById('progwrap'); pw.classList.add('show');
  const pf=document.getElementById('progfill'), pt=document.getElementById('progtxt');
  clearResult();
  function batch(){
    const N=Math.min(300, total-done);
    for(let i=0;i<N;i++){
      const r=MIXENGINE.oneTrial(kind,hero,nopp,draws);
      sumShare+=r.share; if(r.scoop)scoop++; if(r.hi)hi++; if(r.lo)lo++;
    }
    done+=N;
    const frac=done/total;
    pf.style.width=(frac*100).toFixed(1)+'%';
    pt.textContent='SIMULATING  '+done.toLocaleString()+' / '+total.toLocaleString()+' deals';
    if(done<total){ setTimeout(batch,0); }
    else{ running=false; runbtn.disabled=false; runbtn.textContent='RUN ▸';
      setTimeout(()=>pw.classList.remove('show'),400);
      if(curGame===gid && curTab==='calc')
        showResult(g,{eq:sumShare/total, scoop:scoop/total, hi:hi/total, lo:lo/total, nopp:nopp, total:total});
    }
  }
  batch();
}

function showResult(g,R){
  const be = R.nopp===1?0.5 : R.nopp===2? (1/3) : 0.25;
  const beStr = R.nopp===1?'50%': R.nopp===2?'33.3%':'25%';
  const diff=(R.eq-be)*100;
  const evCls=diff>=0?'ev-up':'ev-dn';
  const evTxt=(diff>=0?'＋':'−')+Math.abs(diff).toFixed(1)+'pt';
  const winLabel = g.lowwin? '勝率（このハンドが勝つ確率）' : (g.split? 'エクイティ（取り分の期待値）':'エクイティ（勝率）');

  let splitHTML='';
  if(g.split){
    splitHTML='<div class="res-split">'+
      cell((g.hiLabel||'HI')+'を取る','(その半分を獲得)',R.hi)+
      cell((g.loLabel||'LO')+'を取る','(その半分を獲得)',R.lo)+
      cell('SCOOP','(ハイ＋ロー総取り)',R.scoop)+
      '</div>'+
      '<div class="res-note">※ '+((g.kind==='badacey'||g.kind==='baduecey')?'2つのローを別々に競い、両者とも常に成立（不成立で総取りは無し）。':'ハイロー・スプリットでは「ロー不成立なら高い手が総取り」。')+
      'エクイティ＝取り分の期待値（½＋½や総取りを平均化した値）です。'+
      'スクープ率が高いほど“事故りにくい”強い手。</div>';
  } else if(g.lowwin){
    splitHTML='<div class="res-note">※ '+(g.kind==='razz'?'A-5 の一番低い5枚':g.kind==='badugi'?'最も低い「異なる4ランク＋異なる4スート」':'2-7（エースは最強＝悪い／ストレート・フラッシュは役として不利）の最も低い手')+
      'を作った人が勝ち。表示は「あなたが勝つ確率」です。</div>';
  }

  const html=
    '<h4 style="margin-bottom:18px"><span class="num">03</span> 結果</h4>'+
    '<div class="res-main">'+
      '<div class="res-big"><span class="cap">'+(g.lowwin?'WIN RATE':'EQUITY')+'</span>'+
        '<span class="val">'+(R.eq*100).toFixed(1)+'<span class="pct">%</span></span></div>'+
      '<div class="res-be">'+winLabel+'<br>損益分岐（'+R.nopp+'人）= <b>'+beStr+'</b>　→　'+
        '<b class="'+evCls+'">'+evTxt+'</b> '+(diff>=0?'有利（参加してOKの目安）':'不利（このスポットは降り寄り）')+'</div>'+
    '</div>'+
    splitHTML+
    '<div class="res-note" style="margin-top:20px; color:var(--faint)">'+
      'シミュレーション回数 '+R.total.toLocaleString()+' 回・相手ランダム'+R.nopp+'人想定。'+
      '乱数モンテカルロのため毎回±0.3〜0.8%程度ぶれます。読むべきは小数点以下ではなく「損益分岐を超えているか／順位」。</div>';

  const r=document.getElementById('result'); r.innerHTML=html; r.classList.add('show');
}
function runPickem(g, hero, nopp){
  running=true;

  const pw=document.getElementById('progwrap'); pw.classList.add('show');
  const pf=document.getElementById('progfill'), pt=document.getElementById('progtxt');

    const adv=MIXENGINE.pickemAdvise(hero, nopp, 2500);

let vs=null;
function newVs(g){ return {active:'hero', hero:[], opps:[[],[],[]], nopp:1, board:[], board2:[], heroDisc:[], oppDisc:[[],[],[]], kcount:(isStud(g)?3:g.hole), ndraws:1}; }
function vsTargets(g){
  const pm=playerMax(g);
  const t=[{key:'hero', nm:'自分', max:pm, tag:'自'}];
  for(let k=0;k<vs.nopp;k++) t.push({key:'opp'+k, nm:'相手'+(k+1), max:pm, tag:'敵'+(k+1)});
  if(isDouble(g)){ t.push({key:'board', nm:'ボード1', max:5, tag:'場1'}); t.push({key:'board2', nm:'ボード2', max:5, tag:'場2'}); }
  else if(isFlop(g)) t.push({key:'board', nm:'ボード', max:5, tag:'場'});
  else if(isComm(g)) t.push({key:'board', nm:'共有(ハイ専用)', max:1, tag:'共'});
  return t;
}
function vsArr(g,key){ if(key==='hero')return vs.hero; if(key==='board')return vs.board; if(key==='board2')return vs.board2; return vs.opps[+key.slice(3)]; }
function vsOwner(g,id){
  if(vs.hero.some(c=>c.id===id)) return 'hero';
  for(let k=0;k<vs.nopp;k++) if(vs.opps[k].some(c=>c.id===id)) return 'opp'+k;
  if((isFlop(g)||isComm(g)||isDouble(g))&&vs.board.some(c=>c.id===id)) return 'board';
  if(isDouble(g)&&vs.board2.some(c=>c.id===id)) return 'board2';
  return null;
}
function vsResetDisc(g,key){ if(key==='hero') vs.heroDisc=[]; else if(key.indexOf('opp')===0) vs.oppDisc[+key.slice(3)]=[]; }

      (g.split?' このゲームは<b>ハイロー・スプリット</b>なので、Hi/Lo の獲得率と<b>総合エクイティ</b>を表示します。':' 勝率（勝ち・引き分け・負け）をグラフで表示します。')+

    '<div class="panel vsres" id="vsres"></div>'+
