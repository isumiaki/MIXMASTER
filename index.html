\n| KQs | 63.4 | 38.5 | ○ |\n| A5s | 60.1 | 31.9 | △（多人数向き） |\n| JTs | 57.1 | 34.1 | △（多人数向き） |\n| 22 | 50.1 | 22.0 | △（セット狙い） |\n| 76s | 45.4 | 25.2 | △（多人数限定） |\n| 72o | 34.9 | 14.3 | ✕ |\n\n### 3-2. 計算から導く閾値\n1. **大ペア・AK が中核**：AA〜JJ、AKs/AQs は HU でも 4人でも基準（50%/25%）を大きく超える。**ビッグカードとペアで強く入る**。\n2. **小ペア（22）は HU五分・4人で22%**＝**セット狙いの投機**。安く多人数で見る形に限る。\n3. **スーテッドコネクター（76s・JTs）・A5s は \"多人数向き\"**：HUでは弱め〜五分だが、4人で25%前後を確保＝**多人数で安く入って大きい役/ドローを狙う**。NLHEほどの価値は無い。\n4. **72o級は論外**（18%）。\n\n> **ひとことルール**：「**大ペア・AK系のビッグカード**」で積極的に。**小ペア・スーテッドコネクターは \"安く・多人数で\" の投機**に限定。**少人数戦ほどビッグカード偏重。**\n\n### 3-3. ポジションと人数\n- ビッグカードはヘッズアップ・少人数で価値が伸びる。**スーテッド系・小ペアは多人数**で価値が出る（FLO8/Stud8と同じ \"投機は多人数、強い素手は少人数\" の原則）。\n\n---\n\n## 4. ストリート別の心がけ\n**プリフロップ**：ビッグカード/大ペアでレイズ主導。投機ハンドは安く多人数で。\n**フロップ**：ヒットしたら**ベット/レイズでプロテクション**（小さいベットでは簡単に降りない＝引かせない打ち方が大事）。ドローはポットオッズで追う。\n**ターン（ビッグ開始）**：ここから倍額。**勝っている手はバリュー、負け筋はオッズが合わなければ降りる**。曖昧なセカンドベストを惰性で追わない。\n**リバー**：ショウダウン志向。**薄いバリューベット**と、オッズが合う**ブラフキャッチ**が収益源。ブラフ自体は通りにくい。\n\n---\n\n## 5. 応用：特殊シチュエーション\n**① マルチウェイのトップペア**：相手が多いほど誰かに負けている確率が上がる。**キッカーとボードの危険度**を見て、無理にビッグベットの応酬をしない。\n**② 小ペアでセット**：FLHでセットは大きな勝ち筋。**バリュー最大化とプロテクション**（多人数では引かせない）。\n**③ ドローのポットオッズ**：固定ベットなので**必要オッズの計算が明確**。フラッシュ/ストレートドローは、提示オッズと（控えめな）インプライドで追えるかを毎回判断。\n\n---\n\n## 6. Equity・戦略の誤解\n- **誤解①「スーテッドコネクター最強（NLHE脳）」** → FLHでは降ろす力・取る力が弱く価値減。**多人数で安く**が前提。\n- **誤解②「コールで様子見」** → 受け身は漏れ。**ベット/レイズ主導**が基本。\n- **誤解③「ブラフで勝てる」** → 小ベットで降ろせない。**バリューとブラフキャッチ**が主戦場。\n- **誤解④「人数を気にしない」** → ビッグカードは少人数、投機は多人数。混同すると事故る。\n\n---\n\n## 7. チェックリスト\n- ✅ 大ペア・AK系のビッグカードで主導的に入っているか\n- ✅ 小ペア・スーテッドコネクターは \"安く・多人数\" に限定したか\n- ✅ ヒット時はプロテクションのベット/レイズができているか\n- ✅ ターン以降、オッズの合わないセカンドベストを降りられているか\n- ✅ ブラフ過多になっていないか（バリューとブラフキャッチ重視）\n\n---\n\n## ★ プロの視点・最新トレンド\n\n- **ミックスで最も\"解かれた\"ゲーム。** ヘッズアップのリミット・ホールデムは、2015年にアルバータ大学の **Cepheus** がほぼ完全に解いた（事実上の弱解）歴史を持つ。near-GTOの戦略表が存在し、**エッジは小さく、主に相手のミスとマルチウェイ（こちらは未解決）から生まれる**。\n- **だからこそ規律が利益。** バリュー主導・薄いバリュー・ブラフキャッチという本ガイドの方針はソルバー的にも妥当。**派手なブラフより、正確なベット/降りの積み重ね**が長期の差。\n- **人数とポジションを混同しない。** ビッグカードは少人数、投機は多人数（計算の通り）。マルチウェイは未解決領域なので、ナッツ志向と降り際の精度がそのまま勝ちに直結。\n\n---\n\n## 8. 計算の前提・参考文献\n数値はテキサスホールデムをphevaluatorで判定するモンテカルロ（各3〜4万試行、相手ランダム／HU=50%・4way=25%）。AA=HU85.0%等が定説と一致＝計算の妥当性を確認済み。**順位と閾値**を読む。\n参考：『Small Stakes Hold'em』(Miller/Sklansky/Malmuth)、『Hold'em Poker for Advanced Players』、各種リミット解説 等。\n\n*学習目的の概算です。金銭を賭けるプレイは自己責任で。*\n", "td27": "# 2-7 Triple Draw 完全ガイド\n### ディース・トゥ・セブン トリプルドロー（ローボール）を勝てる種目にする\n\n> ミックスの定番ドロー種目。**A=最強の高札、ストレート・フラッシュは\"役\"として最悪**。\n> 一番低いノーペア・ノーストレート・ノーフラッシュ＝**7-5-4-3-2** が最強。\n> 3回のドローで最低を目指す。構成は STUD8 ガイドと同じ。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**2か3を含む、7以下の散らばった4枚**（ペア・スート被り・連続＝ストレート目を避ける）\n\n- ◎ **プレミアム**：4枚で7に引ける（2-3-4-7 型）／パットの良い8以下\n- ○ **プレイアブル**：2か3入りの低い3枚（7ロー ドロー）\n- △ **スチール/限定**：弱い1枚引き → ボタン/CO\n\n**ポジション目安**：情報戦＝**レイトで緩める**。パット/引き枚数を読む。\n\n---\n\n## 0. ゴール\n2-7TDで負ける人のミス：①弱い2〜3枚ドローで入りすぎる ②ディース（2）軽視 ③6やストレート/フラッシュの危険を見落とす ④スムースな9を割らず惰性でパット。計算で潰します。\n\n---\n\n## 1. ルール\n- 5枚配り、4ベッティングラウンド＋3ドロー（各ラウンド後に好きな枚数交換）。\n- **Aは高い（＝悪い）。ストレートもフラッシュも\"完成すると最悪\"。** よって **A2345は7-5-4-3-2のような\"ばらけた低札\"より弱い**（むしろA2345は数えるとストレートにならない＝Aハイの弱ロー、6を含む並びは要注意）。\n- ベット：1stドロー前・後がスモール、2nd・3rdドロー後がビッグ。\n- 1ウィナーのリミット＝**TAG（タイト・アグレッシブ）**が王道。入るならレイズ、ヘッズアップに持ち込むリレイズを多用。\n\n---\n\n## 2. 大原則と「カードの価値」\n- **ディース（2）が要**：7ローは2無しでは作れず、2が無いとストレート（6絡み）に化けやすい。\n- **6は危険札**：低い並びのストレートは必ず6を含む。6を引く・残すとストレート完成リスク。\n- **相手のドロー枚数は最大の情報**：1枚替え＝強い、3枚替え＝弱い。**ポジションで相手に先にドローさせる**と有利。\n\n---\n\n## 3. スターティングレンジ\n\n### 3-1. エクイティ・シミュレーション（正直ドローモデル／HU=50% , 3-way=33%）\n\n| スタート（プレイ方針） | HU% | 3-way% | 判定 |\n|---|---|---|---|\n| パット7（75432） | 97.2 | 95.0 | ◎ 最強 |\n| 1枚ドロー→7（2347+K） | 75.7 | 64.5 | ◎ |\n| スムース9を割って→7（97542を9捨て） | 72.2 | 58.7 | ○ 割るのが正解 |\n| 2枚ドロー→7・ディース有（237+KQ） | 60.8 | 47.9 | ○ 標準オープン |\n| ラフなパット8（86432） | 60.5 | **35.6** | △ 多人数で割る/降り |\n| 1枚ドロー→8（2348+K） | 54.1 | **29.0** | △ 多人数で弱い |\n| 2枚ドロー・ディース無（345+KQ） | 67.8 | 50.3 | △ ストレート注意 |\n| 3枚ドロー（23+KQJ） | 64.7 | 48.9 | ✕ 弱い（vsランダム過大評価） |\n\n*※「正直ドローモデル」＝8以下の異ランクを残し、ストレート/フラッシュは上を捨てて引く近似。相手はランダム。絶対値は過大気味で、**順位と方針**を読む。*\n\n### 3-2. 計算＋定石から導く閾値\n1. **パット7は別格**（97%）。**ラフなパット8は多人数で35.6%まで落ちる**＝相手2人以上では割って引くことを検討（定石どおり）。\n2. **1枚ドロー→7（75.7%）が主力**。**スムースな9（97542等）は\"パットせず割って7を引く\"**のが正しく、その価値72%。ガチガチに9でパットは負け筋。\n3. **2枚ドローはディース＋7を含む形（237）が標準オープン**。ストレート/フラッシュ管理ができる前提。\n4. **8以下が\"3枚に満たない\"／ディースが無い／6だらけ**の2〜3枚ドローは、多人数では大きく価値を落とす。**入るなら必ずレイズし、ヘッズアップを狙う**。\n\n> **ひとことルール**：「**パット8以上／7への1枚ドロー／ディース付き7への2枚ドロー**」が核。**ラフ8とスムース9はパットせず割る**。多人数では基準を上げる。\n\n---\n\n## 4. ドローラウンド別の心がけ\n**プリ（配り直後）**：強い形はレイズ/リレイズでヘッズアップを狙う。弱い多枚ドローは見送り。\n**1stドロー後（スモール）**：相手のドロー枚数を読む。自分が1枚替え・相手が2〜3枚替えなら主導権。\n**2ndドロー後（ビッグ開始）**：ここがコミット点。**まだ8以下の2枚ドローしか無い／6で割れていないなら撤退寄り**。スムース9・ラフ8はこの辺で割る判断。\n**3rdドロー後（ビッグ）**：最終形を見せ合う。**相手が1枚替え→パットなら強い**。降りるか、より良いドローに賭けるか。1ウィナーなので半端な勝負は避ける。\n\n---\n\n## 5. 応用：特殊シチュエーション\n**① 自分パット（強い7/8）vs 相手まだ1枚ドロー**：**ベット／レイズで相手にプレッシャー**。相手は8〜9を割って引くか苦しい選択。\n**② スノー（snow）**：弱い手で**あえてパットして強い完成を装う**ブラフ。相手が引いている・自分が同スート低札を多く持つ（相手の完成を妨げる）時に有効。**ずっとパット/1枚替えの相手にスノーは禁物**。\n**③ 6絡みの危険ドロー**：4枚低札でも6を含むと、2や7を引いてストレート完成＝最悪。**6を含む並びは過大評価しない**。\n\n---\n\n## 6. Equity・戦略の誤解\n- **誤解①「低い4枚なら何でも良い1枚ドロー」** → 6絡みはストレートで自爆。ディース無しは7ロー不可。\n- **誤解②「パット8/スムース9はパットすべき」** → 多人数のラフ8（35.6%）やスムース9は**割って引く**のが正解。\n- **誤解③「3枚替えでも当たれば良い」** → 多人数では論外。**ドロー枚数が少ないほど強い**。\n- **誤解④「リミットでもブラフ多用」** → 基本TAGで素直。スノーは条件を選ぶ。\n\n---\n\n## 7. チェックリスト\n- ✅ ディース（2）はあるか／6絡みのストレート危険は無いか\n- ✅ パット8以上 or 7への1枚ドロー or ディース付き2枚ドローか\n- ✅ ラフ8・スムース9はパットせず割れているか\n- ✅ 多人数なら基準を上げ、入るならレイズでヘッズアップを狙ったか\n- ✅ 相手のドロー枚数を読んで主導権を取ったか\n\n---\n\n## ★ プロの視点・最新トレンド（2024–2026）\n\n> Kevin Haney・Randy Ohel ら2-7専門のプロが**スノー（snow）**を中心に体系化。2-7TDは「カードより読み合い」の比重が大きい種目です。\n\n- **スノー＝完成役を捨て、パットで強い手を演じる純ブラフ。** ドロー系特有の**機会費用**（スノーした瞬間、本物の手を作る可能性を放棄）がある。だから**「ブラフ化の期待値 ＞ 引き続ける/降りる」**のときだけ実行。\n- **スノーは\"ブロッカー\"で打つ。** 9以上のカードは**スノーのブロッカー**（相手のロー完成札を握る＝相手が下りやすく、自分の表現も信用される）。ホイール札を含む手の方が良い（複数ドロー＝強いレンジを名乗れる）。例：`55668` のように相手のアウツを大量に握る形。\n- **\"Gentleman's Snow\"（紳士のスノー）。** 1ドロー→次でパット、が最も自然で信用される定番（例：SBから `4678X` を3ベット→2回目でパット）。\n- **EPからのパットは強烈な表現。** 全員が2枚替えする中で早い位置からパットすると、相手の**ラフ8すら降りる**ことがある。\n- **良いプレイヤーは相手より多くスノーする。** ただし**捕まりすぎたら締める**。捕まった後は本物の好手が安いコールで払われやすくなる副産物も。\n- **パット8の扱い（人数依存）。** ヘッズアップなら**どんなパット8もキープ**、2人以上には `8-7-6-5-2` を割って7に引く（Haney）。\n- **リバーは原則チェック（7/8ローのモンスター以外）。** 上級者は**強いドローでリバー・チェックレイズ**のバリューを狙う。\n\n---\n\n## 8. 計算の前提・参考文献\n数値は2-7ローボール5枚判定（Aハイ、ストレート/フラッシュをカテゴリで正しく評価）＋正直ドローモデルのモンテカルロ（各1.5万試行、相手ランダム）。**順位と方針**を読む（絶対値は過大気味）。\n参考：『Super System 2』Daniel Negreanu執筆章、Card Player（Stephen Chidwick）連載、CountingOuts / PokerNews 2-7TD解説 等。\n\n*学習目的の概算です。金銭を賭けるプレイは自己責任で。*\n", "sd27": "# NL 2-7 Single Draw 完全ガイド\n### ノーリミット・ディーストゥセブン シングルドローを勝てる種目にする\n\n> ドロー1回・**ノーリミット**のローボール。**A=最強の高札、ストレート・フラッシュは最悪**。\n> 最強は **7-5-4-3-2**。ドローが1回しかない＝「パット（完成）か、1枚ドローか」がほぼ全て。\n> NLゆえベットサイズとブラフ（スノー）が勝負を分ける。構成は STUD8 ガイドと同じ。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**7以下スムーズ（パット）か、強い1枚引き（2-3-4-7 型）**（1ドローなので一段タイト）\n\n- ◎ **プレミアム**：パット7・スムーズ8／強い1枚引き（2-3-4-7）\n- ○ **プレイアブル**：良い1枚引き（7/8 狙い）\n- △ **スチール/限定**：弱い1枚引き → ボタン\n\n**ポジション目安**：1ドロー＝**ポジション重要**。後ろからスチール、前はタイト。\n\n---\n\n## 0. ゴール\nNL 2-7 SDで負ける人のミス：①弱い2〜3枚ドローで入る ②ポジション軽視 ③NLなのにベットサイズが一本調子 ④スノー（ブラフパット）を全くしない／し過ぎる。計算で潰します。\n\n---\n\n## 1. ルール\n- 5枚配り→1ベッティングラウンド→**1回だけドロー**→最終ベッティングラウンド→ショウダウン。\n- **Aは高い（悪い）。ストレートもフラッシュも完成で最悪。** 最強＝7-5-4-3-2。\n- **ノーリミット**：好きな額をベット可。ブラインド構造（SB/BB＋ボタン）でポジションが重要。\n\n---\n\n## 2. 大原則と「カードの価値」\n- **ドローが1回だけ**＝多枚ドローの挽回が効かない。**「パット」か「1枚ドロー」が基本**。2枚以上替えは原則弱い。\n- **ディース（2）が要**、**6はストレートの危険札**（トリプルドローと同じ）。\n- NLは**ベットサイズで物語を作る**：パットの強者は大きく打って降ろす／薄く取る。**ポジション（相手に先にドローさせる）**が極めて重要。\n\n---\n\n## 3. スターティングレンジ\n\n### 3-1. エクイティ・シミュレーション（正直1ドローモデル／HU=50%）\n\n| スタート | HU% | 判定 |\n|---|---|---|\n| パット7（75432） | 97.5 | ◎ 最強・パット |\n| 1枚ドロー→7（2347+K） | 76.0 | ◎ 主力 |\n| スムース9を割って1枚→7（97542） | 72.0 | ○ 割って引く |\n| 2枚ドロー・ディース無（345+KQ） | 68.0 | △ ストレート注意 |\n| 3枚ドロー（23+KQJ） | 64.5 | ✕（vsランダム過大評価） |\n| パット8（86432・ラフ） | 61.4 | ○ HUなら十分パット |\n| 2枚ドロー→7・ディース有（237+KQ） | 60.6 | △ |\n| 1枚ドロー→8（2348+K） | 54.4 | △ |\n\n*※「正直1ドローモデル」＝8以下異ランクを残し、ストレート/フラッシュは上を捨てて1回だけ引く近似。相手ランダム。絶対値は過大気味で、**順位と方針**を読む。*\n\n### 3-2. 計算＋定石から導く閾値\n1. **パット7は別格（97.5%）**。**パット8もHUなら十分強い（61.4%）**＝シングルドローはトリプルドローよりパット価値が相対的に高い（割って引き直すチャンスが1回しか無い）。\n2. **主力は7への1枚ドロー（76.0%）**。スムースな9は割って7へ（72.0%）。\n3. **2枚以上のドローは原則弱い**。NLでは特に、相手のパット/1枚ドローに大きく打たれると苦しい。**入るならポジションとフォールドエクイティがある時だけ**。\n4. **ディース＋7絡みの1枚ドローが理想**。6だらけ・ディース無しは過大評価しない。\n\n> **ひとことルール**：「**パット8以上／7への1枚ドロー**」がほぼ全て。**2枚以上替えはポジション＋ブラフ前提**でのみ。\n\n---\n\n## 4. ラウンド別の心がけ\n**プリドロー**：強い手はレイズしてヘッズアップ＆主導権。**ポジション（ボタン）で相手に先にドローさせる**ほど有利。弱い多枚ドローは降り。\n**ドロー時**：相手のドロー枚数を最大の情報に。自分パット／相手1枚なら強い。\n**ファイナル（NLの肝）**：\n- 自分がパットの強者 → **相手のドロー結果と枚数からサイズを決める**。降ろしたいか薄く取りたいかでベット額を変える。\n- **スノー（ブラフパット）**：弱い手でパットを装い、ファイナルで大きく打って降ろす。NLでは**フォールドエクイティが大きい**分、効果も高いがコストも高い。乱発しない。\n\n---\n\n## 5. 応用：特殊シチュエーション\n**① 自分パット8〜9 vs 相手1枚ドロー**：相手が外せば勝ち。**サイズで降ろすか薄く取るかを選ぶ**。相手の引き枚数とポジションが判断材料。\n**② スノー**：相手が1枚ドロー（弱め）＆自分にフォールドエクイティがある時に、**あえてパットして大きく打つ**。常習化すると読まれる。\n**③ ポジション無し（OOP）でのドロー勝負**：先にドローを公開させられ不利。**OOPでは2枚ドローを減らし、レンジを締める**。\n\n---\n\n## 6. Equity・戦略の誤解\n- **誤解①「トリプルドロー感覚で多枚ドロー」** → 1回しか引けない。**パットか1枚が基本**。\n- **誤解②「NLでもサイズは一定」** → サイズが武器。降ろす/取るで変える。\n- **誤解③「ブラフ（スノー）はしない」** → NLはフォールドエクイティ大。条件を選べば高EV。ただし乱発禁物。\n- **誤解④「ポジションは関係ない」** → 相手に先にドローさせられる後手は強い。OOPはタイトに。\n\n---\n\n## 7. チェックリスト\n- ✅ パット8以上 or 7への1枚ドローか（2枚以上は原則見送り）\n- ✅ ディース有り／6絡みのストレート危険は無いか\n- ✅ ポジション（相手に先にドローさせられるか）を活かしたか\n- ✅ ファイナルでサイズを目的別に変えたか\n- ✅ スノーは条件を選び、乱発していないか\n\n---\n\n## ★ プロの視点・最新トレンド（2024–2026）\n\n> NL 2-7 シングルドロー（別名：カンザスシティ・ローボール）。Randy Ohel ら現役プロの解説より。\n\n- **「読み」の比重が最大級。** Ohel いわく \"相手を見て持っているか当てる\" ゲーム。明確なテルが無いときに初めてGTO的な基準に戻る。\n- **シングルドローでは\"引いてからスノー\"は稀。** ドローが1回しか無く**スノーは捕まりやすい**ため、トリプルドローほど多用しない。9以上は依然**スノーのブロッカー**。\n- **\"コンバーチブル\"を持て。** 相手次第で**ドローにもパットにも切り替えられる手**が強い。捨てる1枚が**ペア（ブロッカー）**だと尚良い：`2-2-3-4-7` は `K-7-4-3-2` より優秀（1枚ブロックしつつ捨てられる）。\n- **NL構造ゆえサイズとコミット。** ベットサイズ・スノーの見せ方・オールインのタイミングが勝負。パット手の相対価値はトリプルドローより**高め**（ドロー1回で逆転されにくい）。\n\n---\n\n## 8. 計算の前提・参考文献\n数値は2-7ローボール5枚判定＋正直1ドローモデルのモンテカルロ（各1.5万試行、相手ランダム／HU損益分岐50%）。**順位と方針**を読む（絶対値は過大気味）。\n参考：『Super System 2』Daniel Negreanu執筆章、Card Player連載、各種NL 2-7 SD解説（WSOP種目）等。\n\n*学習目的の概算です。金銭を賭けるプレイは自己責任で。*\n", "badugi": "# Badugi 完全ガイド\n### バドゥーギ（トリプルドロー）を勝てる種目にする\n\n> 4枚で**異なるランク・異なるスート4枚**＝「バドゥーギ」を作り、一番低い人が勝つ引き算ゲーム。\n> 最強は **A-2-3-4（4バドゥーギ）**。ペアもスートの被りも\"無効札\"になる独特のルール。\n> 構成は STUD8 ガイドと同じ。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**異なる3色で全部8以下、うち2枚は5以下**（4色そろえば4枚バドゥーギ）\n\n- ◎ **プレミアム**：4枚バドゥーギ（A-2-3-4〜6ハイ）／強いパット・バドゥーギ\n- ○ **プレイアブル**：3枚バドゥーギ（異スート3枚・全部8以下、うち2枚は5以下）\n- △ **スチール/限定**：弱い3枚バドゥーギ・ラフな7/8 ドロー → ボタン/CO\n\n**ポジション目安**：1枚引き勝負＝**ポジション超重要**。アーリーは強い3枚、ボタンは緩めてOK。\n\n---\n\n## 0. ゴール\nBadugiで負ける人のミス：①弱い完成バドゥーギ（J・Kバドゥーギ）を過大評価 ②強い3枚ドローを過小評価 ③スート（ライブ枚数）を見ない ④ポジション・スノーを使わない。計算で潰します。\n\n---\n\n## 1. ルール\n- 4枚配り、4ベッティングラウンド＋3ドロー。ブラインド（SB/BB）＋ボタン。\n- **バドゥーギ＝ランク4種・スート4種すべて異なる4枚**。被った札（同ランク or 同スート）は無効＝実質3枚以下の手になる。\n- **Aは最弱（強い）**。比較はトップダウン（高い札が低い方が強い）。完成枚数が多い方が常に強い（4枚＞3枚＞2枚）。\n- ベット：1st・2ndドローまでがスモール、3rd以降ビッグ。\n\n---\n\n## 2. 大原則と「カードの価値」\n- **強さ＝\"生きている札（ライブ）の数\"**。`A♥2♠3♣3♦` は3が被り＝**実質3枚ドロー**。手の見た目に騙されない。\n- **完成バドゥーギでも\"ランク\"が命**：8以下のバドゥーギは優秀、J・Kバドゥーギは弱い（後述の計算で多人数では負け越す）。\n- **スート被りは武器にもなる**：自分が同じスートを多く握る＝相手がそのスートでバドゥーギを完成しにくい（ブロッカー＝スノーの好材料）。\n\n---\n\n## 3. スターティングレンジ\n\n### 3-1. エクイティ・シミュレーション（正直3ドローモデル／HU=50% , 3-way=33%）\n\n| スタート（方針） | HU% | 3-way% | 判定 |\n|---|---|---|---|\n| パット A234（ナッツ） | 100 | 99.9 | 別格 |\n| パット 6バドゥーギ（6432） | 98.9 | 97.9 | ◎ |\n| パット 8バドゥーギ（8532） | 94.8 | 89.5 | ◎ |\n| **1枚ドロー強（A23、draw1）** | **68.3** | **52.6** | ○ 弱パットより強い |\n| 1枚ドロー中（853、draw1） | 59.9 | 42.8 | △ |\n| **パット Kバドゥーギ（K742）** | **56.4** | **32.5** | **✕ 多人数で負け越し** |\n| 2枚ドロー（A2、draw2） | 52.1 | 35.6 | △ |\n| 3枚ドロー（A残し、draw3） | 46.3 | 29.8 | ✕ 弱い |\n\n*※「正直3ドローモデル」＝最良のバドゥーギ部分集合を残して引く近似（弱パットも基本スタンド）。相手ランダム。**順位と方針**を読む。*\n\n### 3-2. 計算から導く閾値\n1. **完成バドゥーギは\"ランク\"で価値が激変**：A234＝ほぼロック、8バドゥーギ＝強い（HU95/3way90）、**Kバドゥーギ＝HUで辛うじて56%・3wayでは32.5%＝負け越し**。**J・Kの弱バドゥーギは多人数では降り**。\n2. **強い3枚ドロー（A23）は弱い完成バドゥーギに勝つ**：A23(draw1)＝HU68%・3way53% ＞ Kバドゥーギ＝56%/32.5%。**\"完成しているか\"より\"どれだけ低く生きているか\"**。\n3. **2枚ドロー（A2）は状況限定（HU52/3way36）**、**3枚ドローは弱い（46/30）**。多枚ドローはポジションやスノー前提で。\n4. 目安：**8トライ（8以下の3枚＝8バドゥーギを狙える1枚ドロー）以上が概ねオープン級**。\n\n> **ひとことルール**：「**8以下の完成バドゥーギ／7以下中心の強い1枚ドロー**」が核。**J・Kの弱完成バドゥーギ、2〜3枚ドローは慎重に（多人数では降り寄り）。**\n\n### 3-3. ライブカード（スート）の意識\n- 1枚ドローで完成に必要な\"欠けたスート\"が場でどれだけ生きているか。**自分が同スートを握る＝相手の完成を妨げる**＝スノーの根拠。\n\n---\n\n## 4. ドローラウンド別の心がけ\n**プリ**：強パット・強1枚ドローはレイズ/リレイズでヘッズアップへ。弱完成バドゥーギ（J/K）や2〜3枚ドローは慎重に。\n**1stドロー後**：相手のドロー枚数を読む。相手がパット/1枚で自分が弱完成なら危険。\n**2ndドロー後（ビッグ開始）**：コミット点。**弱完成（J/K）は割って引く**選択も（\"良い3枚バドゥーギが下にある\"なら割る価値）。\n**3rdドロー後（ビッグ）**：最終形。相手の引き枚数・パット履歴から、バリュー／スノー／フォールドを判断。**ずっとパット/1枚替えの相手にスノーは禁物**。\n\n---\n\n## 5. 応用：特殊シチュエーション\n**① 強い3枚ドロー（A23）を持つ**：弱い完成バドゥーギにも勝てる。**1枚ドローとして強気にプレイ**（レイズで多枚ドローを降ろす）。\n**② 弱完成バドゥーギ（Kバドゥーギ）**：HUなら微有利だが**多人数では負け越し（32.5%）**。**良い3枚（例：Q632の下に6-3-2）があるなら割る**。位置が悪ければ降り。\n**③ スノー（ブラフパット）**：弱い3枚を**あえてパット**して完成を装う。**自分が同スートを多く握る／相手が引いている／自分が後手**の時に有効。エクイティを捨てる量が少ない\"弱い3枚\"がスノー向き。\n\n---\n\n## 6. Equity・戦略の誤解\n- **誤解①「バドゥーギさえ完成すれば勝ち」** → ランク次第。Kバドゥーギは多人数で負け越し（32.5%）。\n- **誤解②「3枚ドローは弱い」** → 強い3枚（A23）は弱完成バドゥーギに勝つ（68% vs 56%）。\n- **誤解③「スートは関係ない」** → ライブ枚数が完成率＝強さの源泉。被りはスノーの武器。\n- **誤解④「ポジションは軽視してよい」** → 後手で相手のドロー/アクションを見てから動けるのが最大の利点。\n\n---\n\n## 7. チェックリスト\n- ✅ 何枚が\"生きている\"か（被り＝無効札を見抜く）\n- ✅ 完成バドゥーギなら8以下か（J・Kは多人数で降り寄り）\n- ✅ 強い1枚ドロー（7以下中心）は弱完成より強い、と理解しているか\n- ✅ 弱完成は\"下に良い3枚\"があるなら割る\n- ✅ スノーは条件（同スート保持・相手が引いている・後手）を選んだか\n\n---\n\n## ★ プロの視点・最新トレンド（2024–2026）\n\n- **WSOPで定着、人気拡大。** 2023年から WSOP に $1,500 Badugi が常設。ミックス／ドローミックスでも採用が広がり学ぶ価値が上昇。\n- **\"3枚バドゥーギ\"のバックアップが鍵。** バドゥーギは完成しにくい（3回引いても未完成は普通）。だから**強い3枚ロー（A23系）を保険に持てる手**が、弱い完成（Kバドゥーギ等）に競り勝つ。本ガイドの計算（A23の1ドロー68% ＞ K742の3way 32.5%）と一致。\n- **「弱い完成を作りに行かない」。** 最初から低札を多く持ち、**良いバドゥーギを一発で狙う**のがプロの基本。`Td2sAh6h` のような手は弱い10バドゥーギ狙いになりがちで価値が低い。\n- **スノーは可能だが難度高。** 相手のドロー本数を読んでパットで降ろす余地はあるが、2-7ほど多用はしない。ポジションと相手のドロー枚数の観察が肝。\n\n---\n\n## 8. 計算の前提・参考文献\n数値はバドゥーギ判定（最大の異ランク・異スート部分集合）＋正直3ドローモデルのモンテカルロ（各1.5万試行、相手ランダム／HU=50%・3way=33%）。**順位と方針**を読む（絶対値は過大気味）。\n参考：Card Player（Kevin Haney / Seth Davies）バドゥーギ連載、CountingOuts \"Mastering Badugi\"、PokerCoaching、Wikipedia \"Badugi\" 等。\n\n*学習目的の概算です。金銭を賭けるプレイは自己責任で。*\n", "overview_a": "# MIX POKER MASTER ANOTHER\n\n### 10-Game に含まれない“もう一歩外側”の種目を、同じ精度で\n\nこのページは「**MIX POKER 10Game MASTER**」の姉妹編です。ミックスの王道10種目には入らないものの、ホームゲームやハイステークスのミックスで実際に回っている**エキゾチック種目**を、同じ作法（**日本語ガイド＋モンテカルロのエクイティ計算機＋VS HAND**）でまとめています。\n\n> 王道で土台を作ったら、ここからは“裏メニュー”。スプリットの考え方が深くなり、スクープ設計の比重がさらに増します。\n\n---\n\n## 収録ゲーム\n\n**vol.1 — エキゾチック5種**\n\n| 種目 | 一言で | 性格 |\n|---|---|---|\n| **PL Big-O** | 5枚オマハ・ハイロー(8) のポットリミット | ナッツ偏重・分散大 |\n| **FL Big-O** | 同上のフィックスドリミット版 | 技術寄り・betのみ違う |\n| **Super Stud Hi-Lo** | 5枚配り→2枚捨ての Stud8 | 選別で全員が強い |\n| **Badacey** | バドゥーギ ＋ A-5ロー の二者スプリット | ドロー2枚で組む |\n| **Baduecey** | バドゥーギ(エース高) ＋ 2-7ロー | フリーロール合戦 |\n\n**vol.2 — さらに外側の4種**\n\n| 種目 | 一言で | 性格 |\n|---|---|---|\n| **Archie** | 5枚TD ハイロー、両サイドに資格 | ハイが取りやすい |\n| **Ari** | Archie＋共有カード1枚（ハイ専用） | 共有でハイがインフレ |\n| **Super Stud Hi-Lo (NQ)** | ローに資格なし＝最低が常に取る | ハイ一本が弱い |\n| **Drawmaha Hi** | 5枚ドロー × オマハ・ハイ | ドロー手が主役 |\n| **Drawmaha 2-7** | 2-7ドロー × オマハ・ハイ | 低×高でねじれる |\n| **Drawmaha Badugi** | バドゥーギ × オマハ・ハイ（Dramadugi） | 低バドゥーギが主役 |\n\n**vol.3 — 定番クラシック＆スタッド分割の4種**\n\n| 種目 | 一言で | 性格 |\n|---|---|---|\n| **A-5 トリプルドロー** | 2-7と並ぶロー一枚看板（A低・スト/フラ無視） | 一人勝ち・ホイール狙い |\n| **Razz-deucey** | Baduecey をスタッド形式で（badugi+2-7） | A高・見せ札読み |\n| **Razz-dacey** | Badacey をスタッド形式で（badugi+A-5） | A低・A良い札 |\n| **ダブルボード5card オマハ ハイロー** | 2盤からベストハイ＋ベストローを選び2分割 | 両面ナッツ志向 |\n| **ダブルボード5枚オマハ（ハイ×ハイ）** | 盤が2つ、どちらもハイのみ | 高さ＝ナッツ志向 |\n| **Super Action Razz** | ペイント(J/Q/K)で資格＝低さに優先 | 資格ゲー・参加増 |\n| **ドラマハ ピッケム** | UTGが5枚を見て7変種から選択 | 土俵選び・ドロー重視 |\n\n各ゲームのページには **GUIDE / EQUITY / VS HAND** の3タブがあります。EQUITYは「相手ランダム」での取り分、VS HANDは相手の手札・ボード・ドロー回数を指定しての検証です。\n\n---\n\n## このセットの読み方\n\n- **スプリットは「半分×2」**。片取り（クォーター）を避け、**スクープ**を設計するのが全種目共通の核です。\n- Big-O は **2枚＋ボード3枚**ちょうど。Badacey/Baduecey は **5枚から2つの手**を同時に作ります。\n- 数値は全て**オリジナルのモンテカルロ**。相手ランダム想定なので絶対値は高めに出ます。読むべきは**順位と閾値**。\n- これらは**未解決ゲーム**（ソルバー解は存在しない）。本ガイドはエクイティに基づく実戦ヒューリスティクスです。\n\n*※ 学習目的の概算ツールです。金銭を賭けるプレイは各自の責任で。*\n\n---\n\nDESIGN & BUILD — **ISUMI**\n", "plbigo": "# PL Big-O 完全ガイド\n\n### 5枚オマハ・ハイロー(8)、ポットリミット\n\nBig-O は **5 Card Pot Limit Omaha Hi-Lo 8 or Better** の通称。オマハ・ハイローのホールカードが**4枚→5枚**になった種目です。ルール自体はオマハ8とほぼ同じですが、**5枚目の1枚**が手の強さと分散を大きく押し上げます。\n\n> ホールカードの2枚組み合わせが、4枚オマハの **6通り** から **10通り** に増加。1枚増えただけで約66%もコンボが増え、平均的な手が一段強くなります。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**A-2-3（第3低札でカウンターフィット保護）＋スーテッドのA**（裸A-2は半罠）\n\n- ◎ **プレミアム**：A-2-3＋高サポート ダブルスート（A-2-3-K-K 等）\n- ○ **プレイアブル**：A-2-x-x＋スーテッドA／3低札＋高ペア\n- △ **スチール/限定**：A-2裸・ハイonly → 降り気味\n\n**ポジション目安**：PLはポジション重要、FLはタイトに。**多人数前提でナッツ志向**。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **ハイonly**（KKQJ等）で参加し、ローを取れず半分以下しか狙えない。\n2. **裸のロー**（A2だけで高い側やフラッシュの裏付けが無い）でクォーターされる。\n3. **2nd nut**で突っ込む。Big-Oはナッツ濃度が高く、2番手は負け側に回りやすい。\n\n本ガイドはこの3つを計算で潰します。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| ホールカード | **5枚**（全て自分だけ） |\n| 使用 | ハイ・ローとも**ちょうど2枚＋ボード3枚** |\n| ボード | フロップ3・ターン1・リバー1（計5枚・共有） |\n| ロー条件 | 8以下5枚・ペア不可（Aは低）／ストレート・フラッシュは無視 |\n| ナットロー | A-2-3-4-5（ホイール） |\n| ベット | **ポットリミット**（最大＝ポットサイズ） |\n\nローが不成立なら**ハイが総取り**。ハイとローは別々に2枚を選んでよい（同じ2枚でなくて良い）。\n\n---\n\n## 2. 大原則・カードの価値\n\n- **A-2 がエンジン**。ナットローを引ける土台。さらに**A のスート**（ナットフラッシュ）と**ホイール札の連結**でハイにも絡む。\n- **スクープ設計**が全て。ハイとローの両面を同じ手に積む。`A♠ 2♠ 3♥ 4♥ K♣` のように **A2＋スーテッドエース＋連結** が理想形。\n- **ハイonly**は罠。5枚あると誰かが必ずナッツ級を持つため、ナッツでないハイは価値が薄い。\n- 2枚しか使えない制約は4枚オマハと同じ。**「5枚あっても使うのは2枚」**を忘れない。\n\n---\n\n## 3. スターティング（相手ランダム・モンテカルロ）\n\n| ハンド | eq% | スクープ% | 評価 |\n|---|---|---|---|\n| A2345 ダブルスート | 55 | 41 | ロー＋ホイール＋フラッシュの王 |\n| A23＋A K スーテッド | 60 | 41 | ナットロー＋ナットフラの二刀流 |\n| KKQJT ハイonly | 45 | 30 | ロー0%。多人数だと事故る |\n\n（ヘッズアップ相当・各2,200試行。絶対値は高めに出るので**順位**で読む）\n\nひとことルール：\n> **A2 を含み、かつ「Aのスート」か「ホイール連結」のどちらかを持つ手**を基準に。A2が無いハイonlyは多人数では原則降り。\n\n---\n\n## 4. ストリート別の心がけ\n\n- **フロップ**：ナットローの引き・ナットフラの引き・ストレートの引きが**2つ以上**重なるなら強気に。Big-Oは「最高の手が滅多にフロップで完成しない」ので、複合ドローのアグレッションが効く。\n- **ターン**：完成・未完成がはっきりする。**2nd nut**で大金を入れない。\n- **リバー**：片取りが見えたら**小さく**バリュー（相手を残してオーバーコール分を取る）。両ナッツなら大きく。\n\n---\n\n## 5. 応用：クォーターの罠（計算で検証）\n\n多人数でA2が複数いると、**ローを分け合って¼**になりがち。「自分だけがナットローを引ける本数（生き残り）」を意識する。\nハイで勝てないA2裸は、ローを分けた瞬間に投資回収できない。**「ロー単独＋ハイの裏付け」**を常にセットで。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「5枚あるから何でも参加できる」→ ノー。**全員が強くなる**ので、基準はむしろPLO8より**タイト**に。\n- 誤解②「ローのA2さえあればOK」→ ノー。**スートやホイール連結の裏付け**が無いとクォーターで負ける。\n- 誤解③「ハイの2ペアでもいける」→ ノー。Big-Oで2ペアはほぼ勝てない。セット以上が基準。\n- 誤解④「PLとFLは戦略が別物」→ エクイティは同じ。違うのは**betサイズと分散**。本計算機はPL/FL共通で使えます。\n\n---\n\n## 7. チェックリスト\n\n✅ A2 を含むか（ローのエンジン）\n✅ A のスート or ホイール連結の**ハイの裏付け**があるか\n✅ ハイonly は多人数で降りる\n✅ 2nd nut で大金を入れない\n✅ 複合ドローはフロップで強気\n✅ 片取りが見えたら小さくバリュー\n✅ 「5枚あっても使うのは2枚」を忘れない\n\n---\n\n## ★ プロの視点\n\nBig-O は2008年頃に南カリフォルニアで広まり、WSOPのディーラーズチョイスにも採用される比較的新しい種目で、**まだ解かれていません**。現場の合意は「**ナッツ性とスクープ性を最優先**、ミドルのランダウンは過大評価しない」。5枚あるぶん**ナッツの取り合い**になりやすく、2番手の価値が4枚オマハよりさらに下がる、という点が共通見解です。\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\nここからは Kevin Haney（Card Player）や Cardquant 等の分析に基づく、O8 から一歩進んだ考え方です。\n\n**カウンターフィット保護が生命線**\n裸の `A-2` は「半分の罠」。**第3の低札（3か4）**があると、ボードでAがペアでも `2-3-4`、2がペアでも `A-3-4` が生き残ります。重要なのは、**Big-O では A-2 を持つと約60%の確率で第3のホイール札も一緒に来る**点（O8 では A-2 単独が多い）。だから Big-O は O8 より**むしろタイト**に、`A-2-3`（3低札）を基準にします。\n\n**ナットロー単独でも降りる勇気**\n保護がなく・ハイの見込みもなく・他にも `A-2` がいそうな多人数では、**ナットローのドロー、時にナットローそのものでも降りる**のが正解になります。クォーター、さらにリバーでのカウンターフィットで、勝っているつもりが最悪の投資になりがち。\n\n**ブロッカーとしての A**\n- `AAA`／`AAAA` は、相手のロー折半とセット完成を**ブロック**する価値がある（ただしローのランクが上がると価値は急落）。\n- `A-A-2-2-x`（ペアの2）は**隠れ保護**：2がボードに落ちると相手の `A-2` ローが死ぬ一方、自分は `A-3` に乗り換えられる。\n\n**「ナットにしか引かない」**\n8人なら山は4枚しか残らない＝より良い手はほぼ配られています。2nd ナットロー・2nd ナットフラッシュは負け筋。**複合ドロー（ナットロー＋ナットフラ）**のときだけ大きく賭け、メイドハイを降ろし、下位ローからコールを取る。トップセット＋ナットローは時にスロープレイで誘います。\n\n参考：Kevin Haney「Making the Adjustment to Limit Big O」（Card Player）、Cardquant「Big O Fundamentals」、Red Chip Poker。\n\n## 8. 計算の前提\n\n- 数値はオリジナルのモンテカルロ（各2,200試行）。相手ランダム想定で、絶対値は実戦より高め。読むべきは順位と閾値。\n- ローは8-or-better、ちょうど2枚＋ボード3枚。ナットロー＝A2345。\n- 厳密なナッシュ解は本領域では未解決。本記事は均衡解ではなく実戦的ヒューリスティクスです。\n\n参考：The Lodge「Big-O Rules」、PokerNews「What is Big O」、CountingOuts「PL Big O」。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "flbigo": "# FL Big-O 完全ガイド\n\n### 5枚オマハ・ハイロー(8)、フィックスドリミット\n\nFL Big-O は Big-O を**フィックスドリミット**（固定額ベット）で行う版です。**配り・使用ルール・ショーダウンは PL Big-O と完全に同一**で、違うのは**ベット構造だけ**。したがって**手札のエクイティ（取り分の期待値）は PL と全く同じ**です。\n\n> このページの EQUITY / VS HAND の数値は PL Big-O と共通です。違いは「いくら賭けられるか＝分散とブラフの効き方」だけ。まず PL Big-O ガイドで手の価値を固め、ここでは**リミット特有の運用差**を押さえます。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**A-2-3（第3低札でカウンターフィット保護）＋スーテッドのA**（裸A-2は半罠）\n\n- ◎ **プレミアム**：A-2-3＋高サポート ダブルスート（A-2-3-K-K 等）\n- ○ **プレイアブル**：A-2-x-x＋スーテッドA／3低札＋高ペア\n- △ **スチール/限定**：A-2裸・ハイonly → 降り気味\n\n**ポジション目安**：PLはポジション重要、FLはタイトに。**多人数前提でナッツ志向**。\n\n---\n\n## 0. ゴール — FL で負ける人の3大ミス\n\n1. **降りどころで降りない**。リミットは1ベットが安い分、ズルズル続けて塵も積もる。\n2. **片取りの薄いバリューを取りこぼす**。固定額なので「小さく賭けて残す」設計がそのまま効く。\n3. **ドローのアグレッションを忘れる**。複合ドローでも大きく出られないぶん、**レイズの本数**で価値を作る発想が要る。\n\n---\n\n## 1. ルール（PLとの差分のみ）\n\n| 項目 | FL Big-O |\n|---|---|\n| ベット | **固定額**。序盤はスモールベット、後半（ターン以降）はビッグベット |\n| レイズ | 1ベット＋上限回数（通常3レイズまで） |\n| 配り・使用・ロー条件 | **PL Big-O と同一**（5枚ホール／2枚＋ボード3枚／8-or-better） |\n\nハイロー・スプリット、ナットロー A2345、ロー不成立でハイ総取り——すべて PL と同じです。\n\n---\n\n## 2. 大原則（リミット視点）\n\n- 手の価値は PL と同じ。**A2＋裏付け**を基準に、ハイonly・裸ローを避ける。\n- リミットでは**ポット・オッズが明確**。「あと1ベットで何分の1の取り分を狙えるか」を毎回計算できる。\n- **多人数で安く見られる**ぶん、フロップでのドロー継続は正当化されやすい。ただし**ナッツ性**は妥協しない。\n\n---\n\n## 3. スターティング（PL Big-O と共通）\n\n| ハンド | eq% | スクープ% | 評価 |\n|---|---|---|---|\n| A2345 ダブルスート | 55 | 41 | 2-wayの王 |\n| A23＋A K スーテッド | 60 | 41 | ナットロー＋ナットフラ |\n| KKQJT ハイonly | 45 | 30 | ロー0%・多人数で事故 |\n\nひとことルール：\n> 数値は PL と同じ。FL では**「降りる/続ける」の閾値**がよりシビアに効く。損益分岐（多人数なら 100÷人数 %）を割る手は淡々と降りる。\n\n---\n\n## 4. ストリート別（リミットの心がけ）\n\n- **序盤（スモールベット）**：安いので**ナットドロー複合**は広めに継続OK。ただしハイonlyは多人数で降り。\n- **後半（ビッグベット）**：ここで初めて高額。**2nd nut**での後半コールは厳禁。\n- **リバー**：片取りが見えるなら**バリュー1ベット**で残す（リミットは「小さく賭けて残す」が自然に成立）。\n\n---\n\n## 5. 応用：FL ならではの“塵も積もる”\n\nリミットは1手の失着が小さく見えるが、**5ストリート分積み重なる**と致命的。マージナルな3-way以降のコールを削るだけで勝率が動く。**「安いから続ける」をやめる**のが最大の改善点。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「FLはPLと別ゲーム」→ ノー。**エクイティは同一**。違いはベット額・分散・ブラフ頻度。\n- 誤解②「リミットだから何でも見ていい」→ ノー。安さに甘えた継続が最大のリーク。\n- 誤解③「ブラフは効かない」→ 効きにくいが**バリュー設計**で勝てる。固定額×残す、が基本線。\n\n---\n\n## 7. チェックリスト\n\n✅ 手の価値は PL Big-O と同じ（A2＋裏付け）\n✅ 損益分岐を割る手は淡々と降りる\n✅ 序盤は複合ドロー継続OK、後半ビッグベットで締める\n✅ 2nd nut の後半コール厳禁\n✅ リバーは片取りでも小さくバリュー\n✅ 「安いから続ける」を捨てる\n\n---\n\n## ★ プロの視点\n\n現場では Big-O は**リミットで回ることが多い**種目です（PLは分散が大きすぎるため）。リミットだからこそ**ナッツ性とポット・オッズ**がそのまま勝敗に直結し、talented なアグレッサーが PL ほど暴れられない——つまり**技術差が素直に出る**、というのが解説者の共通見解です。\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\n手の価値は PL Big-O と同一なので、**上級概念は PL Big-O ガイドの「★ 上級コンセプト」がそのまま適用**されます（カウンターフィット保護＝第3低札、約60%でA-2に第3ホイール札、ナットロー単独でも降りる、AAA/ペア2のブロッカー、ナットにしか引かない、複合ドローで大きく）。\n\n**FL ならではの調整**\n- 1ベットが安いぶん、**多人数で複合ドローを継続**しやすい一方、終盤ビッグベット帯での**2nd ナットのコールダウンが最大のリーク**。固定額なので「小さく賭けて残す」バリュー設計がそのまま効く。\n- リミットは**ポット・オッズが明確**なので、「あと1ベットで何分の1の取り分を、どれだけの確率で狙えるか」を毎回計算して、損益分岐を割る継続を淡々と削る——これが積み上がって勝率に直結します。\n\n参考：Kevin Haney（Card Player, Big O はリミットで回ることが多い）、Cardquant。\n\n## 8. 計算の前提\n\n- EQUITY/VS HAND の数値は PL Big-O と共通（オリジナルのモンテカルロ・各2,200試行）。\n- 違いはベット構造のみ。エクイティ自体は betting に依存しません。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n参考：Poker Wiki「Big O（limit が一般的）」、CountingOuts「Big O basic strategy」。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "sstud8": "# Super Stud Hi-Lo 完全ガイド\n\n### 5枚配り→2枚捨て、選別される Stud8\n\nSuper Stud Hi-Lo（Super Stud 8）は、セブンカード・スタッド ハイロー(8)の“強化版”。**3rd street で4枚伏せ＋1枚表＝計5枚**を受け取り、**そのうち2枚を捨てて3枚にしてから**4th street 以降を通常の Stud8 として進めます。\n\n> 違いは入口だけ。**全員が5枚から最良の3枚を選べる**ため、平均的なスタート3枚が普通の Stud8 よりずっと強くなります。本計算機は「5枚を入力→最良3枚を自動選択→7枚に完成」というモデルで、この“選別された強さ”を再現します。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**5枚から3枚レインボー低札（A絡み8以下）を残す＝両取り**（ハイは大ペア/トリップス）\n\n- ◎ **プレミアム**：3低札（A-2-x）／ロールド・大ペア（高一本）\n- ○ **プレイアブル**：8以下の散った3枚／3枚スーテッド\n- △ **スチール/限定**：中位ハイ → 死札次第\n\n**ポジション目安**：スタッド＝見せ札・死札重視。低いボードで主導権。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **普通の Stud8 の感覚で参加**。相手も選別済みで強いのに、緩いスタートで入って削られる。\n2. **捨て札の選択ミス**。三低札を崩したり、ローの芽を残さずハイに寄せすぎる。\n3. **生き札（live card）を見ない**。5枚×全員＝大量の捨て札が出るため、欲しい札の残量が読みの鍵。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 3rd street | ダウン4枚＋アップ1枚＝**5枚**を配る |\n| 捨て | 3rdのベット後、**2枚を捨てて3枚に**（怠ると手がファウル） |\n| 4th〜7th | 以降は**通常の Stud8**（最終7枚で best5 ハイ／best5 ロー(8)） |\n| ロー条件 | 8以下5枚・ペア不可（Aは低）。ナットロー A2345 |\n| ベット | フィックスドリミット（3rd・4thスモール、5th以降ビッグ） |\n\nロー不成立ならハイが総取り。**捨てた2枚は死札**（誰も使えない）。\n\n---\n\n## 2. 大原則・カードの価値\n\n- **三低札（A23 等）が最強の入口**。スクープを狙える2-wayスタート。\n- **ロールアップ（3枚同ランク）は約6倍**出やすい。5枚から拾えるので、巨大なハイのトラップが頻発。\n- **二枚のA＋低札**は依然強いが、**ショートハンド向き**。\n- **ローが普通のStud8より強い**ので、相手のロー完成・フラッシュ完成をより警戒。\n- 捨て札選択の指針例：`(5♣4♠)6♣` は `(A♥2♦)6♣` より**キープ価値が高い**ことも（連結・生き札次第）。\n\n---\n\n## 3. スターティング（5枚→最良3枚・相手ランダム）\n\n| 5枚ディール | 取り分eq% | ハイ% | ロー% | 評価 |\n|---|---|---|---|---|\n| (AAA) ロールアップ | 77 | 91 | 4 | 巨大ハイ・ほぼスクープ |\n| A2345 → A23選択 | 51 | 45 | 41 | 王道の2-way |\n| KKQJ9 → KK選択 | 51 | 67 | 0 | ハイonly・多人数で割れる |\n\n（ヘッズアップ相当・各3,500試行）\n\nひとことルール：\n> **「三低札が拾えるか」を最優先**。拾えればローとスクープの芽。拾えないなら、巨大ハイ（ロールアップ・大ペア）か降り。\n\n---\n\n## 4. ストリート別の心がけ\n\n- **3rd（捨て前）**：5枚を俯瞰し、**三低札 ＞ ロールアップ ＞ 大ペア ＞ 降り** の順で骨格を決める。残す3枚と捨てる2枚を確定。\n- **4th-5th**：ローの完成度とハイの伸びを両天秤。**ビッグベット帯（5th〜）で2nd best を追わない**。\n- **6th-7th**：生き札の残量で勝負手か撤退かを判断。片取りが濃いなら賭けを抑える。\n\n---\n\n## 5. 応用：捨て札の最適化（計算で検証）\n\n`A♥2♦ 9♠ K♣ Q♥` のような手は、**A2（ローの芽）＋もう1枚低札**を残すのが基本。9KQの高札3枚は死札にしてOK。一方 `5♣4♠6♣ + 高2枚` は**連結三低札**なので、ローとストレートの両面を残して高2枚を捨てる。本計算機は最良3枚を自動選択するので、**入力した5枚の“ポテンシャル”**として読めます。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「Stud8と同じ感覚でいい」→ ノー。**相手も選別済みで強い**。基準はタイトに。\n- 誤解②「ローは捨ててハイ一本でいい」→ ロールアップ等を除き、**2-wayの三低札**が最も稼ぐ。\n- 誤解③「捨て2枚は適当でいい」→ ここが最大の技術差。**ローの芽と連結**を残す。\n- 誤解④「marginalなStud8の手も通用する」→ `(7♣5♣)2♠` 級は**ショート/アンティスティール限定**に格下げ。\n\n---\n\n## 7. チェックリスト\n\n✅ 5枚から**三低札**を拾えるか（最優先）\n✅ 拾えないなら巨大ハイ（ロールアップ／大ペア）か降り\n✅ 捨て2枚は**ローの芽・連結**を残す\n✅ 相手も強い前提でレンジを締める\n✅ ビッグベット帯で2nd best を追わない\n✅ 生き札（死んだ低札・スート）を数える\n✅ 片取りが濃ければ賭けを抑える\n\n---\n\n## ★ プロの視点\n\nSuper Stud 8 は、ドロー系も含む現代のミックスで Stud8 を**「Super」で回す**流れから広まりました。解説者の共通見解は「**選別で全員が強い→ローとフラッシュがより頻出→ハイの基準も上がる**」。とくに**捨て札の選択**と**死札の把握**が普通のStud8以上に勝敗を分ける、とされています。\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\nKevin Haney（Card Player「Scoop Advantage in Stud 8」）の視点を Super Stud に応用します。\n\n**ローが土台、でも“最良のハイ”は強い**\nA〜8 はデッキ52枚中32枚（**62%**）を占めるため、低い手は伸びやすく強いボードに育ちます。一方で `KK` のようなハイは「総取りの目がある」ぶん stud8 では依然として良い手。**カギは「常に最良のハイ側を持って参加する」**こと——2nd best のハイで関わり続けるのは克服困難なリーク。\n\n**ローを完成させた側はフリーロール**\n明らかなハイ相手にローを完成させると、**強力なフリーロール**（ローを確保しつつ、5や2ペアでハイも奪う目）に立てます。Super では5枚から最良3枚を選べるぶん、この**完成スピードと選別**が普通の stud8 以上に効きます。死札（捨てられた低札・スート）を数え、自分の必要札の生存を常に確認しましょう。\n\n参考：Kevin Haney「Having a Scoop Advantage in Stud Eight-or-Better」「Super Sized Stud Hi-Lo」（Card Player）。\n\n## 8. 計算の前提\n\n- モデル：各プレイヤーに5枚配り→**ヒューリスティックに最良3枚を保持**→7枚に完成→Stud8で判定。捨て2枚は死札として山から除外。\n- 「最良3枚」は自動選択（ロールアップ＞三低札＞大ペア＞最低札）。実戦の捨て判断とは細部で異なる**近似**です。\n- 数値はオリジナルのモンテカルロ（各3,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 厳密なナッシュ解は未解決。本記事は実戦的ヒューリスティクスです。\n\n参考：CardPlayer/Kevin Haney「Super Sized Stud Hi-Lo」、CountingOuts「Super Stud 8」。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "badacey": "# Badacey 完全ガイド\n\n### バドゥーギ ＋ A-5ロー の二者スプリット（5枚トリプルドロー）\n\nBadacey（バダシー）は、5枚のトリプルドロー。ポットを**2つの「ロー」**で分け合います——半分は**ベストのバドゥーギ**（エースは低）、もう半分は**ベストの5枚 A-5ロー**（カリフォルニアロー）。どちらも**低いほど強く**、両サイドとも常に成立します（不成立で総取りは無し）。\n\n> nut-nut は **A-2-3-4-5 のレインボー**。これ1つで「A234のナットバドゥーギ」＋「A2345のナットA-5ロー」の両取り＝スクープ。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**A入りの散った低3枚（A-2-3 型）。Aは良い札**（バドゥーギ先→A-5フリーロール、狙い7-7）\n\n- ◎ **プレミアム**：パット強バドゥーギ＋低A-5（(2-4-6-7)5 型）／配られたバドゥーギ\n- ○ **プレイアブル**：A入りの散った低3枚（A-2-3・A-2-5）\n- △ **スチール/限定**：4枚ローのブロッカー → ボタン\n\n**ポジション目安**：ドロー＝レイトで緩める。引き枚数を読む。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **8以上のバドゥーギを後生大事にする**。5枚あると低いバドゥーギが出来やすく、8バドゥーギは多人数で負ける。\n2. **片サイドだけ**を追う。スプリットなのにスクープ設計を怠ると、半分を分けて投資回収できない。\n3. **ドローの読み違い**。相手の引き枚数（2枚／1枚／パット）から手を逆算できないと、フリーロールに負ける。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | 5枚・**トリプルドロー**（ドロー3回・ベット4回） |\n| バドゥーギ側 | 5枚中**最大4枚**で異ランク・異スート。**エースは低**。ナット A234 |\n| A-5ロー側 | **5枚**で判定。straight/flush無視・**Aは低**。ナット A2345（ホイール） |\n| 分配 | バドゥーギ半分＋A-5ロー半分。**両者とも常に成立**（クオリファイア無し） |\n| ペア | A-5側では**ペアは全ての無ペアに負ける**（最弱はA-Aが最良ペア） |\n\n---\n\n## 2. 大原則・カードの価値\n\n- **A-2-3 級の三低札**が土台。バドゥーギとA-5ローの両方に効く。\n- **異スート**を多く持つほどバドゥーギが組みやすい。**3スート以上**でスタートできると、バドゥーギに3回引ける。\n- 狙いの最低ラインは**「7ロー＋7バドゥーギ」**。8止まりのバドゥーギは多人数で危険。\n- 例：`A♣ 3♥ 5♦` は典型の三低札。**2♠4♠6♠7♠**を引けばバドゥーギ＋4枚7ローへ前進。`2♥4♥6♥`はバドゥーギにはならないが**A-5側で価値が高く**、捨てない。\n\n---\n\n## 3. スターティング（相手ランダム・トリプルドロー）\n\n| ハンド | eq% | スクープ% | バドゥーギ% | A-5ロー% |\n|---|---|---|---|---|\n| パット A2345 レインボー | 100 | 100 | 100 | 100 |\n| A235＋引き | 86 | 74 | 77 | 96 |\n| 8寄りバドゥーギ | 低 | 低 | — | 頭打ち |\n\n（各3,500試行・自動ドローの近似モデル）\n\nひとことルール：\n> **三低札（A23級）＋なるべく異スート**で入る。8以上のバドゥーギは“完成”でも過信しない。狙いは7-7。\n\n---\n\n## 4. ドロー別の心がけ\n\n- **1st draw**：三低札＋異スートを残し、高札・スート被りを捨てる。A-5側に効く低札は**バドゥーギにならなくても残す**。\n- **2nd draw**：相手の引き枚数を観察。**こちらが強い三枚に伸びたら、パットや1枚引きに対してフリーロール**が成立しうる。\n- **3rd draw（最終）**：完成度で勝負。両サイドのナッツが見えるなら強気、片取りなら抑えめに。\n\n---\n\n## 5. 応用：8バドゥーギのジレンマ（計算で検証）\n\n8バドゥーギをキープすると、**A-5ロー側が8で頭打ち**になる。ヘッズアップでも、相手が2枚引きでこちらのA-5を逆転する余地を与えがち。**「8バドゥーギを壊して低い5枚ローを追う」**選択が正解になる場面が多い、という構造を本計算機の取り分で確認できます。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「バドゥーギさえ出来れば勝ち」→ ノー。**A-5ロー側の低さ**が伴わないと半分しか取れない。\n- 誤解②「8バドゥーギは強い」→ 多人数では負け側。**7以下**を基準に。\n- 誤解③「片サイド特化でいい」→ スプリットは**スクープ設計**が本筋。クォーターを避ける。\n- 誤解④「A-5でペアでも高ければOK」→ ノー。A-5では**無ペアが全てのペアに勝つ**。\n\n---\n\n## 7. チェックリスト\n\n✅ A23級の三低札で入る\n✅ 異スート3つ以上だとバドゥーギに有利\n✅ 狙いは7ロー＋7バドゥーギ\n✅ 8バドゥーギは過信しない（壊す勇気）\n✅ A-5に効く低札はバドゥーギ外でも残す\n✅ 相手の引き枚数から手を逆算\n✅ 片取りなら賭けを抑える\n\n---\n\n## ★ プロの視点\n\nBadacey は2007年頃にラスベガスで現れた、**オンライン非対応・未解決**のミックス種目です。Baduecey より少しレアですが、両方セットで回ることが多い。解説者の共通見解は「**低いバドゥーギを作って A-5 側をフリーロールする**のが核」「**8以上のバドゥーギに固執しない**」。5枚配りでバドゥーギが出来やすいぶん、**質の高い低バドゥーギ**が勝敗を分けます。\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\n**核心は Baduecey と同じ「バドゥーギ先・A-5ローをフリーロール」**。nut/nut は `A♣2♥3♠4♦5♠`。made badugi を作ってから A-5 を引く側が、パット片面手をフリーロールします。\n\n**「7-7」を狙う**\n7の A-5ロー＋7のバドゥーギ（セブン・セブン）は多くのポットを勝ちます。ただし **Badacey のセブンは、Baduecey のエイトほど“強い基準”ではありません**（A-5はストレートを無視するぶんローがより低くなりやすく、競争が激しい）。だからこそ Badacey では狙いを **7-7** に置くのが目安。8-badugi に固執しないこと。\n\n**ティアとカードの効き**\n- スターティングの考え方は Baduecey と同型ですが、**Aが良い札**なので **A入りスタート**に価値があります（`A-2-3` 級が土台）。\n- A-5側はペアが無ペアに全敗ですが、**ペアになると別スートが開いてバドゥーギの足し**になる二面性は同じ。\n- ドロー枚数の読み（“言語”）とフリーロール設計、ポジション観も Baduecey と共通です。\n\n**クォーターは稀**\nA-5側でホイールがぶつかってクォーターされることはありますが、Omaha 8 ほど頻繁ではありません。パットのnut/nutは、**人数を絞ってスクープ**か、ルースな卓なら**フリーロールしつつポットを膨らませて**半分を厚く取る、の二択。\n\n参考：Kevin Haney（Card Player / CountingOuts）、Cardplayer Lifestyle「Draw Games」。\n\n## 8. 計算の前提\n\n- バドゥーギ＝5枚中最良4枚（エース低）、A-5ロー＝5枚（straight/flush無視・エース低）。両者とも常に成立。\n- ドローは「低い異ランク5枚に向けて正直に引く」**近似**モデル（2回目以降は自動）。とくにマルチドローは概算です。\n- 数値はオリジナルのモンテカルロ（各3,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n参考：Wikipedia「Baduci/Badacy」、CountingOuts「Badacey」、Cardplayer Lifestyle「Mixed Games: Draw」。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "baduecey": "# Baduecey 完全ガイド\n\n### バドゥーギ（エース高）＋ 2-7ロー の二者スプリット（5枚トリプルドロー）\n\nBaduecey（バデューシー／Badeucey）は、5枚のトリプルドロー。半分は**ベストのバドゥーギ**、もう半分は**ベストの5枚 2-7ロー**で分け合います。Badacey との決定的な違いは——**エースが「高い＝最悪」**になること。straightも不利になります。\n\n> nut-nut は **2-3-4-5 レインボー＋7**。これで「2345のナットバドゥーギ（エース高）」＋「7-5-4-3-2のナット2-7ロー」を両取り＝スクープ。エースは両サイドで足を引っ張るので原則“敵”です。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**2か3入りの散った低3枚（2-3-5 型）。Aは高で不利**（狙い8ロー＋7バドゥーギ）\n\n- ◎ **プレミアム**：パット強バドゥーギ＋低2-7（(2-4-6-7)5 型）／配られたバドゥーギ\n- ○ **プレイアブル**：2/3入りの散った低3枚（2-3-5・2-3-7）\n- △ **スチール/限定**：4枚ローのブロッカー → ボタン\n\n**ポジション目安**：ドロー、レイトで緩める。**9バドゥーギは捨てる**。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **エースを抱える**。2-7でもエース高バドゥーギでも**エースは最悪札**。低札と勘違いして残すと事故る。\n2. **9以上のバドゥーギ**を後生大事にする。5枚あると低バドゥーギが出来やすく、9バドゥーギは2-7側を頭打ちにする。\n3. **片サイド特化**でクォーター負け。スクープ設計を怠る。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | 5枚・**トリプルドロー**（ドロー3回・ベット4回） |\n| バドゥーギ側 | 5枚中**最大4枚**で異ランク・異スート。**エースは高**。ナット **2345** |\n| 2-7ロー側 | **5枚**で判定。**Aは高**・**straight/flushは不利**。ナット **75432** |\n| 分配 | バドゥーギ半分＋2-7ロー半分。**両者とも常に成立** |\n| ペア | 2-7では**ペアは無ペアに負け、straight/flushも役として不利** |\n\n---\n\n## 2. 大原則・カードの価値\n\n- **2-3-4 級の小さい三枚**が土台。エースは使わない。\n- **異スート**が多いほどバドゥーギが組みやすい。**3スート以上**でスタートすると3回引ける。\n- 狙いの最低ラインは**「8の5枚ロー＋7バドゥーギ」**。9以上のバドゥーギは過信しない。\n- 例：`2♣3♥7♦` が典型の三枚スタート。**4♠5♠**を引けば2345バドゥーギ＋低い2-7へ。`4♥5♥6♥`はバドゥーギにならなくても**2-7側で価値が高く**、残す。\n\n---\n\n## 3. スターティング（相手ランダム・トリプルドロー）\n\n| ハンド | eq% | スクープ% | バドゥーギ% | 2-7ロー% |\n|---|---|---|---|---|\n| パット 23457 レインボー | 100 | 100 | 100 | 100 |\n| 234＋引き | 高 | — | — | — |\n| 75432（バドゥーギは2枚のみ） | 片取り | 低 | 弱 | 強 |\n\n（各3,500試行・自動ドローの近似モデル）\n\nひとことルール：\n> **小さい三枚（234級）＋異スート**で入り、**エースは捨てる**。9以上のバドゥーギは“完成”でも過信しない。狙いは8ロー＋7バドゥーギ。\n\n---\n\n## 4. ドロー別の心がけ\n\n- **1st draw**：234級の三枚＋異スートを残し、**エース・高札・スート被り**を捨てる。2-7側に効く低札はバドゥーギ外でも残す。\n- **2nd draw**：相手の引き枚数を観察。**強い三枚に伸びたら、パット/1枚引きに対してフリーロール**が成立しうる（この種目はそれが頻発する）。\n- **3rd draw（最終）**：完成度で勝負。両ナッツが見えれば強気、片取りなら抑えめ。\n\n---\n\n## 5. 応用：フリーロールの設計（計算で検証）\n\nVS HAND で「自分 234♦♥♠ 引き2枚」 vs 「相手 パット 75432」を回すと、**相手のパット 75432 はスートが被って2枚バドゥーギにしかならない**ことが多く、こちらが**バドゥーギ側を丸取りしつつ2-7側はタイ以上**——つまりフリーロールになる構図が見えます。`23457`を作る道があるなら、パットの一方通行ローに対して強気に引けます。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「エースは低くて強い」→ ノー。Baduecey では**エースは最悪**（2-7でもバドゥーギでも）。\n- 誤解②「2-7さえ強ければ勝ち」→ ノー。**バドゥーギ側**を取れないと半分止まり。\n- 誤解③「9バドゥーギは十分」→ 多人数では負け側。**7以下**を基準に。\n- 誤解④「straightでもローは強い」→ ノー。2-7では**straight/flushは不利**（23457がナット、23456はstraightで弱い）。\n\n---\n\n## 7. チェックリスト\n\n✅ 234級の小さい三枚で入る（エースは捨てる）\n✅ 異スート3つ以上でバドゥーギに有利\n✅ 狙いは8の5枚ロー＋7バドゥーギ\n✅ 9以上のバドゥーギは過信しない\n✅ 2-7に効く低札はバドゥーギ外でも残す\n✅ 強い三枚に伸びたらフリーロールを狙う\n✅ straight/flushは2-7で不利と忘れない\n\n---\n\n## ★ プロの視点\n\nBaduecey は2-7寄りで Badacey より一般的。**オンライン非対応・未解決**で、教材も少ない種目です。Card Player 連載の共通見解は「**勝てるバドゥーギを作って2-7側をフリーロールする**のが核」「**小さいスーテッド札から組み立てる**」「ドロー枚数が必ずしも優劣に直結しない（ハンドレンジが歪む）ので、deuce より**ポジションの重要度がやや下がる**」。\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\nここからは Kevin Haney（Card Player / CountingOuts）らの解説に基づく、一歩踏み込んだ考え方です。\n\n**核心は「バドゥーギ先・2-7をフリーロール」**\n勝てるバドゥーギを先に作り、そこから2-7側を引くと、**パットの片面手をフリーロール**できます（負けはなく、勝ち得るだけ）。例えば相手が `2-3-4-5-7`（ナット2-7だがバドゥーギは2枚のみ）でパットしているとき、`2-3` から3枚引く側が強い3枚に伸びれば、バドゥーギ半分を取りつつ2-7側はタイ以上——これがこのゲームの旨味の源です。`2-3-4-5-7` は「スタッド・ハイローのロールアップ・キングスより良い」が、ショーダウンでは半分しか取れない、と評されます。\n\n**スターティングのティア感覚**\n- **パット・モンスター**：`(2-4-6-7)5`、`(2-3-5-8)6` ＝ プレミアムロー＋バドゥーギ。\n- **配られたバドゥーギ**：`(2-3-4-7)`、`(3-4-5-8)` ＝ ロー完成札を1枚引くだけ（その札がバドゥーギも改善することがある）。\n- **デュースあり伸びしろ大**：`2♠3♥5♠7♥`。一見スクープできなそうだが、**ペアになると別スートが開いてバドゥーギの可能性が広がる**点が見落とされがち。\n- **下位の片面・スチール**：`2♠3♠6♠8♥`（4枚ローのブロッカー）。\n\n**狙う高さと捨て方**\n- 目標は **8の5枚ロー＋7バドゥーギ**。**9のバドゥーギは、バドゥーギになっても捨てる**のが基本（2-7側が9で頭打ちになる）。10以上のバドゥーギは論外。\n- `4♠5♠6♠8♠` 級が噛むと、バドゥーギ＋4枚8ローへ一気に前進する“効く札”。\n\n**ドロー枚数は「言語」／ポジション観**\n- 各相手のパット・1枚・2枚・ベットには意味がある。**上手い相手ほどドローが最適化**されていてフリーロール余地が減るので、強い手でも降りる。逆に下手な相手にはボタンから3コール→3枚引きで、伸びたらフリーロール、という攻め方も。\n- スプリットかつ「引き枚数が少ない＝有利」が常に成り立たないため、**ポジションの重要度は単独2-7より下がる**。\n\n参考：Kevin Haney（Card Player「Badeucey and Badacey」/ CountingOuts）、Ken Lo『A Poker Player's Guide to Mixed Games』、Cardplayer Lifestyle。\n\n## 8. 計算の前提\n\n- バドゥーギ＝5枚中最良4枚（**エース高**：ナット2345）、2-7ロー＝5枚（A高・straight/flush不利：ナット75432）。両者とも常に成立。\n- ドローは「低い異ランク5枚に向けて正直に引く」**近似**モデル（2回目以降は自動）。マルチドローは概算です。\n- 数値はオリジナルのモンテカルロ（各3,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n参考：Wikipedia「Baduci」、PokerListings「Badeucy」、CountingOuts「Badeucey」、Card Player「Badeucey & Badacey」。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "archie": "# Archie 完全ガイド\n\n### 5枚トリプルドロー、ハイ・ローに“両方クオリファイア”\n\nArchie（アーチー）は5枚のトリプルドロー高低スプリット。最大の特徴は**ハイにもローにもクオリファイア（資格）がある**こと。ハイは**9のペア以上**（ルームにより6のペア以上）、ローは**8-or-better**。資格を満たさないと、そのサイドの分け前は取れません。\n\n> 由来は諸説あり、フェニックスでこのゲームに大負けした“Archie”という人物の名から、とも言われます。資格があるため、他のハイローより**ハイの価値が高い**のが特徴です。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**ハイ寄りゲー。2ペア+/QQ+/フラッシュドロー、または強い3枚ホイール**（中途半端な低は降り）\n\n- ◎ **プレミアム**：2ペア以上・QQ+／全フラッシュドロー／3枚ホイール（両面）\n- ○ **プレイアブル**：4枚ホイール・75以下のメイドロー\n- △ **スチール/限定**：2-3-6級の3枚ロー → スチール/リンプのみ\n\n**ポジション目安**：ハイで行くなら**人数を絞る**（ローに安く引かせない）。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **資格を満たせない手**で参加し、宙ぶらりんになる。Archieの第一目標は「まず資格」。\n2. **2nd best のフラッシュドロー**に固執。Archieは各自独立なので**フラッシュ・オーバー・フラッシュ**が頻発する。\n3. **中途半端なワンペア**を引き伸ばす。終盤に上のハイを見せられて削られる。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | 5枚・**トリプルドロー**（ドロー3回・ベット4回） |\n| ハイ資格 | **9のペア以上**（一部ルームは6のペア以上） |\n| ロー資格 | **8-or-better**（A-5ランク・ストレート/フラッシュ無視・Aは低） |\n| ロー不成立 | ハイが総取り／ハイ不成立 | ローが総取り |\n| 両者不成立 | 残った全員でチョップ（ルームにより最善ハイへ） |\n\nA2345（ホイール）は**ストレート（ハイ資格）＋ナットロー**の両取り＝最強級です。\n\n---\n\n## 2. 大原則・カードの価値\n\n- **まず資格**。9ペア以上は約**27%**配られるが、8ロー以下は約**2%**。構造的に**ハイ側が取りやすい**。\n- **ハイは強い**：2ペア以上、AA、ナッツ級フラッシュドロー（A♣K♣8♣7♣ 等）。フラッシュは半分の確率で完成し、勝てば大きい。\n- **ローは強い4枚ロー**から：A入りの4枚ホイール／4枚6など。**2♥3♥4♣6♠**は良いが「他ゲームほど無敵ではない」。\n- **2nd nut フラッシュ**は避ける。ブロッカーが無いぶん上のフラッシュに負けやすい。\n\n---\n\n## 3. スターティング（相手ランダム・トリプルドロー）\n\n| ハンド | eq% | スクープ% | ハイ% | ロー% |\n|---|---|---|---|---|\n| A2345 ホイール | 97 | 95 | 95 | 100 |\n| AA＋高札（ハイのみ） | 67 | 51 | 81 | 0 |\n| 2346＋ブリック（4ロー） | 60 | 43 | 18 | 69 |\n\n（各3,000試行。VS HANDでは「2346を1枚引き vs パット99」が**約47%**＝公開値とほぼ一致）\n\nひとことルール：\n> **資格に届く骨格**で入る。AA・2ペア級・ナッツフラドローはハイから、A入り4枚ロー／4枚6はローから。中途半端な単ペアと2nd flushは避ける。\n\n---\n\n## 4. ドロー別の心がけ\n\n- **1st draw**：ハイ志向（ペア・フラドロー）かロー志向（4枚低札）かを決め、不要札を切る。両天秤の手（2♥3♥6♥7♥のような低フラドロー）は価値が高い。\n- **2nd draw**：相手の引き枚数を観察。パット/1枚に対してこちらが伸びれば押す。\n- **3rd draw（最終）**：完成したサイドで勝負。**ローが資格に届かない**ときの空振りに注意。\n\n---\n\n## 5. 応用：フラッシュドローの罠（計算で検証）\n\n「低 vs 2ペア vs フラッシュドロー」の3者では、フラッシュドローは**ホット&コールド・エクイティで不利**になりがち（公開分析でも約23%）。だが早めに完成させて相手のロー・エクイティに**降りる圧**をかけられる利点がある。逆に**2枚目のフラッシュドロー**は大きな負け組（約12%）で、リバース・インプライドオッズも抱えるため**コールドコールは大リーク**。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「ローが正義」→ Archieは**資格でハイが取りやすい**。ハイの価値が他のハイローより高い。\n- 誤解②「フラッシュドローはいつでも強い」→ 2nd flush は事故。ナッツ級に限定。\n- 誤解③「単ペアでも続けてOK」→ 中途半端なワンペアは終盤で削られる。\n- 誤解④「Stud8のように7をキープしてフリーロール」→ Archieにそれは無い。資格と完成度で判断する。\n\n---\n\n## 7. チェックリスト\n\n✅ まず**資格**（ハイ9ペア+／ロー8-）に届く骨格か\n✅ ハイはAA・2ペア級・ナッツフラドロー\n✅ ローはA入り4枚ロー／4枚6\n✅ 2nd flush・中途半端な単ペアは避ける\n✅ 低フラドロー等の両天秤手は価値が高い\n✅ 相手の引き枚数を読む\n✅ ロー資格に届かない空振りに注意\n\n---\n\n## ★ プロの視点\n\nArchieは2010年代にフェニックスで生まれ、近年ミックスで人気上昇中の**未解決**ゲーム。Kevin Haney らの共通見解は「**まず資格、そしてスクープ設計**」「**ハイ側が構造的に有利**（9ペア以上は27%、8ロー以下は2%）」「フラッシュ・オーバー・フラッシュが多くブロッカーが無いので2nd flushは過大評価厳禁」。スタートの基準は人により幅が大きく、**最も意見が割れるゲームの一つ**とも言われます。\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\nここからは Kevin Haney / CountingOuts 等に基づく、一歩踏み込んだ考え方です。\n\n**構造的にハイ有利（数字で押さえる）**\n9ペア以上は約 **27%**、8ロー以下は約 **2.2%** しか配られません。さらにハイは**資格アウツが多い**：`K♣Q♣T♣9♣` はクラブ／J／K／Q／T／9 で多数、`A♣K♣8♣5♣` なら 9フラッシュ＋6ペア＝**15枚**で資格に届く。だから「まず資格、それはハイの方が容易」。\n\n**ローは過大評価されがち**\n`2♥3♥4♣6♠` は広く play しますが、他ゲームほど無敵ではありません。**`2-3-6` 級の3枚ローは原則降り**（スチール／リンプ限定）。エースも引きも無い `2♠4♥6♦7♦` はほぼスチール専用。\n\n**スターティング分類**\n- ハイ：2ペア以上、QQ+、99〜JJ（判断）、**全フラッシュドロー**、4枚ブロードウェイ。\n- ロー：75以下のメイド（**ホイールに割って引く**）、4枚ホイール、4枚6。\n- 両面：**3枚ホイール**（`2♥3♦5♣`）。\n\n**ハイで行くときは人数を絞る**\nローに安く引かせない。AはHUでローに強い（1枚引きはストレートを作らないと勝てず、こちらがその外／ロー札をブロック）。\n\n**フラッシュドローは多人数で罠／だが武器**\nhot-cold では「ロー vs 2ペア vs フラドロー」でフラドローが不利になりうる。だが**早く完成させてローに降りる圧**をかけ、外したら降りられる利点がある（2ペアは終盤コールに縛られがち）。**ナッツ級でない多人数フラドローのコールドコールは大リーク**。\n\n**スクープ設計と欺き**\n- **低ストレート（76543）は両資格**＝スクープ筋。全員が同方向に行くと、1人が総取り。\n- **トリップスを隠す**：パットせず2枚引いて `A♣3♦5♣` 系を装い、相手の最終ベットを誘う／節約する。\n\n参考：Kevin Haney「Archie and Its Variants」（Card Player）、CountingOuts「Archie」、Mark Mazmanian（Card Player）。\n\n## 8. 計算の前提\n\n- ハイ＝5枚の標準ポーカー手（9ペア以上で資格）、ロー＝A-5の8-or-better。両者不成立は残り全員でチョップとしてモデル化。\n- ドローは「ハイ寄り/ロー寄りを選び正直に引く」**近似**（2回目以降は自動）。実戦の繊細な引き判断とは細部で異なります。\n- 数値はオリジナルのモンテカルロ（各3,000試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n参考：CountingOuts「Archie」、Card Player/Haney「Archie and Its Variants」、Pagat「Archie」。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "sstud8nq": "# Super Stud Hi-Lo (No-Qualifier) 完全ガイド\n\n### 5枚配り→2枚捨て、ローに資格が無い Stud\n\nSuper Stud Hi-Lo No-Qualifier（NQ）は、Super Stud の「5枚配り→2枚捨て3枚キープ→7枚に完成」という入口はそのままに、**ローに8-or-betterの資格が無い**版です。つまり**最も低い手が常にローの半分を取る**（10ロー・小ペアでも、誰かが必ずローを取る）。\n\n> 入口の選別（5→3）は Super Stud8 と同じ。違いは出口で、**ローが常に成立**する点。これにより**ハイ一本の手の価値が下がり**、ゲームのバランスが変わります。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**資格が無い＝三低札（両取り）の価値↑。ハイ一本（大ペア）は締める**\n\n- ◎ **プレミアム**：3低札（A-2-x、両取り）\n- ○ **プレイアブル**：8以下の散った3枚\n- △ **スチール/限定**：ハイ一本 → NQでは控えめに\n\n**ポジション目安**：スタッド。ハイ偏重のレンジをさらに締める。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **8-or-better の感覚**のまま、ハイ一本の手を過大評価する（NQでは半分しか取れない）。\n2. **捨て札のミス**で、ローの芽を残せず常に低い相手に半分を渡す。\n3. **死札・生き札**を見ない。5枚×全員で捨て札が大量に出る。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 3rd street | ダウン4枚＋アップ1枚＝**5枚** |\n| 捨て | ベット後、**2枚捨てて3枚に** |\n| 4th〜7th | 通常スタッドと同じ（最終7枚） |\n| ハイ | 標準ポーカー（best5） |\n| ロー | **A-5の最も低い5枚／資格なし**。10ロー・小ペアでも最低なら取る |\n| 分配 | ハイ半分＋ロー半分。**ローは常に誰かが取る** |\n\nA-5では**無ペアが全てのペアに勝ち**、A2345が最良。\n\n---\n\n## 2. 大原則・カードの価値\n\n- **ローが常に出る**ので、ハイ一本（大ペア・ロールアップ）は**8-or-better版より価値が下がる**。スクープ率も落ちる。\n- それでも**ロールアップ（5枚から拾える）**は強力。ただし「総取り」ではなく「ハイ半分＋たまにロー」になりがち。\n- **2-way（三低札）**の相対価値が上がる。ローが必ず争点になるため、低い手を作れることが直接エクイティに繋がる。\n- 捨て札選択：**ローの芽**を残しつつ、ハイの伸び（連結・スート）も見る。\n\n---\n\n## 3. スターティング（5枚→最良3枚・相手ランダム）\n\n| 5枚ディール | 取り分eq% | ハイ% | ロー% | スクープ% |\n|---|---|---|---|---|\n| (AAA) ロールアップ | 56 | 91 | 22 | 18 |\n| A2345 → 3ベビー | 54 | 46 | 63 | 23 |\n| KKQJ9 大ペア | 38 | 68 | 9 | 1 |\n\n（各3,500試行）。8-or-better版の AAA が約77%だったのに対し、**NQでは約56%**——ローが常に出る分ハイ一本が弱くなる、という差がはっきり表れます。\n\nひとことルール：\n> NQでは**ローを取れる手（三低札）の相対価値が上がる**。ハイ一本の大ペアは「半分＋たまに」と割り切り、入口の選別と捨て札でローの芽を残す。\n\n---\n\n## 4. ストリート別の心がけ\n\n- **3rd（捨て前）**：三低札 ＞ ロールアップ ＞ 大ペア＋低札 ＞ 降り。NQではローの芽をより重視。\n- **4th-5th**：ローの完成度を見る。ハイ一本ならビッグベット帯で**過剰投資しない**（必ず誰かにロー半分を持っていかれる）。\n- **6th-7th**：生き札の残量で勝負手か撤退かを判断。\n\n---\n\n## 5. 応用：8-or-better との違い（計算で検証）\n\n8-or-better版では、ロー不成立時に高い手が**総取り**できるためハイ一本も強い。NQでは**その総取りが消える**ため、同じ AAA でも約77%→約56% にエクイティが落ちる。**「ハイ一本の手はNQで一段弱い」**——この一点を体に入れるだけで、参加基準とベットサイズが正しくなります。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「Super Stud8 と同じ感覚でいい」→ ノー。NQは**ハイ一本が弱い**。\n- 誤解②「ローは資格が要らないから雑でいい」→ ノー。**最も低い手だけ**が取る。10ローでは多人数で負ける。\n- 誤解③「ロールアップは総取り」→ NQでは総取りになりにくい（ローを誰かが取る）。\n- 誤解④「A-5でペアでも高ければOK」→ ノー。**無ペアが全てのペアに勝つ**。\n\n---\n\n## 7. チェックリスト\n\n✅ NQ＝**ローは常に誰かが取る**を大前提に\n✅ ハイ一本の手は8-or-better版より一段弱い\n✅ 三低札（2-way）の相対価値が高い\n✅ 捨て2枚はローの芽を残す\n✅ ビッグベット帯でハイ一本に過剰投資しない\n✅ 死札・生き札を数える\n\n---\n\n## ★ プロの視点\n\n「Stud High-Low Regular（NQ）」は古いキッチンテーブル発祥で、**低い手・小ペア・10ローでも半分を引きうる**ため、8-or-better が導入されて以降は「ハイを守るために資格を付ける」方向へ進化しました。NQをあえてSuper（5枚配り）で回すと、**選別で全員が強くなる×ローが常に出る**の二重効果で、ハイ一本の価値がさらに圧縮されます。\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\n**NQ は「ハイ一本」をさらに弱くする**\n資格が無い＝**最も低い手が必ず半分を取る**ため、ロー不成立時の“総取り”が消えます。結果、同じ `AAA` でも 8-or-better 版の約77%に対し NQ では約56%へ。つまり **NQ では大ペア・ロールアップの一本手の価値が一段下がり**、**2-way（三低札）の相対価値が上がる**のが本質。\n\n**最良ハイを持つ原則は同じ／だが基準はタイトに**\nstud8 同様「常に最良のハイ側で参加」は鉄則ですが、NQ ではハイ一本の見返りが小さいので、**ハイ偏重のレンジをさらに締める**。捨て2枚は**ローの芽**を優先的に残し、死札（低札・スート）を数えて、自分のロー完成の生存を確認します。10ロー級でも“最低なら”半分を取れる反面、**多人数では容易に負ける**ので過信は禁物。\n\n参考：Kevin Haney「Super Sized Stud Hi-Lo」「Scoop Advantage in Stud 8」（Card Player）。\n\n## 8. 計算の前提\n\n- モデル：各プレイヤー5枚→**ヒューリスティックに最良3枚を保持**→7枚に完成→ハイ（best5）とロー（A-5最低・資格なし）で**常に**二分割。捨て2枚は死札。\n- 「最良3枚」は自動選択（実戦の捨て判断とは細部で異なる近似）。NQ向けの厳密な最適選別ではありません。\n- 数値はオリジナルのモンテカルロ（各3,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決領域。本記事は実戦的ヒューリスティクスです。\n\n参考：CardPlayer/Haney「Super Sized Stud Hi-Lo」、PokerNews「Stud Hi-Lo no qualifier」。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "ari": "# Ari 完全ガイド\n\n### Archie ＋ 共有カード1枚（ハイ役のみ）\n\nAri（アリ）は **Archie の亜種**。ルールはArchieとほぼ同じ5枚トリプルドロー高低スプリットで、唯一の違いは——**共有カードが1枚オープンされ、それを「ハイ役」にのみ使える**こと。ローには使えません。\n\n> 最近生まれたばかりの新しい種目で、まだマイナーですが少しずつ人気が出始めています。共有カードがハイを底上げするため、**ハイの完成・資格がさらに容易**になり、Archie以上に「ハイ寄り」の性格が強まります。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**Archieと同じ＋共有札がハイを底上げ→質の高い単独ローの価値↑**\n\n- ◎ **プレミアム**：Archie準拠（2ペア+/フラドロー）／共有でハイに化ける形\n- ○ **プレイアブル**：3枚ホイール（共有でストレート目→スクープ筋）\n- △ **スチール/限定**：弱い片面手 → 降り\n\n**ポジション目安**：**共有がどちらに噛むか**を読む。重心はややロー寄り。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **共有カードを“自分だけの得”と勘違い**。共有は**全員のハイ**を等しく底上げするので、メイドハイの優位はむしろ希釈される。\n2. **ローを軽視**。ハイが取りやすいぶん、**質の高いローを単独で持つ価値**が相対的に上がる。\n3. **資格に届かない手**で参加。Archie同様、まず「資格」が第一目標。\n\n---\n\n## 1. ルール（Archieとの差分）\n\n| 項目 | Ari |\n|---|---|\n| ベース | **Archie**（5枚トリプルドロー・高低スプリット） |\n| ハイ資格 | **9のペア以上**（一部6ペア以上） |\n| ロー資格 | **8-or-better**（A-5・ストレート/フラッシュ無視・Aは低） |\n| **共有カード** | **1枚オープン。ハイ役にのみ使用可（ロー不可）** |\n| ハイの作り方 | **自分の5枚＋共有1枚＝6枚**から最良5枚 |\n| ローの作り方 | **自分の5枚のみ**（共有は使えない） |\n| 両者不成立 | 残り全員でチョップ |\n\nA2345（ホイール）は依然として強いですが、Archieより少しだけ価値が下がります（共有札で相手のハイも伸びるため）。\n\n---\n\n## 2. 大原則・カードの価値\n\n- **共有は中立**。みんなのハイを上げるので、**相対的なハイ優位は薄まる**。だから「ハイ単独で勝てる強さ」がより重要。\n- **ローの単独価値が上がる**。共有でハイが取りやすくなる＝ハイは割れやすい。**質の高いロー**を持つと、スクープや単独ロー取りで効く。\n- **共有を見て役を再評価**：共有がA/K級ならペアの価値が跳ねる。共有が自分のランクと噛めば**トリップス／2ペア**で一気にハイを取りにいける。\n- 基本骨格はArchieと同じ：AA・2ペア級・ナッツフラドロー（ハイ）／A入り4枚ロー・4枚6（ロー）。\n\n---\n\n## 3. スターティング（相手ランダム・トリプルドロー）\n\n| ハンド | eq% | スクープ% | ハイ% | ロー% |\n|---|---|---|---|---|\n| A2345 ホイール | 94 | 87 | 88 | 100 |\n| AA＋高札（ハイ寄り） | 62 | 47 | 76 | 0 |\n| 2346＋ブリック（4ロー） | 60 | 43 | 26 | 68 |\n\n（各3,000試行。Archie比でホイール97→94%、AA67→62%——**共有札が相手のハイも底上げ**するため、メイドハイの優位が少し下がるのが特徴）\n\nひとことルール：\n> Archieの基準＋「**共有は全員に効く**」を意識。ハイ単独で勝てる強さと、**質の高いロー**の単独価値を両にらみ。共有札が自分と噛むなら強気にハイを取りにいく。\n\n---\n\n## 4. ドロー別の心がけ\n\n- **1st draw**：自分の5枚で骨格を決める（ハイ志向／ロー志向）。共有は全員に効くので、**自分のローの質**で差をつける発想が有効。\n- **2nd draw**：共有札と自分の手の噛み合いを確認。トリップス/2ペアが見えればハイを強く。\n- **3rd draw（最終）**：資格と完成度で勝負。共有でハイが割れやすいので、**単独ロー**や**スクープ**の価値を意識。\n\n---\n\n## 5. 応用：共有カードは“諸刃”（計算で検証）\n\nVS HANDで「自分AA vs 相手KK／共有A♥」を回すと、自分は**トリップスエース**で約95%——共有が自分と噛めば爆発します。一方、同じ共有札は相手のKKにも一応のチャンスを与え、**共有がKなら逆に相手がトリップス**。つまり共有は**噛んだ側に大きく傾く諸刃**。Ariでは「共有がどちらに噛むか」が大きな分岐になります。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「共有カードは自分の得」→ ノー。**全員のハイ**を上げる中立札。相対優位は薄まる。\n- 誤解②「ハイが取りやすいからハイ一本でいい」→ ハイは割れやすい。**質の高いロー**の単独価値が上がる。\n- 誤解③「Archieと全く同じ戦略でいい」→ ほぼ同じだが、**共有ぶんハイがインフレ**。ロー寄りに少し重心。\n- 誤解④「共有を無視して自分の5枚だけ見る」→ ローはそれでOKだが、ハイは**6枚で再評価**を忘れずに。\n\n---\n\n## 7. チェックリスト\n\n✅ まず**資格**（ハイ9ペア+／ロー8-）\n✅ 共有は**全員に効く中立札**（自分だけの得ではない）\n✅ 質の高い**単独ロー**の価値が上がる\n✅ 共有が自分と噛めばハイを強気に\n✅ AA・2ペア級・ナッツフラドローはハイ、A入り4枚ロー/4枚6はロー\n✅ 2nd flush・中途半端な単ペアは避ける\n✅ ローは自分5枚のみ（共有不可）を忘れない\n\n---\n\n## ★ プロの視点\n\nAri は Archie 系の最新派生で、**共有カード1枚（ハイ専用）**を足した設計（同種の発想に Veronica など）。まだ確立した戦略書は少ないですが、構造から言えるのは「**共有でハイがインフレ→ローの単独価値が相対上昇**」「**共有が噛んだ側に大きく傾く**」という2点。Archieの“まず資格・スクープ設計”に、**共有札の噛み合い読み**を一枚加えるのが核心です。\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\nAri は Archie の上級論（→ Archie ガイドの「★ 上級コンセプト」）がほぼそのまま効きます。その上で**共有札ならでは**の一手：\n\n**共有は「ハイ専用」だが、低い共有札はロー側にスクープの窓を開く**\nHaney の指摘で重要なのは、共有カードはハイにしか使えないのに、**低い共有札はローのドロー手をスクープに導く**こと。例えば `3-4-5` の2枚引きは、場に出る **16枚（A・2・6・7）でストレートドロー**になり、ハイの資格（ストレート）とローを同時に狙える＝スクープ力が一段増します。つまり共有札は単なる「ハイのインフレ要因」ではなく、**ロー寄りの手にも上がり目を与える**諸刃。\n\n**重心はややロー寄りへ**\n共有でハイ全体がインフレ→ハイは割れやすい→**質の高い単独ロー**の相対価値が上がります。共有が自分のランクと噛めばトリップス／2ペアで一気にハイを取りに行き、噛んだ側に大きく傾く——「共有がどちらに噛むか」を読むのが核心です。\n\n参考：Kevin Haney「Archie and Its Variants」（Card Player、コミュニティカード版＝Veronica 系の指摘）。\n\n## 8. 計算の前提\n\n- ハイ＝自分5枚＋共有1枚の6枚から最良5枚（9ペア+で資格）、ロー＝自分5枚のみの8-or-better。両者不成立は残り全員でチョップ。\n- 共有カードはEQUITYでは毎回ランダム、VS HANDでは指定可（空＝ランダム）。\n- ドローは「ハイ寄り/ロー寄りを選び正直に引く」**近似**（2回目以降は自動・Archieと共通方策）。共有札を見た繊細な引き調整までは模擬していません。\n- 数値はオリジナルのモンテカルロ（各3,000試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 新興・未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n参考：Archie系解説（CountingOuts / Card Player）、コミュニティカード派生（Veronica 等）の一般則。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "dramahaHi": "# Dramaha Hi 完全ガイド\n\n### 5枚ドロー × オマハ・ハイの二刀流スプリット\n\nDramaha（ドラマハ／Drawmaha、別名 Sviten Special）は、**5枚ドロー**と**オマハ・ハイ**を1つの手で同時に戦う split-pot。半分は**5枚のドロー手（標準ポーカー）**、もう半分は**オマハ・ハイ（ホール2枚＋ボード3枚）**へ。同じ5枚が**二役**を担います。Dramaha Hi は両サイドとも**ハイ**で、最も筋の良い（cohesive）バージョンです。\n\n> 進行：5枚配り→プリフロップ→**フロップ**→ここで**1回だけドロー**（0〜5枚交換）→ターン→リバー→ショーダウン。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**ドロー（5枚ハイ役）が主役。大ペア（KK+）で隔離、AAは即3ベット**（Omahaはおまけ）\n\n- ◎ **プレミアム**：AA（即3ベット）／KK・QQ（1人に隔離）\n- ○ **プレイアブル**：強いドロー手＋Omahaの裏付け\n- △ **スチール/限定**：小〜中ペア・中途半端な両面手 → 損\n\n**ポジション目安**：フロップ後1ドロー＝**1人に隔離**して4ストリート価値。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **オマハ偏重**で参加。オマハ半分しか狙えない手は、しばしば半分止まりで損。\n2. **ドロー手を軽視**。黄金律＝**ドロー手の強さがオマハの可能性より遥かに重要**。\n3. **2枚以上引き**を多用。1回しか引けないので、良い5枚手を作る確率が下がりやすい。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 配り | 5枚（伏せ） |\n| ボード | フロップ3・ターン1・リバー1（共有） |\n| ドロー | **1回のみ**（フロップ後／0〜5枚交換。6-7人なら3枚まで） |\n| ドロー側 | **5枚すべて**を標準ポーカー手として判定（A2345はストレート） |\n| オマハ側 | ちょうど**ホール2枚＋ボード3枚**のハイ |\n| 分配 | ドロー半分＋オマハ半分。同一人物の**スクープ**可 |\n\n---\n\n## 2. 大原則・カードの価値\n\n- **黄金律：ドロー手が主役**。1回ドローでは、ドロー前に勝っている手はドロー後も大半で勝つ。だから**ドロー手の質**を最優先。\n- **AAは強い**。ドロー側で資格十分＋オマハ側でもセット/フルハウスの芽。`A♣ A♦ + クラブ`なら**ナットフラドロー込みでスクープ性が高い**。\n- **裸のオマハ強手**（例：A♥K♥A♣Q♣J♠のような“見栄えの良い”オマハ）は、ドロー側が弱いと**半分狙い**で過大評価になりがち。\n- **A2345**はドロー側が**5ストレート（ほぼ勝ち）**＋オマハでもホイール札が絡む二刀流。\n\n---\n\n## 3. スターティング（相手ランダム・PATモデル）\n\n| ハンド | eq% | ドロー側% | オマハ側% | スクープ% |\n|---|---|---|---|---|\n| A2345 ストレート | 73 | 99 | 47 | 45 |\n| KKQJT | 73 | 88 | 59 | 51 |\n| AAKK5（素2ペア） | 高 | — | — | — |\n\n（各2,500試行・**ドロー前/パット相当**で評価。下記「計算の前提」参照）\n\nひとことルール：\n> **まず強いドロー手**（made ストレート/フラッシュ、大ペア、2ペア+）。そこに**オマハの裏付け**（A2やスーテッド）が乗る手を選ぶ。オマハ一本は半分狙いで避ける。\n\n---\n\n## 4. ストリート／ドローの心がけ\n\n- **フロップ後の1ドロー**が最大の分岐。**ドロー手を壊さない**のが原則。良い5枚手はパット気味に。\n- **2枚以上引きは慎重に**。1回しか引けないので、強いドロー手を5枚手として完成させる確率を優先。\n- ターン・リバーは**オマハ側の伸び**で押し引き。スクープが見えたら厚く。\n\n---\n\n## 5. 応用：「半分狙い」の罠（計算で検証）\n\nジャックハイ・フラッシュのようなオマハ中堅手は、**5枚オマハでは大した手ではない**のにドロー手が弱いと**スクープ不能**になり、AAのフラッシュに丸取りされることも。**ドロー側で勝てる手**を軸に、オマハは“おまけのスクープ”と捉えるのが正着です。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「オマハの強い形が正義」→ ノー。**ドロー側が主役**。半分狙いは損。\n- 誤解②「たくさん引いて作り直せる」→ ドローは**1回だけ**。引きすぎは禁物。\n- 誤解③「2ペアはオマハで強い」→ 5枚オマハで2ペアはほぼ勝てない。セット以上が基準。\n\n---\n\n## 7. チェックリスト\n\n✅ **黄金律＝ドロー手が主役**を最優先\n✅ AA・2ペア+・made ストレート/フラッシュを軸に\n✅ そこにオマハの裏付け（A2・スーテッド）が乗るか\n✅ オマハ一本（半分狙い）は避ける\n✅ 1ドローでドロー手を壊さない\n✅ 2枚以上引きは慎重に\n\n---\n\n## ★ プロの視点\n\nDramaha（Hi）は近年ライブ／オンラインのミックスで人気上昇中。Kevin Haney の「**黄金律**」——“ドロー手の強さがオマハの可能性より遥かに重要”——が核心で、「1回ドローでは入場時に勝っている手が勝ち続ける」ため、**スタートのドロー手の質**で大半が決まる、というのが共通見解です。\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\nKevin Haney（Card Player「Golden Rule of Dramaha」「Old School Dramaha」）に基づく上級論です。\n\n**High は“支配・隔離”ゲー**\n1ドローしか無いため、**ドローに入る時点で先頭の手は、ドロー後も大本命**のまま。`KK` は `QQ` に対して**約4:1**、しかも Omaha 側でも優位なので、下位ペアにとっては悲惨な状況。だから**上位ペアの可能性があるなら1人に隔離**し、ロック級の手は**4ストリート・バリュー**で取りにいく。\n\n**AA は自動3ベット**\n相手はドローでオーバーペアを持てない。2ペア相手でも Omaha で捲られにくく、ドローで約**25%**リードを奪える。だから `AA` は迷わず3ベット。\n\n**やってはいけない過大評価**\n- **小〜中ペア**は安い（近年タイトアグレッシブ化）。1ドローではフラッシュ・ストレートが作りにくい。\n- **中途半端な両面手**は損：J-highフラッシュは `AA`＋A-highフラッシュにスクープされる（5枚Omahaで J-high は弱い）。「Omahaを引きにいって、結局両方負ける」のが典型のリーク。\n\n**1ドローは“両手同時”の改善**\nドローはフロップ後（共有3枚が見えた状態）なので、**Omaha 側の情報を見てから引ける**。クラブのフラドローが付けば不要な高札を切ってフラッシュを狙う等、ドロー手と Omaha 手は連動して伸びる。\n\n参考：Kevin Haney「Limit Dramaha」「The Golden Rule of Dramaha」（Card Player）、Jim Donahue『Dramaha』。\n\n## 8. 計算の前提\n\n- **PATモデル**：本ツールは「配られた5枚（ドロー前／パット相当）＋ボード」でスプリットを計算します。黄金律により**入場時のドロー手の強さがほぼ持続**するため、パット相当は良い近似ですが、**1回ドローによる改善は明示的には模擬していません**（ドローの巧拙こそ実戦のスキル層）。\n- ドロー側＝5枚の標準ポーカー手、オマハ側＝ホール2＋ボード3のハイ。両者とも常に成立。\n- 数値はオリジナルのモンテカルロ（各2,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n参考：Card Player/Haney「The Golden Rule of Dramaha」、PokerListings「Drawmaha」、Asian Poker Tour。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "dramaha27": "# Dramaha 2-7 完全ガイド\n\n### 2-7ドロー × オマハ・ハイ（低×高の二刀流）\n\nDramaha 2-7（Drawmaha 2-7）は Dramaha の人気変種。半分は**5枚の 2-7ロー**（最低の手）、もう半分は**オマハ・ハイ**へ。同じ5枚で**低い2-7**と**高いオマハ**を同時に作る——方向が逆なので、Hi版より**スクープが難しく**、ねじれた面白さがあります。\n\n> 進行は Dramaha と同じ：5枚→プリフロップ→フロップ→**1回ドロー**→ターン→リバー。2-7側は**Aは最強＝悪い／ストレート・フラッシュは不利**、ナットは **75432**。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**2-7ドローが主役。10/Jロー＋高札のコンボ（J6432 型）**（プレミアムOmahaは無価値）\n\n- ◎ **プレミアム**：強い2-7ドロー／J6432 型コンボ（柔軟）\n- ○ **プレイアブル**：10/Jロー＋高札／良い1枚引き\n- △ **スチール/限定**：弱いOmaha偏重 → 壊してロー\n\n**ポジション目安**：エクイティ拮抗。ロックアウト時はフリーロール。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **両取りを狙いすぎる**。低×高は逆方向でスクープが難しい。**片サイドを大きく**が基本。\n2. **2を持たずに入る**。2-7では**2を含む**手がスタートの中心。\n3. **オマハ偏重**で2-7側が最弱（ペア・A入り）になり、半分すら危うくなる。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 配り | 5枚（伏せ） |\n| ボード | フロップ3・ターン1・リバー1 |\n| ドロー | **1回のみ**（フロップ後・0〜5枚） |\n| 2-7側 | **5枚すべて**で判定。Aは高（悪い）・straight/flush不利。ナット **75432** |\n| オマハ側 | ホール**2枚＋ボード3枚**のハイ |\n| 分配 | 2-7半分＋オマハ半分。資格なし（両者常に成立） |\n\n---\n\n## 2. 大原則・カードの価値\n\n- **2が最重要**、次いで7。両方あると伸びる。**6はしばしば手殺し**（ストレートを作りやすく2-7で不利）。\n- 低×高は**逆方向**。スクープは難しいので、**狙うサイドで大きく**勝ちにいく。\n- **75432（ナット2-7）**はドロー半分をほぼ確保。ただしオマハ側は弱く、**片取り**になりやすい。\n- **オマハ強手（AAKQJ等）**は2-7側が最弱になり、**オマハ半分狙い**。\n\n---\n\n## 3. スターティング（相手ランダム・PATモデル）\n\n| ハンド | eq% | 2-7側% | オマハ側% | スクープ% |\n|---|---|---|---|---|\n| 75432 ナット2-7 | 69 | 100 | 39 | 37 |\n| AAKQJ（オマハ寄り） | 36 | 8 | 65 | 6 |\n| 234＋高2（2-7引き） | — | — | — | — |\n\n（各2,500試行・**ドロー前/パット相当**）\n\nひとことルール：\n> **2を含む低札スタート**を基本に、狙う半分（多くは2-7側）で大きく。逆方向ゆえ**片サイドを確実に**取りにいくのが正着。\n\n---\n\n## 4. ストリート／ドローの心がけ\n\n- **フロップ後の1ドロー**：2-7を狙うなら低札を残し高札を捨てる。**良い2-7（8以下）はパット**気味に。\n- 2-7側のパット/1枚引きは情報になる。相手の方向を読む。\n- ターン・リバーは**オマハ側の伸び**で押し引き。低×高ゆえ、スクープは“ボーナス”。\n\n---\n\n## 5. 応用：「逆方向」の難しさ（計算で検証）\n\n低いストレート・フラッシュが**オマハでは強い高**になる一方、それは2-7では**不利**。両立が難しいため、**片サイド特化**の手が多くなる。75432 が**2-7側ほぼ100%・オマハ39%**で総合69%という数字が、「**片サイドを確実に取り、もう半分はオマハの伸び次第**」というこのゲームの本質を表しています。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「Dramaha Hi と同じ感覚」→ ノー。低×高で**スクープが難しい**。\n- 誤解②「2が無くても低ければOK」→ 2-7では**2**が中心。6は手殺しになりやすい。\n- 誤解③「オマハ強手で両取り」→ 2-7側が最弱になり、半分狙いが現実的。\n- 誤解④「ストレートはオマハで強いから得」→ 2-7側では不利になる諸刃。\n\n---\n\n## 7. チェックリスト\n\n✅ **2を含む**低札スタートを基本に\n✅ 低×高は逆方向＝**片サイドを大きく**\n✅ 6は手殺しになりやすい\n✅ 良い2-7（8以下）はパット気味\n✅ オマハ偏重で2-7最弱を作らない\n✅ スクープは“ボーナス”と捉える\n\n---\n\n## ★ プロの視点\n\nDramaha 2-7 は Hi版と並ぶ人気変種ですが、Haney は「**ねじれている**（オマハの良い札は高、2-7は低）」「ドロー判断が**パット/引きで単純**になりがち」「オマハ側の**ランダム性が高い**」と評し、Hi版の方が cohesive で profitable とする立場。とはいえ**低版が好きな players も多く**、片サイドを大きく取りにいく設計が鍵、という点は共通です。\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\n**2-7 はエクイティが“拮抗”する（High の支配と対照的）**\nHaney によれば、High Dramaha では一方が60〜80%の大差を持つことが日常的ですが、**2-7 版ではそれは稀**。大差がつくのは「相手が2-7側からロックアウトされた」時だけ。最良の2-7ドローでもロー側は約**60%**どまりで、高い札の側が Omaha で有利になり、**ほぼコインフリップ**の局面が多くなります。\n\n**プレミアム Omaha は無価値／弱い Omaha は壊す**\n`AAKQ` のような“良い Omaha”は 2-7 では基本的に無価値（黄金律の極端版）。**モンスターハイで半分確保**でない限り、**弱い Omaha 手は壊してロー（2-7）を引く**のが基本。K-highフラッシュ以下は割って引き、A-highフラッシュ（`AJ943` 等）はハイで打つ選択もあり。\n\n**コンボ手と“10/Jロー”が機能する理由**\n`J6432` のようなコンボは強い：J が要れば **J-low＋J-highフラッシュ**、要らなければ J を捨てて**強いローへ**。この柔軟性ゆえ、2-7 Dramaha では preflop で **10-low / J-low** が機能します。\n\n**ドローのレイズは慎重に／フリーロール**\n**フロップでドローをレイズしない**（全ドローが強くない限り）——メイドのローに突っ込むことになる。`6-highフラドロー＋9874` は不足。良い2-7を作れたら、パットで人数を絞って延命したり、相手がロックアウトされていれば**フリーロール**で厚く取る。\n\n参考：Kevin Haney「Fundamentals of Limit Deuce to Seven Dramaha」（Card Player）、Chris Wallace（CardsChat）、CountingOuts。\n\n## 8. 計算の前提\n\n- **PATモデル**：「配られた5枚（ドロー前／パット相当）＋ボード」でスプリットを計算。**1回ドローの改善は明示的には模擬していません**（ドローの巧拙が実戦のスキル層）。\n- 2-7側＝5枚（A高・straight/flush不利・ナット75432）、オマハ側＝ホール2＋ボード3のハイ。両者とも常に成立。\n- 数値はオリジナルのモンテカルロ（各2,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n参考：Card Player/Haney「Dramaha」連載、Asian Poker Tour「Drawmaha 2-7」、PokerChipForum。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "dramahaBadugi": "# Dramaha Badugi 完全ガイド\n\n### バドゥーギ × オマハ・ハイの二刀流（別名 Dramadugi）\n\nDramaha Badugi（ドラマハ バドゥーギ／**Dramadugi**、別名 Dramaha Low-Dugi）は Dramaha の人気変種。半分は**ベスト・バドゥーギ**（最も低い4枚バドゥーギ）、もう半分は**オマハ・ハイ**へ。同じ5枚で「低いバドゥーギ」と「高いオマハ」を同時に作ります。Aは低く、**ナットは A-2-3-4 レインボー**。バドゥーギが無ければ最良の3枚（tri）でドロー側を争います。\n\n> 進行は他の Dramaha と同じ：5枚→プリフロップ→フロップ→**1回ドロー**→ターン→リバー。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**低い4枚バドゥーギ（8以下）＋オマハの裏付け**（AAKKの最弱バドゥーギは避ける）\n\n- ◎ **プレミアム**：A-2-3-4〜の低バドゥーギ＋高サポート\n- ○ **プレイアブル**：8以下の4枚バドゥーギ／A-2-3＋高\n- △ **スチール/限定**：弱バドゥーギ（9+） → 壊す\n\n**ポジション目安**：2枚引きでバドゥーギ確率は倍。強パットも油断しない。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **弱いパット・バドゥーギに固執**。5枚配りなのでパット・バドゥーギは**約5回に1回**出るが、**2枚引きでバドゥーギ確率は倍**になる＝強そうなバドゥーギも簡単に抜かれる。\n2. **オマハ偏重**でバドゥーギ側が貧弱（AAKK等）になり、半分すら怪しくなる。\n3. **黄金律を忘れる**：Dramaha全般、**ドロー（ここではバドゥーギ）側が主役**。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 配り | 5枚（伏せ） |\n| ボード | フロップ3・ターン1・リバー1 |\n| ドロー | **1回のみ**（フロップ後・0〜5枚） |\n| バドゥーギ側 | **5枚から最良の4枚バドゥーギ**（A低）。ナット **A-2-3-4**。無ければ3枚 tri |\n| オマハ側 | ホール**2枚＋ボード3枚**のハイ |\n| 分配 | バドゥーギ半分＋オマハ半分（資格なし・両者常に成立） |\n\n---\n\n## 2. 大原則・カードの価値\n\n- **低いバドゥーギが主役**。`A-2-3-4` がナット、次いで `A-2-3-5`…。**8以下の4枚バドゥーギ**なら多くのポットでドロー側を取れる。\n- **2枚引きはバドゥーギ確率を倍**にする。`(A-2-3)JK` は約**40%**でバドゥーギを作り、`5-7-8-9-x` のような中位バドゥーギを約**25%**で抜く。→ **強いパットでも油断禁物**、こちらも積極的に引いて抜きにいく。\n- **弱いパット・バドゥーギは壊す**価値がある（例：9や高めのバドゥーギ）。\n- **オマハの裏付け**（A2・スーテッド・コネクト）が乗る手を優先。バドゥーギ偏重で `AAKK` のような**バドゥーギ最弱**の形は半分狙いになりがち。\n\n---\n\n## 3. スターティング（相手ランダム・PATモデル）\n\n| ハンド | eq% | バドゥーギ側% | オマハ側% | スクープ% |\n|---|---|---|---|---|\n| A234 ナットバドゥーギ＋9 | 71 | 100 | 43 | 41 |\n| 5678（8バドゥーギ）＋K | 73 | 97 | 50 | 46 |\n| AAKK5（オマハ寄り） | 41 | 21 | 61 | 12 |\n\n（各2,500試行・**ドロー前/パット相当**）。`A234`・`5678` のような**4枚バドゥーギ**はドロー側をほぼ確保。`AAKK` 系はバドゥーギが弱くオマハ頼み。\n\nひとことルール：\n> **低い4枚バドゥーギ（8以下）**を軸に、オマハの裏付けが乗る手を選ぶ。強いパットでも「2枚引きで倍」を念頭に、必要なら割って抜きにいく。\n\n---\n\n## 4. ストリート／ドローの心がけ\n\n- **フロップ後の1ドロー**が肝。良いバドゥーギ（8以下4枚）はパット気味に、弱いバドゥーギは壊して引き直す。\n- **興味深い分岐**：`(A-2-3-J)K` のような手で**フロップがJのトリップス**を作ったら、**1枚引いてオマハを大きく伸ばす**（バドゥーギ完成率を下げてでもオマハ価値を取る）選択がありうる。\n- ターン・リバーはオマハ側の伸びで押し引き。スクープが見えたら厚く。\n\n---\n\n## 5. 応用：High-Dugi という別バージョン（参考）\n\nDramaha には**最も“高い”バドゥーギ**を狙う **Dramaha High-Dugi** もあります（4スートは必要だが、**クアッズ・トリップス・2ペア・大ペアが価値**を持ち、ベストは `A-A-A-A`）。例えば `K-K-T-8-3` は現状「キングのペア・バドゥーギ」。本ツールが実装しているのは**低いバドゥーギ版（Dramadugi）**で、High-Dugi は別物として区別してください。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「パット・バドゥーギは安全」→ **2枚引きで倍**になるので、中位パットは簡単に抜かれる。\n- 誤解②「オマハの強い形が正義」→ ノー。**バドゥーギ側が主役**。\n- 誤解③「バドゥーギは4枚あれば十分」→ **低さ**が重要。9以上の4枚はしばしば負ける。\n- 誤解④「A-2-3-4-5 はストレートだから強い」→ バドゥーギは**スート/ランク違いの4枚**を見るので、A-2-3-4 が4スートなら最強。5枚目は無関係。\n\n---\n\n## 7. チェックリスト\n\n✅ **低い4枚バドゥーギ（8以下）**を軸に\n✅ オマハの裏付け（A2・スーテッド）が乗るか\n✅ 強いパットでも「2枚引きで倍」を意識して抜きにいく\n✅ 弱いバドゥーギ（9+）は壊す\n✅ フロップでオマハが化けたら1枚引きでオマハ優先も\n✅ バドゥーギ偏重で `AAKK` 型の最弱バドゥーギを作らない\n\n---\n\n## ★ プロの視点\n\nDramadugi は Kevin Haney の「Badugi Dramahas」で解説される人気変種。要点は「**パット・バドゥーギの過信は禁物**（5枚配り＝1/5でパット、2枚引きでバドゥーギ確率は倍）」「**弱いバドゥーギは壊す／そもそも play しない**判断」「フロップ次第で**バドゥーギ完成率を犠牲にオマハへ寄せる**1枚引き」。黄金律（ドロー側が主役）はここでも健在で、**低いバドゥーギを安定して作れる手**を選ぶのが核心です。\n\n---\n\n## 8. 計算の前提\n\n- **PATモデル**：「配られた5枚（ドロー前／パット相当）＋ボード」でスプリットを計算。**1回ドローの改善は明示的には模擬していません**（ドローの巧拙が実戦のスキル層）。\n- バドゥーギ側＝5枚から最良4枚バドゥーギ（A低・無ければ3枚 tri）、オマハ側＝ホール2＋ボード3のハイ。両者とも常に成立。\n- 数値はオリジナルのモンテカルロ（各2,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n参考：Kevin Haney「The Badugi Dramahas」（Card Player）、CountingOuts、Asian Poker Tour「Drawmaha」。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "a5td": "# A-5 トリプルドロー 完全ガイド\n\n### エース・トゥ・ファイブ（カリフォルニア・ローボール）\n\nA-5 トリプルドロー（Ace-to-Five Triple Draw）は、2-7 トリプルドローと並ぶミックスの**一枚看板**。5枚を3回引いて**最も低いA-5ロー**を作る一人勝ちゲームです。2-7と違い、**ストレートもフラッシュもローに影響しません**。Aは低く、**ナットは A-2-3-4-5（ホイール）**。\n\n> 2-7 TD と配り・ベット・ドロー構造は同一。違いは**役の数え方**だけ。これが戦略を大きく変えます。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**A絡みの連結低4枚（A-2-3-4 型）。ストレート・フラッシュは無視**（狙い7〜ホイール）\n\n- ◎ **プレミアム**：4枚ホイール・4枚6（強ロードロー）／パットの7以下\n- ○ **プレイアブル**：A入りの低3枚＋引き\n- △ **スチール/限定**：弱い1枚引き → ボタン\n\n**ポジション目安**：トリプルドロー＝レイトで緩める。**ラフ8は割って引く**。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **2-7 の感覚のまま**プレイ。A-5 では**デュースの価値が下がり**、ストレートを恐れる必要もない。\n2. **重いメイドに固執**。`8` や `9` ローでパットし、相手の `7`・ホイールに削られる。\n3. **ペアを抱える**。A-5でも**ペアは無ペアに全敗**。低くてもペアは弱い。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | 5枚・**トリプルドロー**（ドロー3回・ベット4回） |\n| 役 | **A-5ロー**。Aは低、**ストレート/フラッシュは無視** |\n| ナット | **A-2-3-4-5（ホイール）**、次いで 6-4-3-2-A… |\n| 勝者 | 最も低い5枚（一人勝ち・スプリットなし） |\n\nA-5では**無ペアが全てのペアに勝つ**。`6-5-4-3-2`（スムーズ6）＞`6-6-…`。\n\n---\n\n## 2. 大原則・カードの価値\n\n- **デュースは2-7ほど特別でない**。ストレートを作っても無罰なので、`A-2-3-4-5` が普通に最強。\n- **目標は7ロー〜ホイール**。`8` ローは「メイドだが重い」。`9` 以上のパットは多人数で勝てない。\n- **ラフ vs スムーズ**：`8-4-3-2-A`（スムーズ8）＞`8-7-6-5-4`（ラフ8）。同じ8ローでも2番目に低い札が効く。\n- **ペアを割って引く**：`8-6-4-2-A` で `8` を割って引くより、まず**ペアや高札を捨てる**。`8-6-4-2-2` なら片方の2を捨てて引く。\n\n---\n\n## 3. スターティング／ドロー（相手ランダム・3ドロー）\n\n| ハンド | eq%（HU） |\n|---|---|\n| A-2-3-4-5 パット・ホイール | ~100 |\n| A-2-3-4 ＋ ブリック（1枚引き） | 82 |\n| 8-7-6-5-4 ラフ8（パット） | 71 |\n\nひとことルール：\n> **2枚以下引きの強いロードロー**（4枚ホイール／4枚6/7）で攻める。パットは**7以下**を基準に、8は状況次第、9以上は基本割って引く。\n\n---\n\n## 4. ドロー別の心がけ\n\n- **1st draw**：高札・ペアを捨て、4〜5枚の低い骨格に。`8642A` なら **8を捨てて引く**価値が高い。\n- **2nd draw**：相手の引き枚数を観察。パット/1枚に対し、こちらが7・ホイール圏なら押す。\n- **3rd draw**：完成度で勝負。**スムーズ低**を作れたか、相手のパットを上回れるか。\n\n---\n\n## 5. 応用：2-7 との違い（実戦で効く）\n\n- 2-7では `7` が floor だが、A-5では**ホイール込みでさらに低い手**が普通に出る → **8ローの相対価値が下がる**。\n- ストレートが無罰なので、**連結した低札（A-2-3-4 等）が引き得**。2-7のように散らす必要がない。\n- スノー（ブラフのパット）は2-7ほど効きにくい（相手も低い手を作りやすく降ろしにくい）。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「デュースが命」→ A-5では2-7ほど特別でない。**A入りの連結低札**が主役。\n- 誤解②「8ローは強い」→ ホイール/7が出やすいぶん**8は重い**。割って引く判断を持つ。\n- 誤解③「ストレートを避ける」→ A-5では**無罰**。気にせず低く。\n- 誤解④「低ければペアでもOK」→ ノー。**無ペアが全ペアに勝つ**。\n\n---\n\n## 7. チェックリスト\n\n✅ 目標は**7ロー〜ホイール**\n✅ デュースに固執しない（A-5では普通の低札）\n✅ ラフ8/9は割って引く判断\n✅ スムーズ（2番目に低い札）を重視\n✅ ペア・高札から捨てる\n✅ 相手の引き枚数を読む\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\n- **「8を割る」勇気**：`8642A` のような**ラフ8パット**は、3ドローもあるなら**8を捨てて引き直す**方が EV が高い局面が多い。A-5は floor が低い（ホイールが出る）ため、8ローは2-7ほど守る価値がない。\n- **スムーズの階層**：`8-4-3-2-A` は `8-7-6-5-4` に楽勝。スターティングでも「**2番目に低い札**」を意識し、`8-4-3-2` 型を `8-7-6-5` 型より上に置く。\n- **ポジションと引き枚数の言語**：トリプルドローは情報戦。パット→1枚→2枚の意味を相手ごとに読み、**良いロードローはレイズで人数を絞る**。\n- **A-5 と Badacey の接続**：A-5 の感覚は **Badacey**（A-5＋バドゥーギ）のロー側そのもの。両者をセットで練習すると伸びます。\n\n参考：Cardplayer Lifestyle「Draw Games（A-5 Triple Draw）」、Kevin Haney（Card Player, A-5 TD はミックスの定番）。\n\n---\n\n## 8. 計算の前提\n\n- モデル：3回のドローを「低い distinct 札を残し、7以下メイドでパット、9+は割って引く」**近似**で自動進行し、A-5キー（無ペア優先・A低）で一人勝ちを判定。\n- 数値はオリジナルのモンテカルロ（各4,200試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "razzdeucey": "# Razz-deucey 完全ガイド\n\n### バドゥーギ × 2-7ロー を“スタッド形式”で（Super Razz-dugi 2-7）\n\nRazz-deucey（ラズ・デューシー）は、**Baduecey をスタッド形式で回す**ゲーム。Kevin Haney 曰く「最も好まれるスタッド・ロー変種」の一つです。半分は**ベスト・バドゥーギ**、もう半分は**ベスト2-7ロー**へ。**Aは高**（悪い）で、`2-3-4-5` が最強バドゥーギ。\n\n> 通常は **“Super”** で回す：各自4枚ダウン＋ドア＝5枚を受け、**2枚捨てて3枚**にしてから4thストリートへ。以降は7枚スタッドと同じ。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**散った低3枚（2-3-4 型）。Aは高で不利**（バドゥーギ先→2-7フリーロール）\n\n- ◎ **プレミアム**：3枚レインボー低札（2-3-4・2-3-5）\n- ○ **プレイアブル**：2/3入りの3枚（バドゥーギ寄り）\n- △ **スチール/限定**：A高絡み → 評価を下げる\n\n**ポジション目安**：スタッド＝見せ札・死札。**3枚レインボー**で入る。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **高いドア札**で参加。スタッド・ローでは**高札の見えるスタート＝原則アウト**。\n2. **Aを過大評価**。Razz-deucey は**A高**なので、Aはバドゥーギにも2-7にも不利。\n3. **バドゥーギ軽視**。核心は「**バドゥーギを作って2-7をフリーロール**」。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | **Super Stud**（5枚→2枚捨て→3枚→7枚） |\n| バドゥーギ側 | 7枚から最良の4枚バドゥーギ。**A高**・`2-3-4-5` が最強 |\n| 2-7側 | 7枚から最良の5枚2-7ロー（ストレート/フラッシュ不利・A高） |\n| 分配 | バドゥーギ半分＋2-7半分（両者常に成立） |\n\n---\n\n## 2. 大原則・カードの価値\n\n- **3枚レインボー低札**でスタート（Haney）。スート・ランクが散った低い3枚がバドゥーギと2-7の両方に効く。\n- **Aは高で二重に不利**。`A-2-3-4` は一見良さげだが、Razz-deucey では A がバドゥーギ・2-7とも足を引っ張る。\n- **核心は「バドゥーギ先・2-7をフリーロール」**：先にバドゥーギを確定し、2-7を引く側がパット片面手をフリーロールする。\n- **死札・ドア札を読む**：相手の見せ札が高い／自分の必要スートが場で死んでいないかを常に確認。\n\n---\n\n## 3. スターティング（相手ランダム・5枚→keep3→7）\n\n| ハンド | eq% | バドゥーギ% | 2-7% |\n|---|---|---|---|\n| 2-3-4-5 レインボー | 66 | 65 | 66 |\n| A-2-3-4（A高で不利） | 42 | 44 | 41 |\n| 2-3-4-7 三低札 | 中 | — | — |\n\nひとことルール：\n> **散った低い3枚（2-3-4 等）**から入る。Aは高なので評価を一段下げる。高いドア札はパス。\n\n---\n\n## 4. ストリート別の心がけ\n\n- **3rd（捨て前）**：3枚レインボー低札 ＞ それ以外。2枚捨ては**バドゥーギ＋2-7**の芽を残すように。\n- **4th-5th**：相手の見せ札と引きを読む。自分の鍵札（必要スート/低札）が生きていれば押す。\n- **6th-7th**：完成度で勝負。バドゥーギを確定したら2-7側はフリーロールで厚く。\n\n---\n\n## 5. 応用：盤面読みとフリーロール\n\nスタッドなので**相手の見せ札（ドア・各ストリートのアップ）が情報**。強さを見せた相手が `4♥` のドアなら、こちらが必要なハートを持たれていないことが多い、といった読みができる。鍵札が生きていれば、何度かブリックしても5thのベットをコールして**プレミアム・バドゥーギ＋フリーロール**を狙う価値がある。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「A-2-3-4 は最強」→ Razz-deucey は**A高**。A入りは評価を下げる（`2-3-4-5` が本命）。\n- 誤解②「2-7が主役」→ 核心は**バドゥーギ先**。作ってから2-7をフリーロール。\n- 誤解③「ポジション任せ」→ スタッドは**ドア札・死札の読み**が主軸。\n\n---\n\n## 7. チェックリスト\n\n✅ **3枚レインボー低札**スタート\n✅ A高＝Aは不利、評価を下げる\n✅ バドゥーギ先・2-7フリーロール\n✅ 高いドア札はパス\n✅ 死札・鍵札の生存を数える\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\nHaney は Razz-deucey / Razz-dacey を「中・低ステークスのミックスで**最も好まれるスタッド・ロー変種**」と位置づけ、要点を「**Super では3枚レインボーで始める**」「**バドゥーギを作って低側をフリーロール**」（Baduecey/Badacey と共通の核心）とまとめます。スタッドゆえに**見せ札・死札の情報**が draw 版より豊富で、鍵札が生きていれば**ブリックしてもコールして freeroll を狙う**忍耐が効きます。Baduecey の戦略がほぼそのまま移植できるので、**Baduecey とセット**で覚えるのが近道です。\n\n参考：Kevin Haney「Spice Up Your Home Game: Stud Lowball Variants」（Card Player）。\n\n---\n\n## 8. 計算の前提\n\n- モデル：5枚→**3枚レインボー低札をヒューリスティックに保持**→7枚へ完成→バドゥーギ（A高）と2-7で二分割。捨て2枚は死札。\n- 「3枚保持」は自動選択（実戦の捨て判断とは細部で異なる近似）。\n- 数値はオリジナルのモンテカルロ（各3,500試行）。相手ランダム想定で絶対値は高め。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "razzdacey": "# Razz-dacey 完全ガイド\n\n### バドゥーギ × A-5ロー を“スタッド形式”で（Super Razz-dugi A-5）\n\nRazz-dacey（ラズ・デイシー）は、**Badacey をスタッド形式で回す**ゲーム。半分は**ベスト・バドゥーギ**、もう半分は**ベストA-5ロー**へ。Razz-deucey と違い**Aは低**で、**ナットは A-2-3-4（バドゥーギ）／A-2-3-4-5（A-5）**。\n\n> Razz-deucey と同じ **“Super Stud”** 構造（5枚→2枚捨て→3枚→7枚）。違いはロー側が **A-5**（ストレート/フラッシュ無視・A低）で、A が良い札になること。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**A入りの散った低3枚（A-2-3 型）。Aは良い札**（バドゥーギ先→A-5フリーロール、狙い7-7）\n\n- ◎ **プレミアム**：A入り3枚レインボー低札（A-2-3）\n- ○ **プレイアブル**：散った低3枚（2-3-4）\n- △ **スチール/限定**：高いドア → パス\n\n**ポジション目安**：スタッド、見せ札重視。Badaceyと同じ感覚。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **高いドア札**で参加（スタッド・ローの大原則）。\n2. **バドゥーギ軽視**。核心は「**バドゥーギ先・A-5をフリーロール**」。\n3. **セブンに固執**。Badacey 同様、**7-7（7ロー＋7バドゥーギ）**を狙うが、A-5は floor が低いので過信しない。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | **Super Stud**（5枚→2枚捨て→3枚→7枚） |\n| バドゥーギ側 | 7枚から最良の4枚バドゥーギ。**A低**・`A-2-3-4` が最強 |\n| A-5側 | 7枚から最良の5枚A-5ロー（ストレート/フラッシュ無視・A低） |\n| 分配 | バドゥーギ半分＋A-5半分（両者常に成立） |\n\n---\n\n## 2. 大原則・カードの価値\n\n- **Aが良い札**。`A-2-3` 級の散った低札が、バドゥーギ（A低ナット）とA-5の両方に最高に効く。\n- **3枚レインボー低札**スタート（Super の鉄則）。\n- **核心は「バドゥーギ先・A-5をフリーロール」**。先にバドゥーギを確定し、A-5を引く側がパット片面手をフリーロール。\n- **狙いは7-7**：7のA-5ロー＋7のバドゥーギ。ただし A-5 は floor が低い（ホイールが出る）ので、Badeucey のエイトほど 7 を“守る”価値はない。\n\n---\n\n## 3. スターティング（相手ランダム・5枚→keep3→7）\n\n| ハンド | eq% | バドゥーギ% | A-5% |\n|---|---|---|---|\n| A-2-3-4 レインボー | 64 | 64 | 64 |\n| 2-3-4-5（エースなし） | 63 | 62 | 64 |\n| A-2-3 三低札 | 高 | — | — |\n\nひとことルール：\n> **A入りの散った低3枚（A-2-3 等）**が最高。Aが良い札なのが Razz-deucey との最大の違い。\n\n---\n\n## 4. ストリート別の心がけ\n\n- **3rd（捨て前）**：A入り3枚レインボー ＞ それ以外。2枚捨てはバドゥーギ＋A-5の芽を残す。\n- **4th-5th**：見せ札・引きを読み、鍵札が生きていれば押す。\n- **6th-7th**：バドゥーギ確定後はA-5側をフリーロールで厚く。\n\n---\n\n## 5. 応用：Badacey との接続\n\nRazz-dacey は **Badacey をスタッドで回したもの**。Badacey の戦略（バドゥーギ先・7-7狙い・ペアで別スートが開く・A良い札）がほぼそのまま効きます。違いは**スタッドの情報量**（見せ札・死札）で、鍵札の生存を読みながらブリック・コールで freeroll を狙えること。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「Razz-deucey と同じ感覚」→ ノー。Razz-dacey は**A低・A良い札**。`A-2-3-4` が本命。\n- 誤解②「A-5が主役」→ 核心は**バドゥーギ先**。\n- 誤解③「7ローは鉄板」→ A-5は floor が低い。7に固執せずスムーズさを見る。\n\n---\n\n## 7. チェックリスト\n\n✅ **A入り3枚レインボー低札**が最高\n✅ A低・A良い札（Razz-deucey と逆）\n✅ バドゥーギ先・A-5フリーロール\n✅ 狙いは 7-7、ただし過信しない\n✅ 高いドア札はパス／死札を数える\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\nHaney は Razz-dacey を「**Super Razz-dugi**」とも呼び、Razz-deucey と並ぶ人気スタッド・ロー変種とします。核心は Badacey と同じ「**バドゥーギ先・低側フリーロール**」「**7-7 を狙う**（ただし A-5 は floor が低く 7 の価値は Badeucey のエイトほどではない）」。スタッドゆえ**見せ札・死札の読み**が加わり、鍵札が生きていれば**ブリック・コールで freeroll** を狙えます。**Badacey とセット**で覚えるのが最短です。\n\n参考：Kevin Haney「Spice Up Your Home Game: Stud Lowball Variants」（Card Player）。\n\n---\n\n## 8. 計算の前提\n\n- モデル：5枚→**3枚レインボー低札を保持**→7枚へ完成→バドゥーギ（A低）とA-5で二分割。捨て2枚は死札。\n- 「3枚保持」は自動選択の近似。\n- 数値はオリジナルのモンテカルロ（各3,500試行）。相手ランダム想定で絶対値は高め。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "dboard8": "# ダブルボード5card オマハ ハイロー 完全ガイド\n\n### 2つの盤から「ベストハイ」と「ベストロー」を選び、ポットを2分割\n\nダブルボード5card オマハ ハイローは、各自**5枚**のホール（ビッグO型）を持ち、**共有ボードが2つ**展開されるゲーム。ポットは **ハイ／ロー（資格8）で2分割**され、**ハイ半分は「2盤のうち良い方のハイ」、ロー半分は「2盤のうち良い方のロー」**を持つプレイヤーが取ります。\n\n> ポイント：盤ごとに分けるのではなく、**ハイは2盤の良い方・ローは2盤の良い方**を各自が選びます。ハイは盤1・ローは盤2、のように**別々の盤を使ってOK**。両方（ハイもローも）取ればスクープ。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**A-A-2-3＋高札のダブルスート＝両面ナッツ志向**（ハイonly/裸ローは弱い）\n\n- ◎ **プレミアム**：AA-2-3 DS／A-2-3＋高サポート DS\n- ○ **プレイアブル**：A-2-3＋スーテッド（カウンターフィット保護）\n- △ **スチール/限定**：ハイonly・裸ナットロー → 弱い\n\n**ポジション目安**：ナッツ志向。後ろで安く見れると有利。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **片面手で突っ込む**。ハイonly／ロー裸は、2盤あっても**取り分は半分が上限**。\n2. **2番手のハイ/ロー**で勝負。盤が2つあると相手も「良い方」を選べる＝**ナッツ基準が上がる**。\n3. **裸のナットロー**：相手も2盤からローを選べるので、**クォーター**されやすい。ハイの裏付けが欲しい。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| ホール | **5枚**（ビッグO型・ちょうど2枚使用） |\n| ボード | **2つ**（各フロップ3・ターン1・リバー1） |\n| ハイ半分 | **2盤のうち良い方**のハイ（ホール2＋その盤3） |\n| ロー半分 | **2盤のうち良い方**のロー（**資格8**・ホール2＋その盤3） |\n| 分配 | ポットを**ハイ/ローで2分割**（盤ごとではない） |\n| ロー不成立 | どちらの盤でも8ローが無ければ、ハイが総取り |\n\nハイとローは**別々の盤を使ってよい**（ハイは盤A、ローは盤B など）。\n\n---\n\n## 2. 大原則・カードの価値\n\n- **両面ナッツ志向**。`A-A-2-3＋高札` のダブルスートが理想。**2盤あるぶん、各サイドで“良い方の盤”を選べる**ので、**ナッツに届く確率が上がる＝2番手はより弱い**。\n- **ローは2盤から選べる**＝ナットローを作りやすい反面、相手も同じ。**裸のA-2はクォーターの罠**。第3低札（3）でカウンターフィット保護を。\n- **ハイonlyは約半分が上限**：2盤の良い方でハイを取りやすくなるが、ローが無いので取り分はハイ半分まで。**ナッツ級の高さ**が必要。\n- **スクープ設計**：ハイを片盤で、ローをもう片盤で——という**二盤またぎのスクープ**が決まりやすいのがこのゲームの妙味。\n\n---\n\n## 3. スターティング（相手ランダム・2盤best）\n\n| ハンド | eq% | ハイ獲得% | ロー獲得% |\n|---|---|---|---|\n| A-A-2-3-K ダブルスート | 70 | 61 | 71 |\n| A-2-3-4-5 ダブルスート | 65 | 48 | 80 |\n| K-K-Q-Q-J（ハイonly） | 39 | 65 | 0 |\n\nひとことルール：\n> **A-A-2-3＋高札のダブルスート**が王様。ハイonlyは「ハイ半分」で約39%が上限。**両サイドに絡める形**を選ぶ。\n\n---\n\n## 4. ストリート別の心がけ\n\n- **プリフロップ**：両面ナッツ志向でタイトに。片面・2番手は降り。\n- **2盤フロップ後**：各盤で「ナッツ／ナッツ級の**ハイ**に届くか」「ナット**ロー**に届くか」を点検。良い方を採用できるので、**どちらかの盤で各サイドのナッツ**を狙う。\n- **ターン・リバー**：ナッツ複合（片盤ナットロー＋片盤ナットハイ）でスクープを狙い厚く。**2番手のコールダウンは大リーク**。\n\n---\n\n## 5. 応用：2盤“ベスト選択”の効果\n\nこのゲームの肝は、**ハイもローも「2盤の良い方」を選べる**こと。これにより——\n- **ナットロー成立率が上がる**（どちらかの盤でA-2が刺されば良い）。だが相手も同様で、**裸ローはクォーターされやすい**。\n- **ハイonlyの勝率は上がる**が、取り分は**ハイ半分**で頭打ち（前ページ例で64%もハイを取るのに総合は約39%）。\n- **片盤ハイ・片盤ローのスクープ**が現実的。`A-A-2-3` 型が、片盤でセット/フルハウス、もう片盤でナットローを取る、という二刀流が強い。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「盤ごとに半分ずつ分かれる」→ **誤り**。分配は**ハイ/ローの2分割**で、各サイドが2盤の良い方を採用。\n- 誤解②「ハイonlyでも2盤あるし勝てる」→ ハイ半分が上限（約39%）。\n- 誤解③「ナットローがあれば安泰」→ 相手も2盤からロー選択。**裸はクォーター**。ハイの裏付けを。\n- 誤解④「2番手でも当たる」→ 2盤ベスト選択でナッツ基準が上がる。**ナッツに引く**。\n\n---\n\n## 7. チェックリスト\n\n✅ **A-A-2-3＋高札・ダブルスート**が王様\n✅ ハイ／ローとも「2盤の良い方」を採用＝ナッツ基準が上がる\n✅ ハイonlyは約39%上限・ナッツ級の高さが要る\n✅ 裸ナットローはクォーターの罠（第3低札で保護）\n✅ 片盤ハイ・片盤ローのスクープを設計\n✅ 2番手のコールダウンは禁物\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\nダブルボード系は mixed の常連。本ゲームは「**ハイもローも2盤の良い方を採用**」する分配なので、Big-O / O8 の核心（**ナットに引く・カウンターフィット保護・クォーター回避**）がさらに先鋭化します。各サイドで“良い方の盤”を選べる＝**ナッツ成立率が上がる**ため、2番手のハイ・ローは両盤の存在ぶん不利に、両面ナッツはより強力に。現実的な勝ち筋は「**片盤で各サイドのナッツを確保し、もう片盤で上乗せ／スクープ**」。裸のナットローは相手も2盤からローを引けるためクォーターされやすく、**ハイの裏付け（セット／ナッツフラ）を伴う両面手**の価値が際立ちます。\n\n参考：Big-O / O8 一般則（Cardquant / Red Chip）、double-board Omaha（Kevin Haney, Card Player）。\n\n---\n\n## 8. 計算の前提\n\n- モデル：各プレイヤーの**ハイ＝2盤のうち良い方**（omahaHigh5）、**ロー＝2盤のうち良い方の8資格ロー**（omahaLow8_5）を採用し、**ポットをハイ/ローで1回だけ分割**（splitShare/resolveSplit）。盤ごとの分割ではありません。\n- ハイとローは別々の盤を使用可。ロー不成立（両盤とも8ロー無し）ならハイが総取り。\n- EQUITYは両盤ランダム、VS HANDは各盤を 0・3・4・5枚で指定可（空＝ランダム）。\n- 数値はオリジナルのモンテカルロ（各3,000試行）。相手ランダム想定で絶対値は高め。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "dboardBigO": "# ダブルボード5枚オマハ（ハイ×ハイ）完全ガイド\n\n### 盤が2つ、どちらも“ハイのみ”を競う\n\nダブルボード5枚オマハ（ハイ×ハイ）は、各自**5枚**のホール（ビッグO型）を持ち、**共有ボードが2つ**展開されるゲーム。ただし**ロー（8-or-better）は無し**——各ボードは**ハイのみ**を競い、ポットは**まず2盤で半分ずつ**、各盤の半分が**その盤のベストハイ**へ渡ります。両盤のハイを取れば**スクープ**。\n\n> ハイロー版（ダブルボードO8）と違い、**ローの分け前が無い**ぶん、**高い手・ナッツ志向**が一層重要になります。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**AAKK級の大ダブルペア／ブロードウェイ／DSランダウン＝高さ重視**（ロー志向は弱い）\n\n- ◎ **プレミアム**：AAKK級ダブルペア／DSブロードウェイ・ランダウン\n- ○ **プレイアブル**：高い連結DS（KQJT9）\n- △ **スチール/限定**：ロー志向（A2345） → ハイのみでは平凡\n\n**ポジション目安**：高さ＝ナッツ志向。2番手は両盤で削られる。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **ロー志向の手で参加**。`A-2-3-4-5` のような“低い”手は、ハイのみでは**平凡**（下表参照）。\n2. **2番目のナッツで両盤勝負**。盤が2つ＝二重に負け筋。\n3. **片盤だけ見る**。両盤を同時に見て、**どちらでナッツに届くか**を設計する。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| ホール | **5枚**（ビッグO型・ちょうど2枚使用） |\n| ボード | **2つ**（各フロップ3・ターン1・リバー1） |\n| 役 | 各盤で**ホール2＋盤3のハイのみ**（ローなし） |\n| 分配 | **盤ごとに半分**→各盤のベストハイが取る（最大2分割） |\n| スクープ | 両盤のハイを取る |\n\n---\n\n## 2. 大原則・カードの価値\n\n- **高さがすべて**。大ダブルペア（`AAKK`）、ブロードウェイ、ダブルスートのランダウンが王様。5枚ホールなので**ナッツ級が出やすい**＝2番手は二重に弱い。\n- **ロー札は価値が低い**。`A-2-3` 等は、ハイ×ハイでは**スクープに絡みにくい**。\n- **両盤に絡む形**を。片盤でしか戦えない手は、もう半分を相手に渡す前提になりがち。\n- **ナッツの被り**に注意：5枚ホール×2盤は強い手が出やすく、**セット・ストレートでも2番手**になりやすい。フラッシュ／フルハウス級の“盤を制する”高さを狙う。\n\n---\n\n## 3. スターティング（相手ランダム・2盤ハイ）\n\n| ハンド | eq% | 盤1勝率 | 盤2勝率 |\n|---|---|---|---|\n| AAKK＋札（大ダブルペア） | 64 | 64 | 64 |\n| KQJT9 ダブルスート | 57 | 58 | 59 |\n| A2345（ロー志向） | 45 | 46 | 46 |\n\nひとことルール：\n> **AAKK級の大ダブルペア／ブロードウェイ／ダブルスートのランダウン**が中心。ロー志向の連結札は、ハイ×ハイでは評価を大きく下げる。\n\n---\n\n## 4. ストリート別の心がけ\n\n- **プリフロップ**：高さ重視でタイトに。ロー志向・片盤手は降り。\n- **2盤フロップ後**：各盤で「ナッツ／ナッツ級に届くか」を点検。片盤制覇＋もう片盤の伸びでスクープを狙う。\n- **ターン・リバー**：盤を制する高さ（フラッシュ／フルハウス級）で厚く。**2番手のコールダウンは二重リーク**。\n\n---\n\n## 5. 応用：ハイロー版との違い\n\nハイロー版（O8）では `A-2` のナットローが主役だが、**ハイ×ハイではローの分け前がゼロ**。よって `A-2-3-4-5` は O8 で強くてもここでは**平凡（約45%）**に転落する。逆に **`AAKK` の大ダブルペア**は、両盤でセット/フルハウスを狙える二刀流で**約64%**まで上がる。「**低い＝強い**」の直感を捨て、**高い＝強い**に切り替えるのがこのゲームの肝です。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「A-2 があれば強い」→ ハイ×ハイでは**ロー無し**。A-2の価値は激減。\n- 誤解②「盤が2つだから2番手でも当たる」→ 二重に負け筋。**ナッツ志向**。\n- 誤解③「片盤勝てれば十分」→ 片面手はもう半分を渡す。**両盤に絡む形**を。\n\n---\n\n## 7. チェックリスト\n\n✅ **AAKK級・ブロードウェイ・DSランダウン**が中心\n✅ ロー志向の連結札は評価を下げる\n✅ 両盤に絡む形を選ぶ\n✅ 5枚×2盤はナッツが出やすい＝2番手は二重に弱い\n✅ 盤を制する高さ（フラッシュ/フルハウス級）で厚く\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\nダブルボード系は mixed の常連で、**ハイ×ハイ**版は「**スクープ設計とナッツ志向**」がより純粋に問われます。5枚ホール（ビッグO型）は組合せが多くナッツ級が頻出するため、**“盤を制する”高さ（多くはフラッシュ以上）**が要求され、セット／2ペアの2番手は両盤で削られます。両盤を同時に評価し、「**片盤を確実に制し、もう片盤の伸びでスクープ**」を狙うのが基本設計。ロー要素が無いぶん、O8 のクォーター地獄が無い代わりに、**高さの絶対値**がそのまま勝率に直結します。\n\n参考：Big-O / 5-card Omaha の一般則（Cardquant / Red Chip）、double-board Omaha（Kevin Haney, Card Player）。\n\n---\n\n## 8. 計算の前提\n\n- モデル：2つのボードを独立に評価し、**各盤を resolveHigh（ハイのみ）で分配→2盤を平均**（各盤が半分）。ローは一切使用しません。EQUITYは両盤ランダム、VS HANDは各盤を 0・3・4・5枚で指定可（空＝ランダム）。\n- 数値はオリジナルのモンテカルロ（各3,000試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "actionrazz": "# Super Action Razz 完全ガイド\n\n### ペイント（J/Q/K）を持てば勝てる、ひっくり返るラズ\n\nSuper Action Razz は、ラズ（A-5ロー）に**ペイント・クオリファイア**を足した変種。**7枚のうち J/Q/K を1枚でも持てば「Face（資格あり）」**、無ければ「Butt（資格なし）」。そして——**資格ありの手は、資格なしの手に無条件で勝ちます**。資格ありなら、**Kローやペアでも、資格なしのホイール（A-2-3-4-5）に勝つ**。\n\n> ペイントは**最終5枚に含めなくてOK**。例：(A-3)J-4-5-7 は「資格ありの7ロー」。全員が資格なしなら、通常ラズ（最も低い手）で決定。**Super**＝4枚ダウン＋ドアの5枚→2枚捨て→7枚（Kevin Un 考案）。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**まず資格（J/Q/K）の当て。プレミアム低（A-2-3）はペイントを引きにいく**（4-6-7の凡庸低は降り）\n\n- ◎ **プレミアム**：A-2-3級の強ロー（約70%でペイント成立）／資格済み＋そこそこ低\n- ○ **プレイアブル**：A-2-4 等の低3枚（ペイント狙い）\n- △ **スチール/限定**：高札アップでも資格済みなら戦える\n\n**ポジション目安**：スタッド＝資格状況＋見せ札。HUで資格済み＆相手ペイント無し→コール。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **ペイントの当てを持たない凡庸な低札**で多人数に参加（Haney いわく**最大のリーク**）。4-6-7 や 2-6-8 で板挟みになる。\n2. **資格を軽視**。どれだけ低くても、**ペイントが無ければ最弱**になりうる。\n3. **高札を即降り**。Action Razz では **J/Q/K が見えていても良い手**になりうる（むしろ資格済み）。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 形式 | **Super Stud**（5枚→2枚捨て→7枚）／A-5ロー |\n| 資格 | **7枚中に J/Q/K が1枚以上**で「Face」。無ければ「Butt」 |\n| 強さ | **Face は無条件で Butt に勝つ**。同グループ内は A-5ローで比較 |\n| ペイント | **最終5枚に含めなくてよい**（持っているだけで資格） |\n| 全員Butt | 通常ラズ（最も低い手）が勝つ |\n\n例：`A♥2♥3♠4♣5♦6♠7♣`（通常ラズのナット）は **Butt**。`K♥K♦K♠K♣Q♦Q♠Q♣` は **Face**。後者（フェイスのフルハウス！）が勝ちます。\n\n---\n\n## 2. 大原則・カードの価値\n\n- **資格がすべての土台**。低さは「資格した者同士」でしか効かない。\n- **プレミアム低（A-2-3 等）はペイントを引きにいく**：4枚引ける Super なら、**7thまでに約70%でペイントが付く**。だから A-2-4 等も普通に playable。\n- **多くのスタートが playable**：通常ラズでは死んでいた「高札アップ」も、Action Razz では**資格済みで戦える**。\n- **板挟みを避ける**：`4-6-7`・`2-6-8` のような**中途半端な低（資格の当ても薄い）**が一番危険。\n\n---\n\n## 3. スターティング（相手ランダム・5枚→keep3→7）\n\n| ハンド | eq%（HU） |\n|---|---|\n| A-2-3（プレミアム低） | 56 |\n| 4-6-7（凡庸＝罠） | 53 |\n| 8-9-T（高すぎ） | 42 |\n\nひとことルール：\n> **プレミアム低（A-2-3級）でペイントを引きにいく**か、最初から**ペイント＋そこそこ低**で資格を確保するか。中途半端な低札は降りる。\n\n---\n\n## 4. ストリート別の心がけ\n\n- **3rd（捨て前）**：基本は**3枚の低札**を残し、4枚引きでペイントを拾う（約70%）。低札が薄く資格も怪しいなら降り。\n- **4th-6th**：自分の資格状況と相手の見せ札を読む。**相手がペイントを1枚も見せていない**なら、こちらが資格済みのとき強気にいける。\n- **River（HU）**：**自分が資格済み**なら、相手がペイントを見せていない限り、**どんな弱い手でもコール推奨**。相手が資格しそびれていれば、Kローやペアでも勝てる。\n\n---\n\n## 5. 応用：資格 vs 低さ（計算で検証）\n\nVS HANDで「**資格済みの 2-3-J**（＝Jで資格、低はそこそこ）」vs「**A-2-3（要ペイント）**」を回すと、**資格側が約60%で勝ち**ます。A-2-3 の方が低いのに、約30%の確率でペイントを引けず**Butt落ち**して自滅するから。これが Action Razz の核心——**「低さ」より先に「資格」**。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「低ければ勝てる」→ **資格なしは最弱**になりうる。まず Face。\n- 誤解②「高札アップは死に手」→ Action Razz では**資格済みで戦える**。むしろ強み。\n- 誤解③「A-2-3 は鉄板」→ 約30%でペイントを外す。過信は禁物（だが約70%で付くので依然強い）。\n- 誤解④「4-6-7 でも低いし参加」→ **最大のリーク**。資格の当ても薄く板挟みに。\n\n---\n\n## 7. チェックリスト\n\n✅ まず**資格（J/Q/K）**の当てがあるか\n✅ プレミアム低はペイントを引きにいく（約70%）\n✅ 中途半端な低（4-6-7等）は降りる\n✅ 高札アップでも資格済みなら戦える\n✅ HUで自分が資格済み＆相手にペイント無し→コール\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\nGreg Raymer（2004 WSOP 王者）と Kevin Haney が解説する Action Razz の核心は、「**資格（Face）が低さに優先する**」こと。Raymer 曰く「HUで自分が資格済みなら、相手がペイントを見せない限り**どんな手でもコール**——Kハイやペアでホイールを倒せる」。Haney は「**最大のリークは、ペイントの当てが薄い凡庸なA-5（4-6-7、2-6-8）で多人数に絡むこと**」「**A-2-4 等のプレミアムは7thまでに約70%でペイントが付く**ので依然 playable」と指摘。Super で回すとペイントが付きやすくなりすぎるため、Haney は**ダウン2枚**での実施を推奨（本ツールは Super を採用）。通常ラズより**遥かに多くのスタートが戦える**のが Action（＝行動・参加）たる所以です。\n\n参考：Greg Raymer「Introducing Action Razz」、Kevin Haney「Adding Some Action to Razz」「Stud Lowball Variants」（Card Player）、BARGE Rulebook「Action Razz」。\n\n---\n\n## 8. 計算の前提\n\n- モデル：5枚→**3枚の低札を保持**（ペイントは基本捨て）→7枚へ完成→**Face（J/Q/K保有）優先＋A-5ロー**で一人勝ちを判定。「3枚保持→4枚引きでペイント狙い（約70%）」という標準ラインを近似しています（資格を固定するために敢えてペイントを残す上級ラインまでは模擬していません）。このため、プレミアム低同士のエクイティはペイント変動でやや圧縮されます。\n- 数値はオリジナルのモンテカルロ（各4,500試行）。相手ランダム想定で絶対値は高め。読むべきは順位と閾値。\n- 新興・未解決ゲーム。本記事は実戦的ヒューリスティクスです。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で。*\n", "pickem": "# ドラマハ ピッケム（Dramaha Pick'em）完全ガイド\n\n### UTGが5枚を見て、7変種から「自分に最も得な勝負」を選ぶ\n\nドラマハ ピッケムは Drawmaha の親戚。**UTGのプレイヤーが強制レイズイン**となり、5枚配られた時点で **Hi / Low / 2-7 / Badugi / Hi-dugi / 49 / 0 の7変種**から1つを選択。全員その選ばれた Drawmaha でポットを争います（**ドロー側半分＋オマハ・ハイ半分**のスプリット）。\n\n> つまり「**どの土俵で戦うか**」をUTGが指名できる。配られた5枚が一番輝く変種を選ぶのが腕の見せどころ。本ツールの **PICK'EM 判定**は、5枚を入れると7変種それぞれのドロー側エクイティを計算し、**どれを選ぶべきか**を順位表示します。\n\n---\n\n## 🎯 スターティング早見（覚え方）\n\n**覚え方**：**配られた5枚が\"どの変種で一番強いか\"を見て選ぶ**。土俵を選べる＝常に何かしらで戦える。\n\n- ◎ **プレミアム**：1つの変種で頭ひとつ抜ける手（AAAA→Hi/Hi-dugi、ホイール→Badugi/Low、TTTT9→49、5フェイス→0）\n- ○ **プレイアブル**：中札主体（7〜T）は **49** で強い／散った低札は **Badugi・Low・2-7**\n- △ **避けたい**：どの変種でも中途半端な「ちぐはぐ5枚」（例：高低バラバラでペアもスートも噛まない）\n\n**ポジション目安**：UTGはプリフロップに変種を指名（＝主導権だが強制参加）。後続は「選ばれた変種＋オマハ」で勝負。**ドロー側がオマハ側より重要**（Haney）。Zero(0)が最も action があり playable とされる。\n\n---\n\n## 0. ゴール — 負ける人の3大ミス\n\n1. **オマハ側に引っ張られて変種選択をミス**。ピッケムは**ドロー側が主役**。まずドロー側で最強の土俵を選ぶ。\n2. **49で「Tは0」と勘違い**。49も0も **T(テン)=10点**。ナットは 49=TTTT9、0=5枚フェイス（K/Q/J）。\n3. **ちぐはぐな5枚で強制参加を活かせない**。UTGは降りられない宿命。せめて一番マシな変種を選ぶ。\n\n---\n\n## 1. ルール\n\n| 項目 | 内容 |\n|---|---|\n| 構造 | Drawmaha（5枚・フロップ・1ドロー・ターン・リバー）／ポットは **ドロー側½＋オマハ・ハイ½** |\n| 選択 | **UTGが強制レイズイン**。5枚を見て7変種から1つ指名、その Drawmaha を全員でプレイ |\n| Hi | 5枚ハイ役（ファイブカードドロー）。ナット=ロイヤル |\n| Low | A-5ロー（資格無し）。ナット=ホイール A-2-3-4-5 |\n| 2-7 | 2-7ロー。ナット=2-3-4-5-7（フラッシュ以外） |\n| Badugi | 低バドゥーギ。ナット=A-2-3-4（異4色） |\n| Hi-dugi | **高バドゥーギ**：異4色だが**ペア/トリップス/クアッズが良い**。ナット=**A-A-A-A** |\n| 49 | 点数最大（J/Q/K=0・A=1・他=数値、**T=10**）。ナット=TTTT9=49点 |\n| 0 | 点数最小（同上）。ナット=5枚フェイス=0点。**T=10なので注意** |\n\n---\n\n## 2. 大原則・変種選択の考え方\n\n- **ドロー側で最強の土俵を選ぶ**：5枚が確定しているドロー側は、オマハ側（盤次第）より読みやすく、Pick'emの肝。\n- **中札は49の宝**：7〜Tの中札が多い手は **49**（中札を欲しがる唯一のゲーム）で輝く。TTTT9が頂点。\n- **フェイス/Aは0の宝**：K/Q/J/A中心は **0** で強い。Aは1点だけ＆オマハ側も補助。Big-O型のA絡みはスクープ筋。\n- **散った低札はLow系**：A-2-3型の散った低札は **Badugi / Low / 2-7** で最強。どれが一番かは相手数とスート構成で変わる→判定で確認。\n- **ペア・トリップスはHi/Hi-dugi**：大ペア〜クアッズは **Hi**（フルハウス/クアッズ）か **Hi-dugi**（AAAAが頂点）。\n\n> Haney評：**Zero(0)は16枚（A〜J）が最良札で多人数アクションになりやすく playable(8/10)**。49は中札の数が限られ action が出にくい(5/10)。\n\n---\n\n## 3. PICK'EM 判定の使い方\n\n1. **配られた5枚**をデッキから選ぶ。\n2. **対戦人数**を選ぶ（相手はランダムなパット手を想定）。\n3. **RUN** を押すと、7変種それぞれで「あなたのドロー側ハンドが勝つ確率」を計算し、**高い順**に並べます。最上段★が**おすすめのピック**。\n4. 同点（複数が100%前後）になることもある（例：TTTT9 は Hi・Hi-dugi・49 が同時に最強）。その場合は**オマハ側の伸び**や**相手に取られにくさ**で選ぶ。\n\n※判定は**ドロー側のみ**を比較します（オマハ・ハイ半分はピックに関係なく常に存在し、フロップ後に展開するため）。\n\n---\n\n## 4. ストリート別の心がけ\n\n- **プリフロップ（選択）**：ドロー側で最も勝てる変種を指名。迷ったら**相手が降りやすい/被りにくい**変種を。\n- **フロップ後（1ドロー）**：選んだ変種のドロー側を伸ばしつつ、オマハ・ハイの目も拾う。**両取り（スクープ）設計**を意識。\n- **ターン・リバー**：ドロー側ロック時はオマハ側にフリーロール。2番手での突っ込みは大リーク。\n\n---\n\n## 5. 応用：同点・二刀流のスポット\n\n- **TTTT9**：Hi（クアッズ）・Hi-dugi（クアッズT）・49（49点）が同時最強。→ オマハの伸びが良い方/被りにくい方を選ぶ。\n- **A-2-3-4-5（ホイール）**：Badugi（A234）・Low（ホイール）が最強、Hi（5ハイストレート）も悪くない。→ 多人数なら Badugi が事故りにくい。\n- **A-A-A-K-K**：Hi（フルハウス）も 0（2点）も最強級。Big-O的なAでオマハも補助。\n\n---\n\n## 6. Equity・戦略の誤解\n\n- 誤解①「強いオマハ手だから何でもいい」→ ピッケムは**ドロー側が主役**。土俵選びが全て。\n- 誤解②「49/0でTは0点」→ **T=10点**。ナットは 49=TTTT9・0=5フェイス。\n- 誤解③「UTGは有利」→ 選択権はあるが**強制参加**。ちぐはぐ手では選択でリスクを最小化するだけ。\n- 誤解④「Hi-dugiはA-K-Q-J」→ Hi-dugiのナットは**A-A-A-A**（ペア/クアッズが良い）。\n\n---\n\n## 7. チェックリスト\n\n✅ まず**ドロー側**で最強の土俵を選ぶ（オマハは後）\n✅ 中札主体→**49**／フェイス・A主体→**0**\n✅ 散った低札→**Badugi/Low/2-7**（判定で最良を確認）\n✅ ペア〜クアッズ→**Hi/Hi-dugi**\n✅ 49も0も**T=10点**を忘れない\n✅ 同点時はオマハの伸び・被りにくさで選ぶ\n\n---\n\n## ★ 上級コンセプト（文献ベース）\n\nKevin Haney と Mike Moncek（Card Player）によれば、点数系（49/Zero）は「**face=0・A=1・他は数値（T=10）**」。49のナットは TTTT9、Zeroのナットは5枚フェイス（K/Q/J）。Haney は **Zero を最も playable(8/10)** と評価——A〜Jの16枚が最良札で多人数アクションを生みやすく、しかも同じ札がオマハ・ハイにも有用でスクープ筋になりやすいため。一方 **49 は中札（特にT）の絶対数が少なく action が細る(5/10)**。Hi-dugi は「異4色だがペア/トリップス/クアッズが良く、ナットは A-A-A-A」という独特の評価軸。Pick'emでは「**ドロー側はオマハ側より重要**」（5枚が確定していて読みやすい）という Drawmaha 全体の原則がそのまま効き、UTGは強制参加のリスクを**最良の土俵選び**で最小化します。\n\n参考：Kevin Haney「Point-Based / Badugi Dramahas」, Mike Moncek「Spice Up Your Home Game: Point-Based Dramaha Variants」(Card Player), BARGE Rulebook「Dramaha 49」, CountingOuts「Drawmaha」。\n\n---\n\n## 8. 計算の前提\n\n- モデル：入力した5枚を**パット（引き直さない）**として、7変種それぞれで相手ランダム5枚×人数とドロー側を比較し勝率を算出（各変種2,500試行）。**オマハ・ハイ半分は判定に含めません**（ピックを左右するのはドロー側のため）。\n- 評価器：Hi=5枚ハイ役 / Low=A-5 / 2-7=2-7ロー / Badugi=低バドゥーギ / Hi-dugi=高バドゥーギ（AAAA頂点）/ 49=点数最大 / 0=点数最小（face=0・A=1・T=10）。\n- 相手ランダム想定のため絶対値は高め。読むべきは**順位**。\n\n*※ 学習目的の概算。金銭を賭けるプレイは自己責任で
