  '</div>';
}

function wireVs(g){
  vs=newVs(g);
  // presets
  const pe=document.getElementById('vspre');
  const pres=VS_PRESETS[g.id]||[];
  pe.innerHTML=pres.map((p,k)=>'<button class="vsprebtn" data-k="'+k+'">'+p.n+'</button>').join('');
  pe.querySelectorAll('.vsprebtn').forEach(b=>{ b.onclick=()=>applyVsPreset(g,pres[+b.dataset.k]); });
  // opp count
  const seg=document.getElementById('vsseg');
  seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on',+x.dataset.o===vs.nopp));
  seg.querySelectorAll('button').forEach(b=>{ b.onclick=()=>{
    vs.nopp=+b.dataset.o; seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
    for(let k=vs.nopp;k<3;k++){ vs.opps[k]=[]; vs.oppDisc[k]=[]; }
    if(vs.active.indexOf('opp')===0 && +vs.active.slice(3)>=vs.nopp) vs.active='hero';
    renderVsAll(g); clearVsResult();
  };});
  // draw-count selector (triple-draw / badugi)
  const ndr=document.getElementById('vsndraw');
  if(ndr){ ndr.querySelectorAll('button').forEach(b=>{ b.onclick=()=>{
    vs.ndraws=+b.dataset.n; ndr.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b)); clearVsResult();
  };});}
  // street selector (stud only)
  const street=document.getElementById('vsstreet');
  if(street){
    street.querySelectorAll('button').forEach(b=>{ b.onclick=()=>{
      const kc=+b.dataset.k; vs.kcount=kc;
      street.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
      // trim any hand longer than new street
      if(vs.hero.length>kc) vs.hero=vs.hero.slice(0,kc);
      for(let k=0;k<3;k++) if(vs.opps[k].length>kc) vs.opps[k]=vs.opps[k].slice(0,kc);
      vs.active='hero';
      renderVsAll(g); clearVsResult();
    };});
  }
  document.getElementById('vrunbtn').onclick=()=>runVs(g);
  renderVsAll(g);
  renderVsHist(g);
}

function applyVsPreset(g,p){
  vs=newVs(g);
  vs.nopp=p.opps.length;
  vs.hero=(p.hero||[]).map(parseCard);
  for(let k=0;k<p.opps.length;k++) vs.opps[k]=p.opps[k].map(parseCard);
  if(p.board) vs.board=p.board.map(parseCard);
  if(p.board2) vs.board2=p.board2.map(parseCard);
  if(p.hd) vs.heroDisc=p.hd.slice();
  if(p.od) for(let k=0;k<p.od.length;k++) vs.oppDisc[k]=p.od[k].slice();
  if(isStud(g)) vs.kcount=(p.hero||[]).length;
  // sync segment highlights
  const seg=document.getElementById('vsseg');
  if(seg) seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on',+x.dataset.o===vs.nopp));
  const street=document.getElementById('vsstreet');
  if(street) street.querySelectorAll('button').forEach(x=>x.classList.toggle('on',+x.dataset.k===vs.kcount));
  const ndr=document.getElementById('vsndraw');
  if(ndr) ndr.querySelectorAll('button').forEach(x=>x.classList.toggle('on',+x.dataset.n===vs.ndraws));
  vs.active='hero';
  renderVsAll(g); clearVsResult();
}

function renderVsAll(g){ renderVtList(g); renderVsDeck(g); if(isDraw(g)) renderDiscard(g); }

function renderVtList(g){
  const el=document.getElementById('vtlist'); if(!el) return;
  const ts=vsTargets(g);
  el.innerHTML=ts.map(t=>{
    const arr=vsArr(g,t.key);
    let cards = arr.length? arr.map((c,ix)=>{
      const cls=suitClass(c.s)==='red'?'r-red':'r-lt';
      return '<div class="vt-card '+cls+'" data-key="'+t.key+'" data-ix="'+ix+'">'+RLABEL[c.r]+
        '<span class="s">'+SUITSYM[SUITNAME[c.s]]+'</span><span class="x">×</span></div>';
    }).join('') : '<span class="vt-empty">'+(t.key.indexOf('board')===0?(isComm(g)?'未指定（空＝ランダム共有札）':'未指定（空＝プリフロップ）'):'カード未選択')+'</span>';
    const cnt = t.key.indexOf('board')===0? (isComm(g)? (arr.length+'/1・共有') : (arr.length+'/5・'+boardStreetName(arr.length))) : (arr.length+'/'+t.max);
    return '<div class="vs-target'+(vs.active===t.key?' on':'')+'" data-key="'+t.key+'">'+
      '<div class="vt-label"><span class="nm">'+t.nm+'</span><span class="cnt">'+cnt+'</span></div>'+
      '<div class="vt-cards">'+cards+'</div><span class="vt-go">▸ 選択中</span></div>';
  }).join('');
  el.querySelectorAll('.vs-target').forEach(row=>{
    row.onclick=(e)=>{ if(e.target.closest('.vt-card')) return; vs.active=row.dataset.key; renderVsAll(g); };
  });
  el.querySelectorAll('.vt-card').forEach(cd=>{
    cd.onclick=(e)=>{ e.stopPropagation(); const key=cd.dataset.key, ix=+cd.dataset.ix;
      vsArr(g,key).splice(ix,1); vsResetDisc(g,key); renderVsAll(g); clearVsResult(); };
  });
}

function renderVsDeck(g){
  const deck=document.getElementById('vsdeck'); if(!deck) return;
  let h='';
  for(const su of ['s','h','d','c']){
    h+='<div class="deck-row">';
    for(const rl of ['A','K','Q','J','T','9','8','7','6','5','4','3','2']){
      const r=RVAL[rl], s=SUITIDX[su], id=mkid(r,s);
      const owner=vsOwner(g,id);
      let oc='', tag='';
      if(owner==='hero'){ oc=' on used-h'; tag='<span class="deck-owner">自</span>'; }
      else if(owner&&owner.indexOf('opp')===0){ oc=' on used-o'; tag='<span class="deck-owner" style="background:#7e9bb5">敵'+(+owner.slice(3)+1)+'</span>'; }
      else if(owner&&owner.indexOf('board')===0){ oc=' on used-b'; tag='<span class="deck-owner" style="background:#9b8bb0">'+(owner==='board2'?'場2':(isComm(g)?'共':'場'))+'</span>'; }
      const rc=(s===1||s===2)?'red':'lt';
      h+='<div class="pcard '+rc+oc+'" data-r="'+r+'" data-s="'+s+'" data-id="'+id+'">'+tag+
         rl+'<span class="s">'+SUITSYM[su]+'</span></div>';
    }
    h+='</div>';
  }
  deck.innerHTML=h;
  deck.querySelectorAll('.pcard').forEach(el=>{
    el.onclick=()=>{
      const id=+el.dataset.id, owner=vsOwner(g,id);
      if(owner){ const arr=vsArr(g,owner); const ix=arr.findIndex(c=>c.id===id); arr.splice(ix,1); vsResetDisc(g,owner); }
      else{
        const arr=vsArr(g,vs.active); const max=vs.active.indexOf('board')===0?boardMax(g):playerMax(g);
        if(arr.length>=max) return;
        arr.push({r:+el.dataset.r,s:+el.dataset.s,id:id}); vsResetDisc(g,vs.active);
        // auto-advance when current target fills
        const cur=vsArr(g,vs.active), curMax=vs.active.indexOf('board')===0?boardMax(g):playerMax(g);
        if(cur.length>=curMax){ for(const t of vsTargets(g)){ const a=vsArr(g,t.key),mx=t.key.indexOf('board')===0?boardMax(g):playerMax(g); if(a.length<mx){vs.active=t.key;break;} } }
      }
      renderVsAll(g); clearVsResult();
    };
  });
}

function renderDiscard(g){
  const wrap=document.getElementById('discwrap'); if(!wrap) return;
  const players=[{key:'hero', nm:'自分', cards:vs.hero, disc:vs.heroDisc}];
  for(let k=0;k<vs.nopp;k++) players.push({key:'opp'+k, nm:'相手'+(k+1), cards:vs.opps[k], disc:vs.oppDisc[k]});
  let h='';
  for(const pl of players){
    if(pl.cards.length<g.hole){ h+='<div class="disc-block"><div class="who">'+pl.nm+'</div>'+
      '<div class="vt-empty">先に '+g.hole+' 枚そろえてください（現在 '+pl.cards.length+'枚）</div></div>'; continue; }
    let cc=pl.cards.map((c,ix)=>{
      const cls=suitClass(c.s)==='red'?'r-red':'r-lt';
      const drawing=pl.disc.indexOf(ix)>=0;
      return '<div class="disc-card '+cls+(drawing?' draw':' keep')+'" data-key="'+pl.key+'" data-ix="'+ix+'">'+
        RLABEL[c.r]+'<span class="s">'+SUITSYM[SUITNAME[c.s]]+'</span>'+
        '<span class="tag">'+(drawing?'引く':'キープ')+'</span></div>';
    }).join('');
    const nd=pl.disc.length;
    h+='<div class="disc-block"><div class="who">'+pl.nm+' <span style="color:var(--faint);font-size:11px;font-family:var(--mono)">'+nd+'枚交換</span></div><div class="disc-cards">'+cc+'</div></div>';
  }
  wrap.innerHTML=h;
  wrap.querySelectorAll('.disc-card').forEach(cd=>{
    cd.onclick=()=>{ const key=cd.dataset.key, ix=+cd.dataset.ix;
      const arr = key==='hero'?vs.heroDisc:vs.oppDisc[+key.slice(3)];
      const pos=arr.indexOf(ix); if(pos>=0) arr.splice(pos,1); else arr.push(ix);
      renderDiscard(g); clearVsResult();
    };
  });
}

function clearVsResult(){ const r=document.getElementById('vsres'); if(r){ r.classList.remove('show'); r.innerHTML=''; } 
  const w=document.getElementById('vwarn'); if(w) w.textContent=''; }

function runVs(g){
  if(running) return;
  const warn=document.getElementById('vwarn');
  const pm=playerMax(g);
  if(vs.hero.length!==pm){ warn.textContent='⚠ 自分のハンドを '+pm+'枚 選んでください（現在 '+vs.hero.length+'枚）。'; return; }
  for(let k=0;k<vs.nopp;k++){ if(vs.opps[k].length!==pm){ warn.textContent='⚠ 相手'+(k+1)+'のハンドを '+pm+'枚 選んでください（現在 '+vs.opps[k].length+'枚）。'; return; } }
  if(isFlop(g)){ const bl=vs.board.length; if(!(bl===0||bl===3||bl===4||bl===5)){ warn.textContent='⚠ ボードは 0・3・4・5枚 のいずれかにしてください（現在 '+bl+'枚）。'; return; } }
  if(isComm(g)){ const bl=vs.board.length; if(!(bl===0||bl===1)){ warn.textContent='⚠ 共有カードは 0枚（ランダム）か 1枚 にしてください（現在 '+bl+'枚）。'; return; } }
  if(isDouble(g)){ for(const bb of [vs.board,vs.board2]){ const bl=bb.length; if(!(bl===0||bl===3||bl===4||bl===5)){ warn.textContent='⚠ 各ボードは 0・3・4・5枚 のいずれかにしてください（現在 '+bl+'枚）。'; return; } } }
  warn.textContent='';
  running=true;
  const gid=g.id;
  const cfg={kind:g.kind, hero:vs.hero.map(c=>({r:c.r,s:c.s,id:c.id})),
    opps:[], board:(isFlop(g)||isComm(g)||isDouble(g))?vs.board.map(c=>({r:c.r,s:c.s,id:c.id})):undefined,
    board2:isDouble(g)?vs.board2.map(c=>({r:c.r,s:c.s,id:c.id})):undefined,
    heroDisc:vs.heroDisc.slice(), oppDisc:[], ndraws:isDraw(g)?vs.ndraws:1};
  for(let k=0;k<vs.nopp;k++){ cfg.opps.push(vs.opps[k].map(c=>({r:c.r,s:c.s,id:c.id}))); cfg.oppDisc.push((vs.oppDisc[k]||[]).slice()); }
  const label=vsLabel(g,cfg);
  const snapshot=vsSnapshot();
  const total=TRIALS[g.kind];
  let done=0, sumShare=0, win=0, tie=0, lose=0, scoop=0, partial=0, hi=0, lo=0;
  const rb=document.getElementById('vrunbtn'); rb.disabled=true; rb.textContent='計算中…';
  const pw=document.getElementById('vprogwrap'); pw.classList.add('show');
  const pf=document.getElementById('vprogfill'), pt=document.getElementById('vprogtxt');
  clearVsResult();
  function batch(){
    const N=Math.min(300,total-done);
    for(let i=0;i<N;i++){ const r=MIXENGINE.vsOneTrial(cfg); sumShare+=r.share;
      if(g.split){ scoop+=r.scoop; partial+=r.partial; lose+=r.lose; hi+=r.hi; lo+=r.lo; }
      else{ win+=r.win; tie+=r.tie; lose+=r.lose; } }
    done+=N; pf.style.width=(done/total*100).toFixed(1)+'%';
    pt.textContent='SIMULATING  '+done.toLocaleString()+' / '+total.toLocaleString();
    if(done<total) setTimeout(batch,0);
    else{ running=false; rb.disabled=false; rb.textContent='SIMULATE ▸'; setTimeout(()=>pw.classList.remove('show'),400);
      const R = g.split? {eq:sumShare/total, scoop:scoop/total, partial:partial/total, lose:lose/total, hi:hi/total, lo:lo/total, total:total, nopp:vs.nopp}
                       : {eq:sumShare/total, win:win/total, tie:tie/total, lose:lose/total, total:total, nopp:vs.nopp};
      pushHist(g,R,label,snapshot);
      if(curGame===gid && curTab==='vs'){ if(g.split) showVsSplit(g,R); else showVsWin(g,R); }
    }
  }
  batch();
}

function vsLabel(g,cfg){
  const hs=cards=>cards.length? cards.map(c=>RLABEL[c.r]+SUITSYM[SUITNAME[c.s]]).join(''):'—';
  let s='自'+hs(cfg.hero);
  for(let k=0;k<cfg.opps.length;k++) s+=' v '+hs(cfg.opps[k]);
  if(isFlop(g)&&cfg.board&&cfg.board.length) s+=' ／'+boardStreetName(cfg.board.length)+hs(cfg.board);
  if(isComm(g)&&cfg.board&&cfg.board.length) s+=' ／共有'+hs(cfg.board);
  if(isDouble(g)){ if(cfg.board&&cfg.board.length) s+=' ／盤1'+hs(cfg.board); if(cfg.board2&&cfg.board2.length) s+=' ／盤2'+hs(cfg.board2); }
  if(isStud(g)) s+=' ／'+vs.kcount+'枚';
  if(isDraw(g)&&cfg.ndraws>1) s+=' ／'+cfg.ndraws+'ドロー';
  return s;
}
function vsSnapshot(){
  const cl=a=>a.map(c=>({r:c.r,s:c.s,id:c.id}));
  return {nopp:vs.nopp, kcount:vs.kcount, ndraws:vs.ndraws,
    hero:cl(vs.hero), opps:vs.opps.map(cl), board:cl(vs.board), board2:cl(vs.board2||[]),
    heroDisc:vs.heroDisc.slice(), oppDisc:vs.oppDisc.map(a=>a.slice())};
}
let vsHist={};
function pushHist(g,R,label,snapshot){
  if(!vsHist[g.id]) vsHist[g.id]=[];
  const e={label:label, split:g.split, eq:R.eq, snapshot:snapshot};
  if(g.split){ e.scoop=R.scoop; e.partial=R.partial; e.lose=R.lose; e.hi=R.hi; e.lo=R.lo; }
  else { e.win=R.win; e.tie=R.tie; e.lose=R.lose; }
  vsHist[g.id].unshift(e);
  if(vsHist[g.id].length>8) vsHist[g.id].pop();
  if(curGame===g.id && curTab==='vs') renderVsHist(g);
}
function renderVsHist(g){
  const el=document.getElementById('vshist'); if(!el) return;
  const list=vsHist[g.id]||[];
  if(!list.length){ el.style.display='none'; el.innerHTML=''; return; }
  el.style.display='block';
  const rows=list.map((h,i)=>{
    const w=(h.eq*100).toFixed(1);
    const sub=h.split? ('Hi '+pctw(h.hi)+'% ／ Lo '+pctw(h.lo)+'% ／ Scoop '+pctw(h.scoop)+'%')
                     : ('勝 '+pctw(h.win)+'% ／ 分 '+pctw(h.tie)+'% ／ 負 '+pctw(h.lose)+'%');
    return '<div class="hist-row'+(i===0?' latest':'')+'">'+
      '<div class="hist-main"><div class="hist-label">'+h.label+'</div>'+
        '<div class="hist-sub">'+sub+'</div>'+
        '<div class="hist-bar"><i style="width:'+w+'%"></i></div></div>'+
      '<div class="hist-eq">'+w+'<span>%</span></div>'+
      '<div class="hist-btns"><button class="hist-redo" data-i="'+i+'">再現</button>'+
        '<button class="hist-del" data-i="'+i+'">×</button></div></div>';
  }).join('');
  el.innerHTML='<h4 style="margin-bottom:2px"><span class="num">★</span> 結果の履歴（比較）'+
    '<span class="hint"><button class="sel-clear" id="histclear">すべて消去</button></span></h4>'+
    '<div class="res-note" style="margin:2px 0 12px;color:var(--faint)">直近 '+list.length+' 件。バーは総合エクイティの大きさ。「再現」で同じ対戦を入力欄に呼び戻せます。</div>'+
    '<div class="hist-list">'+rows+'</div>';
  el.querySelectorAll('.hist-redo').forEach(b=>b.onclick=()=>redoHist(g,+b.dataset.i));
  el.querySelectorAll('.hist-del').forEach(b=>b.onclick=()=>{ list.splice(+b.dataset.i,1); renderVsHist(g); });
  const hc=document.getElementById('histclear'); if(hc) hc.onclick=()=>{ vsHist[g.id]=[]; renderVsHist(g); };
}
function redoHist(g,i){
  const h=(vsHist[g.id]||[])[i]; if(!h) return; const s=h.snapshot;
  vs=newVs(g);
  vs.nopp=s.nopp; vs.kcount=s.kcount; vs.ndraws=s.ndraws;
  const cl=a=>a.map(c=>({r:c.r,s:c.s,id:c.id}));
  vs.hero=cl(s.hero); vs.opps=s.opps.map(cl); vs.board=cl(s.board); vs.board2=cl(s.board2||[]);
  vs.heroDisc=s.heroDisc.slice(); vs.oppDisc=s.oppDisc.map(a=>a.slice());
  vs.active='hero';
  const seg=document.getElementById('vsseg'); if(seg) seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on',+x.dataset.o===vs.nopp));
  const street=document.getElementById('vsstreet'); if(street) street.querySelectorAll('button').forEach(x=>x.classList.toggle('on',+x.dataset.k===vs.kcount));
  const ndr=document.getElementById('vsndraw'); if(ndr) ndr.querySelectorAll('button').forEach(x=>x.classList.toggle('on',+x.dataset.n===vs.ndraws));
  renderVsAll(g); clearVsResult();
  window.scrollTo({top:0,behavior:'smooth'});
}

function pctw(x){ return (x*100).toFixed(1); }
function segSpan(cls,val,label){ if(val<=0) return ''; const w=(val*100);
  return '<span class="'+cls+'" style="width:'+w.toFixed(2)+'%">'+(w>=9?label+' '+w.toFixed(0)+'%':(w>=4?w.toFixed(0)+'%':''))+'</span>'; }

function showVsWin(g,R){
  const label = g.lowwin?'勝率':'エクイティ';
  const html=
    '<h4 style="margin-bottom:6px"><span class="num">'+(isDraw(g)?'04':'03')+'</span> 結果</h4>'+
    '<div class="vsres-head">'+
      '<div class="res-big"><span class="cap">'+(g.lowwin?'WIN RATE':'EQUITY')+'</span>'+
        '<span class="val">'+pctw(R.eq)+'<span class="pct">%</span></span></div>'+
      '<div class="res-be">自分の'+label+'（'+R.nopp+'人対戦）<br>'+
        '勝ち <b class="ev-up">'+pctw(R.win)+'%</b>／引分 <b>'+pctw(R.tie)+'%</b>／負け <b class="ev-dn">'+pctw(R.lose)+'%</b></div>'+
    '</div>'+
    '<div class="vbar">'+segSpan('vseg-win',R.win,'勝ち')+segSpan('vseg-tie',R.tie,'引分')+segSpan('vseg-lose',R.lose,'負け')+'</div>'+
    '<div class="vbar-legend">'+
      '<span class="lg"><span class="sw" style="background:var(--gold)"></span>勝ち</span>'+
      '<span class="lg"><span class="sw" style="background:#565b63"></span>引分（チョップ）</span>'+
      '<span class="lg"><span class="sw" style="background:#7a3f3f"></span>負け</span></div>'+
    '<div class="res-note" style="margin-top:18px;color:var(--faint)">'+R.total.toLocaleString()+' 回シミュレーション。'+
      (isDraw(g)?('指定したカードを1回目に交換し、'+(vs.ndraws>1?('合計'+vs.ndraws+'回のドローを連続適用（2回目以降は自動）した'):'1回のドローを行った')+'後にショウダウンした結果です。'):'残りの未指定カードをランダムに配って集計。')+
      ' エクイティ＝勝ち＋引分の取り分（½）を平均した期待値。±0.3〜0.8%程度の誤差があります。</div>';
  const r=document.getElementById('vsres'); r.innerHTML=html; r.classList.add('show');
}

function showVsSplit(g,R){
  const html=
    '<h4 style="margin-bottom:6px"><span class="num">03</span> 結果（ハイロー・スプリット）</h4>'+
    '<div class="vsres-head">'+
      '<div class="res-big"><span class="cap">TOTAL EQUITY</span>'+
        '<span class="val">'+pctw(R.eq)+'<span class="pct">%</span></span></div>'+
      '<div class="res-be">自分の<b>総合エクイティ</b>（'+R.nopp+'人対戦・取り分の期待値）<br>'+
        'スクープ <b class="ev-up">'+pctw(R.scoop)+'%</b>／分け取り <b>'+pctw(R.partial)+'%</b>／負け <b class="ev-dn">'+pctw(R.lose)+'%</b></div>'+
    '</div>'+
    '<div class="vbar">'+segSpan('vseg-scoop',R.scoop,'スクープ')+segSpan('vseg-part',R.partial,'分け')+segSpan('vseg-lose',R.lose,'負け')+'</div>'+
    '<div class="vbar-legend">'+
      '<span class="lg"><span class="sw" style="background:var(--gold-bright)"></span>スクープ（総取り）</span>'+
      '<span class="lg"><span class="sw" style="background:#8a7433"></span>半分／一部を獲得</span>'+
      '<span class="lg"><span class="sw" style="background:#7a3f3f"></span>負け</span></div>'+
    '<div class="vsplit-stats">'+
      '<div class="st"><div class="k">'+(g.hiLabel||'HIGH')+'を取る</div><div class="v">'+pctw(R.hi)+'<span class="pct">%</span></div>'+
        '<div class="minibar"><i style="width:'+pctw(R.hi)+'%"></i></div></div>'+
      '<div class="st"><div class="k">'+(g.loLabel||'LOW')+'を取る</div><div class="v">'+pctw(R.lo)+'<span class="pct">%</span></div>'+
        '<div class="minibar"><i style="width:'+pctw(R.lo)+'%"></i></div></div>'+
      '<div class="st"><div class="k">SCOOP</div><div class="v">'+pctw(R.scoop)+'<span class="pct">%</span></div>'+
        '<div class="minibar"><i style="width:'+pctw(R.scoop)+'%;background:var(--gold-bright)"></i></div></div>'+
    '</div>'+
    '<div class="res-note" style="margin-top:20px;color:var(--faint)">'+R.total.toLocaleString()+' 回シミュレーション。'+
      ((g.kind==='badacey'||g.kind==='baduecey')?'2つのローを別々に競い、両者とも常に成立します。':'ロー不成立なら高い手が総取り。')+'左右の数字は各サイドを取れた割合、総合エクイティは取り分（½＋½や総取り）の平均です。</div>';
  const r=document.getElementById('vsres'); r.innerHTML=html; r.classList.add('show');
}

/* ===== init ===== */
selectGame('overview');
</script>

<style id="golinks">
.jumpgrid{margin:18px 0 30px;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.jumpgrid .jumphead{grid-column:1/-1;font-family:var(--mono,monospace);font-size:11px;letter-spacing:.18em;color:var(--gold,#c9a84c)}
.jumpgrid a.golink{display:flex;flex-direction:column;gap:3px;padding:12px 14px;border:1px solid var(--line,rgba(255,255,255,.15));
  border-radius:12px;background:var(--panel,rgba(255,255,255,.03));text-decoration:none;cursor:pointer;transition:all .15s ease}
.jumpgrid a.golink b{font-family:var(--disp,sans-serif);font-size:15px;letter-spacing:.06em;color:var(--gold-bright,#e3c878)}
.jumpgrid a.golink span{font-size:11.5px;color:var(--muted,#999);line-height:1.5}
.jumpgrid a.golink:hover{border-color:var(--gold,#c9a84c);transform:translateY(-2px)}
@media(max-width:900px){.jumpgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
</style>
<script id="golinks-js">
(function(){
  function makeGrid(){
    if(typeof GAMES==='undefined'||typeof curGame==='undefined')return;
    if(!(curGame==='overview'||curGame==='overview_a'))return;
    var md=document.querySelector('.md'); if(!md||md.querySelector('.jumpgrid'))return;
    var g0=null; for(var i=0;i<GAMES.length;i++){if(GAMES[i].id===curGame){g0=GAMES[i];break;}}
    var grp=g0&&g0.grp;
    var list=GAMES.filter(function(g){return g.calc&&(!grp||g.grp===grp);});
    if(!list.length)return;
    var wrap=document.createElement('div'); wrap.className='jumpgrid';
    var htmlStr='<div class="jumphead">&#9654; 収録ゲームへジャンプ</div>';
    for(var j=0;j<list.length;j++){var g=list[j];
      htmlStr+='<a href="javascript:void(0)" class="golink" data-go="'+g.id+'"><b>'+g.code+'</b><span>'+g.jp+'</span></a>';}
    wrap.innerHTML=htmlStr;
    var h1=md.querySelector('h1');
    if(h1&&h1.nextSibling){md.insertBefore(wrap,h1.nextSibling);}else{md.insertBefore(wrap,md.firstChild);}
  }
  document.addEventListener('click',function(e){
    var a=e.target.closest?e.target.closest('a.golink'):null; if(!a)return;
    e.preventDefault();
    if(typeof selectGame==='function'){selectGame(a.getAttribute('data-go'));window.scrollTo({top:0,behavior:'smooth'});}
  });
  new MutationObserver(function(){makeGrid();}).observe(document.body,{childList:true,subtree:true});
  if(document.readyState!=='loading'){makeGrid();}else{document.addEventListener('DOMContentLoaded',makeGrid);}
})();
</script>
